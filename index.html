/* ── TASKS ── */
function mkTL(pid){
  const p=gP(pid);
  let tasks=(S.tasks[pid]||[]).filter(t=>!t.done);
  tasks.forEach(t=>{if(!t.tags)t.tags=[];});
  // 날짜 최신순 정렬: 가장 나중 날짜가 위로, 날짜 없는 태스크는 아래로
  tasks.sort((a,b)=>{
    if(a.due&&b.due)return b.due.localeCompare(a.due) || (b.i||0)-(a.i||0);
    if(a.due&&!b.due)return -1;
    if(!a.due&&b.due)return 1;
    return (b.i||0)-(a.i||0);
  });
  if(!tasks.length)return'<div class="empty">남은 태스크 없음</div>';
  return tasks.map(t=>{
    const isToday=isTodayTask(t);
    const accent=isToday?p.c:'#D8D8D4';
    const ds=dueStat(t.due);
    const dueHtml=t.due
      ?`<span class="due-chip ${ds}" title="클릭해서 날짜 변경" onclick="tEditDue('${pid}',${t.i},event)" style="cursor:pointer">${dueLabel(t.due)}</span><button class="due-del" onclick="tClearDue('${pid}',${t.i})" title="마감일 삭제" style="background:none;border:none;font-size:9px;cursor:pointer;color:var(--faint);padding:0 2px;margin-left:1px">×</button>`
      :`<button class="due-add" onclick="tEditDue('${pid}',${t.i},event)" title="마감일 추가" style="background:none;border:none;font-size:10px;cursor:pointer;color:var(--faint);padding:0;opacity:0;transition:opacity .15s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0">📅</button>`;
    return`<div class="ti${isToday?'':' neutral'}" style="border-left-color:${accent}"><div class="tcb" onclick="tTog('${pid}',${t.i})"></div><span class="ttxt" ondblclick="tEdit(this,'${pid}',${t.i})" title="더블클릭으로 수정">${escH(t.t)}</span>${taskTagsHtml(t,pid,true)}${dueHtml}<button class="tdel" onclick="tDel('${pid}',${t.i})">×</button></div>`;
  }).join('');
}
function mkDoneTL(pid){const p=gP(pid),tasks=(S.tasks[pid]||[]).filter(t=>t.done).sort((a,b)=>{if(a.due&&b.due)return b.due.localeCompare(a.due)||(b.i||0)-(a.i||0);if(a.due&&!b.due)return -1;if(!a.due&&b.due)return 1;return (b.i||0)-(a.i||0);});if(!tasks.length)return'';const open=S.showDoneTask&&S.showDoneTask[pid];return`<div id="done-wrap-${pid}"><div class="done-tasks-hd" onclick="toggleDoneTasks('${pid}')"><span class="done-tasks-lbl">완료된 태스크 (${tasks.length})</span><span style="font-size:10px;color:var(--faint)">${open?'▲':'▼'}</span></div>${open?`<div class="done-tasks-list">${tasks.map(t=>{const isToday=isTodayTask(t);const accent=isToday?p.c:'#D8D8D4';const chk=isToday?p.c:'#AFAFAA';return `<div class="ti${isToday?'':' neutral'}" style="border-left-color:${accent}"><div class="tcb checked" onclick="tTog('${pid}',${t.i})" style="background:${chk};border-color:${chk}"> ${CK}</div><span class="ttxt done">${escH(t.t)}</span>${taskTagsHtml(t,pid,true)}${t.due?`<span class="due-chip ${dueStat(t.due)||'normal'}" title="클릭해서 날짜 변경" onclick="tEditDue('${pid}',${t.i})" style="cursor:pointer">${dueLabel(t.due)}</span>`:''}<button class="tdel" onclick="tDel('${pid}',${t.i})">×</button></div>`}).join('')}</div>`:''}</div>`;}
function tAdd(pid){const el=document.getElementById('tinp');if(!el)return;const txt=el.value.trim();if(!txt)return;if(!S._tid)S._tid={};if(!S._tid[pid])S._tid[pid]=1;const dueVal=document.getElementById('tinp-due')?.value||null;const tagVal=document.getElementById('tinp-tags')?.value||'';(S.tasks[pid]||(S.tasks[pid]=[])).unshift({i:S._tid[pid]++,t:txt,done:false,due:dueVal,created:todayStr(),tags:parseTags(tagVal)});el.value='';const di=document.getElementById('tinp-due');if(di)di.value='';const ti=document.getElementById('tinp-tags');if(ti)ti.value='';sv();uTL(pid);uStat(pid);const dw=document.getElementById('done-wrap-'+pid);if(dw)dw.outerHTML=mkDoneTL(pid);rSB();}
function tEditTags(pid,id){const arr=S.tasks[pid]||[];const t=arr.find(x=>x.i===id);if(!t)return;const cur=(t.tags||[]).map(x=>'#'+x).join(' ');const v=prompt('태그를 입력해줘. 예: #디자인 #급함',cur);if(v===null)return;t.tags=parseTags(v);sv();uTL(pid);const dw=document.getElementById('done-wrap-'+pid);if(dw)dw.outerHTML=mkDoneTL(pid);rSB();}
window.tEditTags=tEditTags;
function tTog(pid,id){S.tasks[pid]=S.tasks[pid].map(t=>t.i===id?{...t,done:!t.done}:t);sv();uTL(pid);uStat(pid);const dw=document.getElementById('done-wrap-'+pid);if(dw)dw.outerHTML=mkDoneTL(pid);rSB();}
function tDel(pid,id){S.tasks[pid]=(S.tasks[pid]||[]).filter(t=>t.i!==id);sv();uTL(pid);uStat(pid);const dw=document.getElementById('done-wrap-'+pid);if(dw)dw.outerHTML=mkDoneTL(pid);rSB();}
function toggleDoneTasks(pid){if(!S.showDoneTask)S.showDoneTask={};S.showDoneTask[pid]=!S.showDoneTask[pid];sv();const el=document.getElementById('task-card-'+pid);if(el){const tl=el.querySelector('.tlist');const dw=el.querySelector('[id^="done-wrap-"]');if(tl)tl.innerHTML=mkTL(pid);if(dw)dw.outerHTML=mkDoneTL(pid);else{const after=el.querySelector('.tlist');if(after)after.insertAdjacentHTML('afterend',mkDoneTL(pid));}}}
window.tAdd=tAdd;window.tTog=tTog;window.tDel=tDel;window.toggleDoneTasks=toggleDoneTasks;window.dmTaskAdd=dmTaskAdd;window.tEditTags=tEditTags;

/* ── TAG HELPER ── */
function openTagInp(containerId,onAdd){
  const container=document.getElementById(containerId);if(!container)return;
  const existingId=containerId+'-inp';if(document.getElementById(existingId)){document.getElementById(existingId).focus();return;}
  const inp=document.createElement('input');inp.id=existingId;inp.placeholder='태그...';
  inp.style.cssText='border:1px solid var(--bmd);border-radius:20px;padding:2px 8px;font-size:11px;font-family:inherit;outline:none;width:82px;background:var(--bg);color:var(--text)';
  const btn=container.lastElementChild;container.insertBefore(inp,btn);inp.focus();
  const addOne=(raw)=>{const t=String(raw||'').trim().replace(/^#/,'').replace(/[#,，]+$/g,'').trim();if(t){onAdd(t);}inp.value='';};
  inp.addEventListener('click',e=>e.stopPropagation());
  inp.addEventListener('keydown',e=>{
    e.stopPropagation();
    if(e.isComposing||e.keyCode===229)return;
    if(e.key==='Enter'||e.key===' '||e.key===','||e.key==='Tab'){
      const v=inp.value;if(v.trim()){e.preventDefault();addOne(v);} 
    }
    if(e.key==='Backspace'&&!inp.value){
      const chips=[...container.querySelectorAll('.tag')];
      const last=chips[chips.length-1];
      const b=last?.querySelector('button');
      if(b){b.click();}
    }
    if(e.key==='Escape'){document.getElementById('tag-ac-drop')?.remove();inp.remove();}
  });
  inp.addEventListener('paste',e=>{
    const txt=(e.clipboardData||window.clipboardData)?.getData('text')||'';
    if(/[#,，\s]/.test(txt)){e.preventDefault();parseTags(txt).forEach(addOne);}
  });
  inp.addEventListener('input',()=>{
    const parts=inp.value.split(/[#,，\s]+/).filter(Boolean);
    if(parts.length>1){parts.forEach(addOne);return;}
    const pid=containerId.split('-')[1];
    showTagAC(inp,pid,(t)=>{addOne(t);if(inp.parentNode)inp.remove();});
  });
  inp.addEventListener('blur',()=>setTimeout(()=>{const v=inp.value.trim();if(v){addOne(v);}if(inp.parentNode)inp.remove();},200));
}
window.openTagInp=openTagInp;

/* ── 태그 자동완성 ── */
function getAllTags(pid){
  const tags=new Set();
  const pids=pid?[pid]:S.projects.map(p=>p.id);
  pids.forEach(id=>{
    (S.plans[id]||[]).forEach(pl=>(pl.tags||[]).forEach(t=>tags.add(t)));
    (S.notes[id]||[]).forEach(n=>(n.tags||[]).forEach(t=>tags.add(t)));
  });
  return [...tags];
}
function showTagAC(inp,pid,onSelect){
  const q=inp.value.replace(/^#/,'').trim().toLowerCase();
  document.getElementById('tag-ac-drop')?.remove();
  if(!q)return;
  const all=getAllTags(pid);
  const matches=all.filter(t=>t.toLowerCase().includes(q)&&t.toLowerCase()!==q).slice(0,6);
  if(!matches.length)return;
  const drop=document.createElement('div');drop.id='tag-ac-drop';
  drop.style.cssText='position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:500;overflow:hidden;min-width:120px';
  const rect=inp.getBoundingClientRect();
  drop.style.left=rect.left+'px';drop.style.top=(rect.bottom+2)+'px';
  // data-tag에 저장해서 특수문자 오류 방지
  drop.innerHTML=matches.map(t=>`<div class="tag-ac-item" data-tag="${escH(t)}">#${escH(t)}</div>`).join('');
  drop.querySelectorAll('.tag-ac-item').forEach(el=>{
    el.addEventListener('mousedown',ev=>{
      ev.preventDefault();
      const tag=el.getAttribute('data-tag');
      document.getElementById('tag-ac-drop')?.remove();
      inp.value='';
      onSelect(tag);
    });
  });
  document.body.appendChild(drop);
  setTimeout(()=>document.addEventListener('click',()=>document.getElementById('tag-ac-drop')?.remove(),{once:true}),50);
}
window.showTagAC=showTagAC;
window.openTagInp=openTagInp;

/* ── PLANS (drag + filter + sections) ── */
let _plDrag={pid:null,id:null};
function mkPlans(pid){
  const p=gP(pid),plans=S.plans[pid]||[];
  const filt=S.planFilter&&S.planFilter[pid]?S.planFilter[pid]:'all';
  const ongoing=plans.filter(pl=>pl.status!=='done');
  const done=plans.filter(pl=>pl.status==='done').slice().sort((a,b)=>{if(!a.date&&!b.date)return 0;if(!a.date)return 1;if(!b.date)return-1;return a.date<b.date?-1:a.date>b.date?1:0;});
  const tot=plans.length,doneN=done.length;
  let h=`<div class="plan-summary"><div class="ps-chip"><div class="ps-dot" style="background:${p.c}"></div>전체 ${tot}개</div><div class="ps-chip"><div class="ps-dot" style="background:#3A7A0A"></div>완료 ${doneN}개</div><div class="ps-chip"><div class="ps-dot" style="background:${p.c};opacity:.35"></div>진행중 ${tot-doneN}개</div></div>`;
  h+=`<div class="filter-row"><button class="ftab${filt==='all'?' on':''}" onclick="setPlanFilter('${pid}','all')">전체</button><button class="ftab${filt==='ongoing'?' on':''}" onclick="setPlanFilter('${pid}','ongoing')">진행중</button><button class="ftab${filt==='done'?' on':''}" onclick="setPlanFilter('${pid}','done')">완료</button></div>`;
  const showOngoing=filt==='all'||filt==='ongoing';const showDone=filt==='all'||filt==='done';
  if(showOngoing&&ongoing.length){
    if(filt==='all')h+=`<div class="plan-section-lbl">진행중</div>`;
    h+=ongoing.map(pl=>mkPlanCard(pl,pid,p,true)).join('');
  }
  if(showDone&&done.length){
    if(filt==='all')h+=`<div class="plan-section-lbl">완료</div>`;
    h+=done.map(pl=>mkPlanCard(pl,pid,p,false)).join('');
  }
  if(!showOngoing||!ongoing.length)if(!showDone||!done.length)if(!plans.length)h+='<div class="empty" style="padding:12px 0">기획안이 없어요</div>';
  h+=`<button class="add-plan" onclick="planAdd('${pid}')">＋ 새 기획안 추가</button>`;
  return h;
}
function mkPlanCard(pl,pid,p,canDrag){
  const stStyle=pl.status==='done'?'background:#E6F4D7;color:#3A7A0A':`background:${p.c};color:#fff`;
  const dragAttrs=canDrag?`ondragover="plDO(event,'${pid}',${pl.id})" ondragleave="plDL(event,'${pid}',${pl.id})" ondrop="plDrop(event,'${pid}',${pl.id})"`:`ondragover="plDO(event,'${pid}',${pl.id})" ondragleave="plDL(event,'${pid}',${pl.id})" ondrop="plDrop(event,'${pid}',${pl.id})"` ;
  return`<div class="plan-doc${pl.open?' open':''}" id="pldoc-${pid}-${pl.id}" ${dragAttrs}>
    <div class="plan-hd" onclick="plTog('${pid}',${pl.id})">
      ${canDrag?`<span class="drag-handle" title="드래그해서 순서 변경" onmousedown="plHD(event,'${pid}',${pl.id})" onmouseup="plHU(event,'${pid}',${pl.id})" onclick="event.stopPropagation()">⠿</span>`:''}
      <button class="pst ${pl.status}" style="${stStyle}" onclick="event.stopPropagation();plStat('${pid}',${pl.id})">${pl.status==='done'?'완료':'진행중'}</button>
      <span class="plan-ttl-lbl">${escH(pl.title)}</span>${pl.caption?`<span class="plan-cap-preview" style="order:2;flex-basis:100%;font-size:11px;color:var(--muted)">${autoLink(pl.caption)}</span>`:''}
      <div class="tags-wrap" id="ptags-${pid}-${pl.id}" onclick="event.stopPropagation()">
        ${(pl.tags||[]).map(t=>`<span class="tag">${escH(t)}<button onclick="plTagDel('${pid}',${pl.id},'${escH(t)}')">×</button></span>`).join('')}
        <button class="tag-add-btn" onclick="openTagInp('ptags-${pid}-${pl.id}',t=>{plTagAdd('${pid}',${pl.id},t)})">+ 태그</button>
      </div>
      <div class="plan-date-chip" onclick="event.stopPropagation()"><span style="font-size:11px;padding-left:8px">📅</span><input type="date" class="plan-date-inp" value="${pl.date||''}" onchange="plDate('${pid}',${pl.id},this.value)"></div>
      <span class="plan-arr">${pl.open?'▲':'▼'}</span>
      <button class="plan-del-btn" onclick="event.stopPropagation();planDel('${pid}',${pl.id})">×</button>
    </div>
    ${pl.open?`<div class="plan-body">
      <input class="plan-name-inp" value="${escH(pl.title)}" placeholder="기획안 제목" onchange="plTitle('${pid}',${pl.id},this.value)">
      <input class="plan-caption-inp" value="${escH(pl.caption||'')}" placeholder="캡션 / 설명 (선택)..." oninput="plCaption('${pid}',${pl.id},this.value);plLinkPreview('${pid}',${pl.id},'cap')">
      <div id="clp-${pid}-${pl.id}" style="display:${(pl.caption||'').includes('http')?'block':'none'};font-size:11px;padding:4px 6px 6px;line-height:1.6;background:var(--bg);border-radius:6px;margin-bottom:4px">${autoLink(pl.caption||'')}</div>
      <textarea class="plan-ta" placeholder="내용을 자유롭게 작성하세요..." oninput="plCont('${pid}',${pl.id},this.value);plLinkPreview('${pid}',${pl.id},'cont')">${escH(pl.content||'')}</textarea>
      <div id="tlp-${pid}-${pl.id}" style="display:${(pl.content||'').includes('http')?'block':'none'};font-size:12px;padding:8px 12px;background:var(--bg);border-radius:var(--rs);margin-top:6px;line-height:1.7;white-space:pre-wrap;word-break:break-word;border:1px solid var(--border)">🔗 링크 미리보기<br>${autoLink(pl.content||'')}</div>

}

function plDO(e,pid,id){e.preventDefault();if(_plDrag.pid!==pid||_plDrag.id===id)return;const el=document.getElementById(`pldoc-${pid}-${id}`);if(el){const r=el.getBoundingClientRect(),top=e.clientY<r.top+r.height/2;el.classList.toggle('drag-over-top',top);el.classList.toggle('drag-over-bot',!top);}}

/* ── MEETING NOTES ── */
function mkMN(pid){

/* ── TIMELINE TIMETABLE ENGINE ── */
const TTL_H = 64; // px per hour
const TTL_S = 0;  // start hour
const TTL_E = 24; // end hour (shows 00:00 at the bottom)
const TTL_SNAP = 15; // minute snap

function ttlY(h,m){return((h-TTL_S)+(m||0)/60)*TTL_H;}
function ttlFromY(y,grid,snapOverride){
  const snap=snapOverride||TTL_SNAP;
  const rect=grid.getBoundingClientRect();
  const relY=Math.max(0,y-rect.top+(grid.parentElement?.scrollTop||0));
  const totalM=Math.round(relY/TTL_H*60/snap)*snap;
  const h=Math.floor(totalM/60)+TTL_S;
  const m=totalM%60;
  return{h:Math.max(TTL_S,Math.min(TTL_E-1,h)),m:Math.min(59,Math.max(0,m))};
}
function ttlFmt(h,m){return`${String(h).padStart(2,'0')}:${String(m||0).padStart(2,'0')}`;}
function ttlHourLabel(hr){return hr===24?'00:00':`${String(hr).padStart(2,'0')}:00`;}
function ttlEndFmt(h,m,dur){const em=(h*60+(m||0)+(dur||60));return ttlFmt(Math.floor(em/60),em%60);}

let _ttlDrag=null,_ttlMoved=false;

function mkTTDay(){
  const date=S.ttDate||todayStr();
  const entries=((S.tt||{})[date]||[]);
  const isToday=date===todayStr();
  const now=new Date();
  const totalH=TTL_E-TTL_S;
  const gridH=totalH*TTL_H;

  // Nav header (same as before)
  let h=`<div class="tt-nav">
    <button class="tt-nav-btn" onclick="ttNav(-1)">&#8249;</button>
    <span class="tt-date-lbl">${fmtTTDate(date)}</span>
    <button class="tt-nav-btn" onclick="ttNav(1)">&#8250;</button>
    ${date!==todayStr()?`<button class="tt-today-btn" onclick="S.ttDate=todayStr();sv();uTT()">오늘로</button>`:''}
    <div class="ttv-toggle">
      <button class="ttv-btn on" onclick="S.ttView='day';sv();uTT()">일간</button>
      <button class="ttv-btn" onclick="S.ttView='week';sv();uTT()">주간</button>
    </div>
  </div>`;

  // Hint bar
  h+=`<div style="font-size:11px;color:var(--faint);margin-bottom:8px;display:flex;gap:10px;flex-wrap:wrap">
    <span>🖱 드래그 → 일정 생성</span>
    <span>⌥ Alt+드래그 → 복제</span>
    <span>✏ 클릭 → 수정</span>
  </div>`;

  // Timeline
  h+=`<div class="ttl-outer" id="ttl-outer"><div class="ttl-wrap" style="height:${gridH}px">
    <div class="ttl-labels" style="height:${gridH}px">`;
  for(let hr=TTL_S;hr<=TTL_E;hr++){
    h+=`<div class="ttl-lbl" style="top:${ttlY(hr,0)}px">${ttlHourLabel(hr)}</div>`;
  }
  h+=`</div><div class="ttl-grid" id="ttl-grid" style="height:${gridH}px"
    onmousedown="ttlGDragStart(event)"
    ontouchstart="ttlGDragStart(event)">`;

  // Hour lines
  for(let hr=TTL_S;hr<=TTL_E;hr++){
    h+=`<div class="ttl-hline ttl-major" style="top:${ttlY(hr,0)}px"></div>`;
    if(hr<TTL_E)h+=`<div class="ttl-hline ttl-half" style="top:${ttlY(hr,30)}px"></div>`;
  }

  // Events
  entries.forEach(ev=>{
    const p=ev.pid?gP(ev.pid):null;
    const dur=ev.dur||60;
    const top=ttlY(ev.h,ev.m||0);
    const evH=Math.max(22,(dur/60)*TTL_H-2);
    const bg=p?lc(p.c):'#F2F2F0';const bc=p?p.c:'#C8C8C0';const tc=p?dc(p.c):'#555';
    const showTime=evH>=32;const showProj=evH>=52&&p;
    h+=`<div class="ttl-ev${ev.done?' ttl-ev-done':''}" id="ttlev-${ev.id}"
      style="top:${top}px;height:${evH}px;background:${bg};border-left-color:${bc}"
      data-id="${ev.id}"
      onmousedown="ttlEvMDown(event,${ev.id})"
      ontouchstart="ttlEvMDown(event,${ev.id})"
      onclick="ttlEvClick(event,${ev.id})">
      ${showTime?`<div class="ttl-ev-time" style="color:${tc}">${ttlFmt(ev.h,ev.m)} → ${ttlEndFmt(ev.h,ev.m,dur)}</div>`:''}
      <div class="ttl-ev-title${ev.done?' done':''}" style="color:${tc}">${escH(ev.title)}</div>
      ${showProj?`<div class="ttl-ev-proj" style="color:${tc}">${p.n}</div>`:''}
    </div>`;
  });

  // Current time
  if(isToday){
    const ny=ttlY(now.getHours(),now.getMinutes());
    if(ny>=0&&ny<=gridH)h+=`<div class="ttl-now" style="top:${ny}px"></div>`;
  }
  h+=`<div class="ttl-ghost" id="ttl-ghost"></div>`;
  h+=`</div></div></div>`; // close ttl-grid, ttl-wrap, ttl-outer
  // 현재 시간으로 자동 스크롤
  // 자동스크롤은 setAllTab에서 호출 (innerHTML 스크립트 실행 안 되는 버그 수정)

  // Add form at bottom
  const projOpts=S.projects.map(p=>`<option value="${p.id}">${p.n}</option>`).join('');
  const nowHv=now.getHours(),nextHv=(nowHv+1)%24;
  h+=`<div class="tt-form" style="flex-wrap:wrap;gap:4px">
    <input class="tt-inp sm" id="tt-h" type="number" min="0" max="23" value="${nowHv}" placeholder="시작">
    <span class="tt-sep">:</span>
    <input class="tt-inp sm" id="tt-m" type="number" min="0" max="55" step="5" value="0">
    <span class="tt-sep" style="color:var(--faint);font-size:11px;padding:0 2px">~</span>
    <input class="tt-inp sm" id="tt-eh" type="number" min="0" max="23" value="${nextHv}" placeholder="종료">
    <span class="tt-sep">:</span>
    <input class="tt-inp sm" id="tt-em" type="number" min="0" max="55" step="5" value="0">
    <input class="tt-inp flex" id="tt-title" type="text" placeholder="일정 제목 입력 후 Enter...">
    <select class="tt-sel" id="tt-pid"><option value="">프로젝트 없음</option>${projOpts}</select>
    <button class="tt-add-btn" onclick="ttAdd()">+ 추가</button>
  </div>`;
  return h;
}

// ── DRAG: create on empty grid ─────────────────────────────
function ttlGDragStart(e){
  if(e.target.closest('.ttl-ev'))return;
  const grid=document.getElementById('ttl-grid');if(!grid)return;
  const pt=e.touches?e.touches[0]:e;
  const {h,m}=ttlFromY(pt.clientY,grid);
  _ttlDrag={mode:'create',startH:h,startM:m,curH:h,curM:m};
  _ttlMoved=false;
  const g=document.getElementById('ttl-ghost');
  if(g){g.style.transform=`translateY(${ttlY(h,m)}px)`;g.style.height='4px';g.style.display='block';g.className='ttl-ghost';}
  e.preventDefault&&e.preventDefault();
}

// ── DRAG: move or copy existing event ──────────────────────
function ttlEvMDown(e,id){
  e.stopPropagation();
  const grid=document.getElementById('ttl-grid');if(!grid)return;
  const date=S.ttDate;const ev=(S.tt[date]||[]).find(x=>x.id===id);if(!ev)return;
  const pt=e.touches?e.touches[0]:e;
  const isCopy=e.altKey||e.metaKey;
  _ttlDrag={mode:isCopy?'copy':'move',evId:id,startClientY:pt.clientY,origH:ev.h,origM:ev.m||0,dur:ev.dur||60,isCopy};
  _ttlMoved=false;
  const el=document.getElementById('ttlev-'+id);if(el&&isCopy)el.style.opacity='0.4';
  const g=document.getElementById('ttl-ghost');
  if(g){g.style.transform=`translateY(${ttlY(ev.h,ev.m||0)}px)`;g.style.top='0';g.style.height=Math.max(20,(ev.dur||60)/60*TTL_H-2)+'px';g.style.display='block';g.className='ttl-ghost'+(isCopy?' copy':'');}
  e.preventDefault&&e.preventDefault();
}

// ── DOCUMENT EVENTS (registered once) ─────────────────────
function ttlMouseMove(e){
  if(!_ttlDrag)return;
  e.preventDefault&&e.preventDefault();
  const pt=e.touches?e.touches[0]:e;
  const isWeek=_ttlDrag.mode==='create-wk'||!!_ttlDrag.dateStr;
  const grid=isWeek?document.querySelector(`.ttl-grid[data-date="${_ttlDrag.dateStr}"]`):document.getElementById('ttl-grid');
  if(!grid)return;
  _ttlMoved=true;
  const g=isWeek?document.getElementById('ttl-ghost-'+_ttlDrag.colIdx):document.getElementById('ttl-ghost');

  if(_ttlDrag.mode==='create'||_ttlDrag.mode==='create-wk'){
    const gridEl=grid;
    if(!gridEl)return;
    const rect2=gridEl.getBoundingClientRect();
    // rect.top already reflects the scroll position, so adding scrollTop makes the drag jump.
    const y2=Math.max(0,pt.clientY-rect2.top);
    const totalM2=Math.round(y2/TTL_H*60/1)*1;
    const h2=Math.floor(totalM2/60)+TTL_S;const m2=totalM2%60;
    _ttlDrag.curH=Math.max(TTL_S,Math.min(TTL_E-1,h2));_ttlDrag.curM=Math.min(59,Math.max(0,m2));
    const sY=ttlY(_ttlDrag.startH,_ttlDrag.startM);
    const eY=ttlY(_ttlDrag.curH,_ttlDrag.curM);
    const topPx=Math.min(sY,eY);const ht=Math.max(8,Math.abs(eY-sY));
    const gWk=_ttlDrag.mode==='create-wk'?document.getElementById('ttl-ghost-'+_ttlDrag.colIdx):g;
    if(gWk){gWk.style.transform=`translateY(${topPx}px)`;gWk.style.top='0';gWk.style.height=ht+'px';}
  } else {
    const dy=pt.clientY-_ttlDrag.startClientY;
    const dM=Math.round(dy/TTL_H*60/1)*1;
    const total=Math.max(0,(_ttlDrag.origH-TTL_S)*60+_ttlDrag.origM+dM);
    const rawH=Math.floor(total/60)+TTL_S;const rawM=total%60;
    const newH=Math.max(TTL_S,Math.min(TTL_E-1,rawH));const newM=Math.min(59,Math.max(0,rawM));
    _ttlDrag.newH=newH;_ttlDrag.newM=newM;
    if(g){g.style.transform=`translateY(${ttlY(newH,newM)}px)`;g.style.top='0';g.style.height=Math.max(20,_ttlDrag.dur/60*TTL_H-2)+'px';}
  }
}
function ttlMouseUp(e){
  if(!_ttlDrag)return;
  const g=document.getElementById('ttl-ghost');if(g)g.style.display='none';if(_ttlDrag?.colIdx!=null){const gw=document.getElementById('ttl-ghost-'+_ttlDrag.colIdx);if(gw)gw.style.display='none';}
  const pt=e.changedTouches?e.changedTouches[0]:e;

  if((_ttlDrag.mode==='create'||_ttlDrag.mode==='create-wk')&&_ttlMoved){
    // drop 시 TTL_SNAP(15분)으로 최종 스냅
    const snapSM=Math.round((_ttlDrag.startH*60+_ttlDrag.startM)/TTL_SNAP)*TTL_SNAP;
    const snapEM=Math.round((_ttlDrag.curH*60+_ttlDrag.curM)/TTL_SNAP)*TTL_SNAP;
    const sM=Math.min(snapSM,snapEM),eM=Math.max(snapSM,snapEM);
    const lo=sM,hi=eM;
    const dur=Math.max(15,hi-lo);
    const hh=Math.floor(lo/60);const mm=lo%60;
    if(_ttlDrag.dateStr){if(dur>=10)showTtlQuickAdd(hh,mm,dur,pt.clientX,pt.clientY,_ttlDrag.dateStr);}
    else if(dur>=10)showTtlQuickAdd(hh,mm,dur,pt.clientX,pt.clientY,S.ttDate);
    const gWk=_ttlDrag.colIdx!=null?document.getElementById('ttl-ghost-'+_ttlDrag.colIdx):g;
    if(gWk)gWk.style.display='none';
  } else if((_ttlDrag.mode==='move'||_ttlDrag.mode==='copy')&&_ttlMoved&&_ttlDrag.newH!==undefined){
    const date=_ttlDrag.dateStr||S.ttDate;
    const ev=(S.tt[date]||[]).find(x=>x.id===_ttlDrag.evId);
    if(ev){
      if(_ttlDrag.mode==='copy'){
        const copy={...ev,id:S._ttid++,h:_ttlDrag.newH,m:_ttlDrag.newM};
        (S.tt[date]||(S.tt[date]=[])).push(copy);
      } else {ev.h=_ttlDrag.newH;ev.m=_ttlDrag.newM;}
      sv();uTT();
    }
    const gWk2=_ttlDrag.colIdx!=null?document.getElementById('ttl-ghost-'+_ttlDrag.colIdx):null;
    if(gWk2)gWk2.style.display='none';
    const el=document.getElementById('ttlev-'+_ttlDrag.evId);if(el)el.style.opacity='';
  } else if(!_ttlMoved){
    // restore opacity on non-drag
    const el=document.getElementById('ttlev-'+(_ttlDrag.evId));if(el)el.style.opacity='';
  }
  _ttlDrag=null;_ttlMoved=false;
}

/* URL 자동 링크 변환 */
function autoLink(text){
  if(!text)return'';
  // 먼저 HTML 특수문자 이스케이프
  const safe=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // URL을 링크로 변환 (이스케이프된 텍스트에서)
  return safe.replace(/(https?:\/\/[^\s&<>"']+(?:&amp;[^\s<>"']*)*)/g,
    '<a href="$1" target="_blank" rel="noopener" style="color:#7F77DD;text-decoration:underline;word-break:break-all;font-style:normal" onclick="event.stopPropagation();event.preventDefault();window.open(this.href,\'_blank\')">$1</a>');
}

  if(!__calDragV18) return;
  if(ds !== __calDragV18.end){
    __calDraggedV18 = true;
    __calDragV18.end = ds;
  }
  const a = __calDragV18.start <= __calDragV18.end ? __calDragV18.start : __calDragV18.end;

function saveCalendarEventModal(){
  const title = document.getElementById('cem-title')?.value.trim();
  let startDS = document.getElementById('cem-start')?.value;
  let endDS = document.getElementById('cem-end')?.value || startDS;
  const startTime = document.getElementById('cem-start-time')?.value || '';
  const endTime = document.getElementById('cem-end-time')?.value || '';
  const pid = document.getElementById('cem-pid')?.value;

  if(!title || !startDS || !pid) return;

  if(endDS < startDS){
    const t = startDS;
    startDS = endDS;
    endDS = t;
  }

  const sp = startDS.split('-');
  const ep = endDS.split('-');

  if(!S._eid) S._eid = {};
  if(!S._eid[pid]) S._eid[pid] = 1;
  if(!S.ev) S.ev = {};
  if(!S.ev[pid]) S.ev[pid] = [];

  const evObj = {
    id: S._eid[pid]++,
    y: +sp[0],
    m: +sp[1]-1,
    d: +sp[2],
    ey: +ep[0],
    em: +ep[1]-1,
    ed: +ep[2],
    t: title
  };

  // 시간 추가 시 타임테이블 자동 연동
  if(startTime){
    const [sh, sm] = startTime.split(':');
    evObj.startH = +sh;
    evObj.startM = +sm;
  }

  if(endTime){
    const [eh, em] = endTime.split(':');
    evObj.endH = +eh;
    evObj.endM = +em;
  }

  S.ev[pid].push(evObj);

  // 타임테이블 연결
  if(startTime){
    if(!S.tt) S.tt = {};
    if(!S._ttid) S._ttid = 1;

    if(!S.tt[startDS]) S.tt[startDS] = [];

    S.tt[startDS].push({
      id: S._ttid++,
      title: title,
      pid: pid,
      done: false,
      startH: evObj.startH || 9,
      startM: evObj.startM || 0,
      endH: evObj.endH || ((evObj.startH || 9) + 1),
      endM: evObj.endM || 0
    });
  }

  sv();
  closeCalendarEventModal();
  R();
}

function searchAllData(q){

    box.classList.remove('show');
    box.innerHTML='';

    return;
  }

  const results=[];
  const hit=(text)=>String(text||'').toLowerCase().includes(q);

  (S.projects||[]).forEach(p=>{
    if(hit(p.n)){
      results.push({type:'프로젝트',title:p.n,sub:'프로젝트 페이지로 이동',pid:p.id});
    }

    (S.tasks?.[p.id]||[]).forEach(t=>{
      const tags=(t.tags||[]).join(' ');
      if(hit(t.t)||hit(tags)||hit(t.due)){
        results.push({type:'태스크',title:t.t,sub:`${p.n}${t.due?' · '+t.due:''}${tags?' · #'+tags:''}`,pid:p.id});
      }
    });

    (S.plans?.[p.id]||[]).forEach(pl=>{
      const text=[pl.title,pl.name,pl.caption,pl.content,(pl.tags||[]).join(' ')].join(' ');
      if(hit(text)){
        results.push({type:'기획안',title:pl.title||pl.name||'기획안',sub:p.n,pid:p.id,tab:'plans'});
      }
    });

    (S.mnotes?.[p.id]||[]).forEach(n=>{
      const text=[n.title,n.name,n.content,(n.tags||[]).join(' ')].join(' ');
      if(hit(text)){
        results.push({type:'회의노트',title:n.title||n.name||'회의노트',sub:p.n,pid:p.id,tab:'meetings'});
      }
    });

    (S.rev?.[p.id]||[]).forEach(r=>{
      if(hit(r.d)||hit(r.a)||hit(r.m)||hit(r.y)){
        results.push({type:'수익',title:r.d||'수익 기록',sub:`${p.n} · ${r.y}.${r.m} · ${Number(r.a||0).toLocaleString()}원`,pid:p.id,tab:'revenue'});
      }
    });
  });

  Object.keys(S.tt||{}).forEach(date=>{
    (S.tt[date]||[]).forEach(ev=>{
      const p=gP(ev.pid)||{};
      if(hit(ev.title)||hit(date)||hit(p.n)){
        results.push({type:'타임테이블',title:ev.title,sub:`${date} · ${p.n||''}`,pid:ev.pid,date,tab:'timetable'});
      }
    });
  });

  Object.keys(S.ev||{}).forEach(pid=>{
    const p=gP(pid)||{};
    (S.ev[pid]||[]).forEach(ev=>{
      const s=`${ev.y}-${String((ev.m||0)+1).padStart(2,'0')}-${String(ev.d).padStart(2,'0')}`;
      const e=`${ev.ey||ev.y}-${String((ev.em??ev.m)+1).padStart(2,'0')}-${String(ev.ed||ev.d).padStart(2,'0')}`;
      if(hit(ev.t)||hit(s)||hit(e)||hit(p.n)){
        results.push({type:'캘린더',title:ev.t,sub:`${p.n||''} · ${s}${s!==e?' ~ '+e:''}`,pid,tab:'overview'});
      }
    });
  });

  Object.keys(S.retro||{}).forEach(date=>{
    const r=S.retro[date];if(!r||!r.note)return;
    if(hit(r.note)||hit(date)){
      results.push({type:'회고',title:date+' 회고',sub:r.note.slice(0,60)+(r.note.length>60?'…':''),tab:'retro',date});
    }
  });

  box.innerHTML=results.slice(0,40).map((r,i)=>`
    <div class="search-result" onclick="goSearchResult(${i})">
      <div class="search-type">${escH(r.type)}</div>

      <div class="search-sub">${escH(r.sub||'')}</div>
    </div>`).join('') || `<div class="search-result"><div class="search-sub">검색 결과가 없어요</div></div>`;

  window.__searchResults=results;
  box.classList.add('show');
}

    for(let i=0;i<first;i++)h+=`<div class="cc lg ot"><div class="dn">${pL-first+1+i}</div></div>`;

  function weekStartOf(date){const d=new Date(date+'T12:00:00');const dow=d.getDay();d.setDate(d.getDate()-(dow===0?6:dow-1));return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
  function addDaysStr(date,n){const d=new Date(date+'T12:00:00');d.setDate(d.getDate()+n);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
  function weekDates(date){const s=weekStartOf(date);return Array.from({length:7},(_,i)=>addDaysStr(s,i));}
  function projectWeekActivity(pid,date){const days=weekDates(date);const daily=days.map(ds=>({date:ds,...projectDayActivity(pid,ds)}));
    const tts=daily.flatMap(d=>d.tts.map(x=>({...x,date:d.date}))); const tasks=daily.flatMap(d=>d.tasks.map(x=>({...x,date:d.date}))); const events=daily.flatMap(d=>d.events.map(x=>({...x,date:d.date}))); const retros=daily.map(d=>({date:d.date,retro:d.retro})).filter(x=>retroHasContent(x.retro));
    return {start:days[0],end:days[6],days,daily,tts,tasks,events,retros};
  }
  function listTop(arr,mapper,max=5){return arr.slice(0,max).map(mapper).filter(Boolean);}
  function buildWeeklyRetroText(pid,date){const p=gP(pid);const w=projectWeekActivity(pid,date);const has=w.tts.length||w.tasks.length||w.events.length||w.retros.length;
    if(!has)return `${w.start} ~ ${w.end} 주간 회고\n\n아직 이 주에 기록된 타임블럭/완료 태스크/일정/회고가 없어요.\n기록이 쌓이면 여기서 자동으로 요약해줄게요.`;
    const dayNames=['일','월','화','수','목','금','토'];
    const activeDays=w.daily.filter(d=>d.has).map(d=>{const x=new Date(d.date+'T12:00:00');return `${x.getMonth()+1}/${x.getDate()}(${dayNames[x.getDay()]})`;});
    const taskNames=listTop(w.tasks,t=>`- ${t.t} (${fmtDate(t.date)})`,8).join('\n')||'- 완료 태스크 기록 없음';
    const timeNames=listTop(w.tts,t=>`- ${fmtDate(t.date)} ${ttlFmt(t.h,t.m||0)} ${t.title}`,8).join('\n')||'- 타임블럭 기록 없음';
    const wins=listTop(w.retros,x=>x.retro.wins?`- ${x.retro.wins}`:'',5).join('\n')||'- 아직 적힌 성과 없음';
    const issues=listTop(w.retros,x=>x.retro.issues?`- ${x.retro.issues}`:'',5).join('\n')||'- 아직 적힌 이슈 없음';
    const nexts=listTop(w.retros,x=>x.retro.next?`- ${x.retro.next}`:'',5).join('\n')||'- 다음 액션 미작성';
    const scores=w.retros.map(x=>parseInt(x.retro.score,10)).filter(Number.isFinite);const avgScore=scores.length?(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1):'기록 없음';
    const moods=w.retros.map(x=>x.retro.mood).filter(Boolean);const focuses=w.retros.map(x=>x.retro.focus).filter(Boolean);
    return `${p.n} 주간 회고 (${w.start} ~ ${w.end})\n\n1) 이번 주 활동 요약\n- 활동일: ${activeDays.join(', ')||'기록 없음'}\n- 타임블럭 ${w.tts.length}개 · 완료 태스크 ${w.tasks.length}개 · 일정 ${w.events.length}개 · 회고 ${w.retros.length}개\n- 평균 만족도: ${avgScore}${avgScore==='기록 없음'?'':'/10'}\n- 기분 흐름: ${moods.join(' → ')||'기록 없음'}\n- 집중도 흐름: ${focuses.join(' → ')||'기록 없음'}\n\n2) 완료한 일\n${taskNames}\n\n3) 주요 작업 흐름\n${timeNames}\n\n4) 잘된 점 / 성과\n${wins}\n\n5) 막힌 점 / 아쉬운 점\n${issues}\n\n6) 다음 주 액션\n${nexts}`;
  }
  function mkRetroAI(pid){const p=gP(pid);const sel=(S.retroSel&&S.retroSel[pid])||todayStr();const w=projectWeekActivity(pid,sel);const key=w.start;const saved=S.projWeeklyRetro?.[pid]?.[key]?.text||'';const text=saved||buildWeeklyRetroText(pid,sel);
    return `<div class="retro-ai-panel"><div class="retro-ai-head"><div><div class="retro-ai-title">✨ 회고 AI 자동정리</div><div class="retro-ai-sub">선택한 날짜가 속한 주간(${fmtDate(w.start)}–${fmtDate(w.end)})의 타임테이블, 완료 태스크, 일정, 회고 노트를 모아 정리해요. 외부 AI 연결 없이 브라우저 안에서 자동 요약돼요.</div></div><div class="retro-ai-actions"><button class="retro-ai-btn primary" style="background:${p.c}" onclick="retroAIGenerate('${pid}')">주간 회고 생성</button><button class="retro-ai-btn" onclick="retroAIApplyToDay('${pid}')">오늘 회고에 반영</button></div></div><div class="retro-ai-stats"><div class="retro-ai-stat"><b style="color:${dc(p.c)}">${w.tts.length}</b><span>타임블럭</span></div><div class="retro-ai-stat"><b style="color:${dc(p.c)}">${w.tasks.length}</b><span>완료</span></div><div class="retro-ai-stat"><b style="color:${dc(p.c)}">${w.events.length}</b><span>일정</span></div><div class="retro-ai-stat"><b style="color:${dc(p.c)}">${w.retros.length}</b><span>회고</span></div></div><textarea class="retro-ai-text" id="retro-ai-text">${escH(text)}</textarea><div><button class="retro-ai-btn" onclick="retroAISave('${pid}')">이 요약 저장</button><span class="retro-ai-save" id="retro-ai-save">저장됨 ✓</span></div></div>`;

<!-- ===== v36 타임테이블 드래그 좌표 + 주간회고 저장 위치 명확화 ===== -->
<style>

</style>
<script>
(function(){
  // 1) 타임테이블 드래그: 스크롤값 중복 반영 제거 + 최종 저장 날짜 고정
  function safeTtlFromClientY(clientY, grid, snapOverride){
    const snap=snapOverride||TTL_SNAP;
    const rect=grid.getBoundingClientRect();
    // rect.top은 이미 현재 스크롤 위치를 반영하므로 scrollTop을 더하면 시간이 아래로 튑니다.
    const relY=Math.max(0, Math.min((TTL_E-TTL_S)*TTL_H, clientY-rect.top));
    const totalM=Math.round(relY/TTL_H*60/snap)*snap;
    const h=Math.floor(totalM/60)+TTL_S;
    const m=totalM%60;
    return {h:Math.max(TTL_S,Math.min(TTL_E-1,h)), m:Math.min(59,Math.max(0,m))};
  }
  window.ttlFromY=function(y,grid,snapOverride){return safeTtlFromClientY(y,grid,snapOverride);};

  try{
    document.removeEventListener('mousemove', ttlMouseMove);
    document.removeEventListener('mouseup', ttlMouseUp);
    document.removeEventListener('touchmove', ttlMouseMove);
    document.removeEventListener('touchend', ttlMouseUp);
  }catch(e){}

  window.ttlGDragStart=ttlGDragStart=function(e){
    if(e.target.closest && e.target.closest('.ttl-ev'))return;
    const grid=document.getElementById('ttl-grid');if(!grid)return;
    const pt=e.touches?e.touches[0]:e;
    const tm=safeTtlFromClientY(pt.clientY,grid);
    _ttlDrag={mode:'create',startH:tm.h,startM:tm.m,curH:tm.h,curM:tm.m,dateStr:S.ttDate};
    _ttlMoved=false;
    const g=document.getElementById('ttl-ghost');
    if(g){g.style.transform=`translateY(${ttlY(tm.h,tm.m)}px)`;g.style.top='0';g.style.height='4px';g.style.display='block';g.className='ttl-ghost';}
    e.preventDefault&&e.preventDefault();
  };

  window.ttlWkStart=ttlWkStart=function(e,ds){
    if(e.target.closest && e.target.closest('.ttl-ev'))return;
    const grid=e.currentTarget && e.currentTarget.classList && e.currentTarget.classList.contains('ttl-grid') ? e.currentTarget : document.querySelector(`.ttl-grid[data-date="${ds}"]`);
    if(!grid)return;
    const pt=e.touches?e.touches[0]:e;
    const tm=safeTtlFromClientY(pt.clientY,grid);
    const wdays=getWeekDays(S.ttDate);const idx=wdays.indexOf(ds);
    _ttlWkDragIdx=idx;
    _ttlDrag={mode:'create-wk',startH:tm.h,startM:tm.m,curH:tm.h,curM:tm.m,dateStr:ds,colIdx:idx};
    _ttlMoved=false;
    const g=document.getElementById('ttl-ghost-'+idx);
    if(g){g.style.transform=`translateY(${ttlY(tm.h,tm.m)}px)`;g.style.top='0';g.style.height='4px';g.style.display='block';g.className='ttl-ghost';}
    e.preventDefault&&e.preventDefault();
  };

  window.ttlMouseMove=ttlMouseMove=function(e){
    if(!_ttlDrag)return;
    e.preventDefault&&e.preventDefault();
    const pt=e.touches?e.touches[0]:e;
    const isWeek=_ttlDrag.mode==='create-wk'||_ttlDrag.mode==='move-wk'||_ttlDrag.mode==='copy-wk'||!!_ttlDrag.dateStr&&_ttlDrag.mode!=='create';
    const grid=_ttlDrag.mode==='create-wk'||(_ttlDrag.dateStr&&_ttlDrag.mode!=='create')
      ? document.querySelector(`.ttl-grid[data-date="${_ttlDrag.dateStr}"]`)
      : document.getElementById('ttl-grid');
    if(!grid)return;
    _ttlMoved=true;
    const g=_ttlDrag.colIdx!=null?document.getElementById('ttl-ghost-'+_ttlDrag.colIdx):document.getElementById('ttl-ghost');

    if(_ttlDrag.mode==='create'||_ttlDrag.mode==='create-wk'){
      const tm=safeTtlFromClientY(pt.clientY,grid,1);
      _ttlDrag.curH=tm.h;_ttlDrag.curM=tm.m;
      const sY=ttlY(_ttlDrag.startH,_ttlDrag.startM);
      const eY=ttlY(_ttlDrag.curH,_ttlDrag.curM);
      const topPx=Math.min(sY,eY);const ht=Math.max(8,Math.abs(eY-sY));
      if(g){g.style.transform=`translateY(${topPx}px)`;g.style.top='0';g.style.height=ht+'px';g.style.display='block';}
    }else{
      const dy=pt.clientY-_ttlDrag.startClientY;
      const dM=Math.round(dy/TTL_H*60/1)*1;
      const total=Math.max(0,(_ttlDrag.origH-TTL_S)*60+_ttlDrag.origM+dM);
      const rawH=Math.floor(total/60)+TTL_S;const rawM=total%60;
      const newH=Math.max(TTL_S,Math.min(TTL_E-1,rawH));const newM=Math.min(59,Math.max(0,rawM));
      _ttlDrag.newH=newH;_ttlDrag.newM=newM;
      if(g){g.style.transform=`translateY(${ttlY(newH,newM)}px)`;g.style.top='0';g.style.height=Math.max(20,_ttlDrag.dur/60*TTL_H-2)+'px';g.style.display='block';}
    }
  };

  window.ttlMouseUp=ttlMouseUp=function(e){
    if(!_ttlDrag)return;
    const g=document.getElementById('ttl-ghost');if(g)g.style.display='none';
    if(_ttlDrag.colIdx!=null){const gw=document.getElementById('ttl-ghost-'+_ttlDrag.colIdx);if(gw)gw.style.display='none';}
    const pt=e.changedTouches?e.changedTouches[0]:e;
    if((_ttlDrag.mode==='create'||_ttlDrag.mode==='create-wk')&&_ttlMoved){
      const snapSM=Math.round((_ttlDrag.startH*60+_ttlDrag.startM)/TTL_SNAP)*TTL_SNAP;
      const snapEM=Math.round((_ttlDrag.curH*60+_ttlDrag.curM)/TTL_SNAP)*TTL_SNAP;
      const sM=Math.min(snapSM,snapEM),eM=Math.max(snapSM,snapEM);
      const dur=Math.max(15,eM-sM);
      const hh=Math.floor(sM/60);const mm=sM%60;
      const saveDate=_ttlDrag.dateStr||S.ttDate;
      if(dur>=10)showTtlQuickAdd(hh,mm,dur,pt.clientX,pt.clientY,saveDate);
    }else if((_ttlDrag.mode==='move'||_ttlDrag.mode==='copy')&&_ttlMoved&&_ttlDrag.newH!==undefined){
      const date=_ttlDrag.dateStr||S.ttDate;
      const ev=(S.tt[date]||[]).find(x=>x.id===_ttlDrag.evId);
      if(ev){
        if(_ttlDrag.mode==='copy'){
          const copy={...ev,id:S._ttid++,h:_ttlDrag.newH,m:_ttlDrag.newM};
          (S.tt[date]||(S.tt[date]=[])).push(copy);
        }else{ev.h=_ttlDrag.newH;ev.m=_ttlDrag.newM;}
        sv();uTT();
      }
      const el=document.getElementById('ttlev-'+_ttlDrag.evId);if(el)el.style.opacity='';
    }else if(!_ttlMoved){
      const el=document.getElementById('ttlev-'+(_ttlDrag.evId));if(el)el.style.opacity='';
    }
    _ttlDrag=null;_ttlMoved=false;
  };

  document.addEventListener('mousemove',ttlMouseMove);
  document.addEventListener('mouseup',ttlMouseUp);
  document.addEventListener('touchmove',ttlMouseMove,{passive:false});
  document.addEventListener('touchend',ttlMouseUp);

  // 주간뷰 이벤트 클릭/저장 날짜 고정
  window.ttlEvClick=ttlEvClick=function(e,id,dateOverride){
    if(_ttlMoved)return;
    e.stopPropagation&&e.stopPropagation();
    document.getElementById('ttl-pop')?.remove();
    const date=dateOverride||S.ttDate;
    const ev=(S.tt[date]||[]).find(x=>x.id===id);if(!ev)return;
    const dur=ev.dur||60;const endM=ev.h*60+(ev.m||0)+dur;const endH=Math.floor(endM/60);const endMn=endM%60;
    const projOpts=`<option value="">프로젝트 없음</option>`+S.projects.map(p=>`<option value="${p.id}"${ev.pid===p.id?' selected':''}>${escH(p.n)}</option>`).join('');
    const pop=document.createElement('div');pop.id='ttl-pop';pop.className='ttl-pop';pop.dataset.date=date;
    const px=Math.min((e.clientX||200)+10,window.innerWidth-290);const py=Math.min((e.clientY||200)-10,window.innerHeight-260);
    pop.style.cssText+=`;left:${px}px;top:${py}px`;
    pop.innerHTML=`
      <input id="ttp-title" class="ttl-pop-inp" value="${escH(ev.title)}" placeholder="제목...">
      <div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:6px">🕐 ${ttlFmt(ev.h,ev.m||0)} → ${ttlEndFmt(ev.h,ev.m||0,dur)}</div>
      <div class="ttl-pop-time-row">
        <input id="ttp-sh" type="number" min="0" max="23" value="${ev.h}" style="text-align:center">
        <span style="text-align:center;color:var(--faint);font-size:12px">:</span>
        <input id="ttp-sm" type="number" min="0" max="55" step="5" value="${String(ev.m||0).padStart(2,'0')}" style="text-align:center">
        <span style="text-align:center;color:var(--faint);font-size:11px">~</span>
        <input id="ttp-eh" type="number" min="0" max="24" value="${endH}">
        <span style="text-align:center;color:var(--faint);font-size:12px">:</span>
        <input id="ttp-em" type="number" min="0" max="55" step="5" value="${endMn}">
      </div>
      <select id="ttp-pid" class="ttl-pop-sel">${projOpts}</select>
      <div class="ttl-pop-btns">
        <button class="ttl-pop-save" onclick="ttlEvSave(${id})">저장</button>
        <button class="ttl-pop-btn" onclick="ttCheckDateSafe('${date}',${id});document.getElementById('ttl-pop')?.remove();uTT()">${ev.done?'미완료':'완료'}</button>
        <button class="ttl-pop-btn del" onclick="ttDelDateSafe('${date}',${id});document.getElementById('ttl-pop')?.remove();uTT()">삭제</button>
      </div>`;
    document.body.appendChild(pop);document.getElementById('ttp-title').focus();
    document.getElementById('ttp-title').addEventListener('keydown',ev2=>{if(ev2.key==='Enter')ttlEvSave(id);if(ev2.key==='Escape')pop.remove();});
    setTimeout(()=>{const cl=(ev3)=>{if(!pop.contains(ev3.target)){pop.remove();document.removeEventListener('mousedown',cl);}};document.addEventListener('mousedown',cl);},120);
  };
  window.ttlEvClickWk=ttlEvClickWk=function(e,id,ds){if(_ttlMoved)return;e.stopPropagation&&e.stopPropagation();ttlEvClick(e,id,ds);};
  window.ttlEvSave=ttlEvSave=function(id){
    const date=document.getElementById('ttl-pop')?.dataset.date||S.ttDate;
    const ev=(S.tt[date]||[]).find(x=>x.id===id);if(!ev)return;
    const title=document.getElementById('ttp-title')?.value.trim()||ev.title;
    const sh=parseInt(document.getElementById('ttp-sh')?.value);const sm=parseInt(document.getElementById('ttp-sm')?.value)||0;
    const eh=parseInt(document.getElementById('ttp-eh')?.value);const em=parseInt(document.getElementById('ttp-em')?.value)||0;
    const pid=document.getElementById('ttp-pid')?.value||null;
    const startH=Number.isFinite(sh)?sh:ev.h;const endH=Number.isFinite(eh)?eh:startH+1;
    ev.title=title;ev.h=Math.max(0,Math.min(23,startH));ev.m=sm;ev.dur=Math.max(15,(endH*60+em)-(ev.h*60+sm));ev.pid=pid||null;
    document.getElementById('ttl-pop')?.remove();sv();uTT();
  };
  window.ttCheckDateSafe=function(date,id){const e=((S.tt||{})[date]||[]).find(x=>x.id===id);if(e){e.done=!e.done;sv();}};
  window.ttDelDateSafe=function(date,id){if(S.tt&&S.tt[date]){S.tt[date]=S.tt[date].filter(x=>x.id!==id);sv();}};

  // 2) 주간회고: 저장 위치를 UI에 표시하고 저장된 주차 목록도 보여주기
  function weeklySnippet(txt){return String(txt||'').replace(/\s+/g,' ').trim().slice(0,80)||'저장된 내용 없음';}
  window.mkRetroAI34=function(pid){
    ensureRetro34&&ensureRetro34();
    const p=gP(pid);const sel=S.retroSel[pid]||todayStr();const w=weekAct34(pid,sel);const key=w.start;
    const saved=S.projWeeklyRetro?.[pid]?.[key]?.text||'';
    const txt=saved||weeklyText34(pid,sel);
    const savedWeeks=Object.entries((S.projWeeklyRetro&&S.projWeeklyRetro[pid])||{}).sort((a,b)=>b[0].localeCompare(a[0]));
    const hist=savedWeeks.length?`<div class="weekly-history">${savedWeeks.slice(0,8).map(([wk,obj])=>`<div class="weekly-history-card${wk===key?' on':''}" onclick="retroAILoadWeek36('${pid}','${wk}')"><div class="weekly-history-date">${fmtDate(wk)} 주간 회고</div><div class="weekly-history-snippet">${escH(weeklySnippet(obj.text))}</div></div>`).join('')}</div>`:`<div class="weekly-history"><div class="weekly-history-card"><div class="weekly-history-snippet">아직 저장된 주간회고가 없어요. 생성 버튼을 누르면 여기에 쌓여요.</div></div></div>`;

<script>
(function(){
  function v40Pad(n){return String(n).padStart(2,'0');}
  function v40Today(){return (typeof todayStr==='function')?todayStr():new Date().toISOString().slice(0,10);}
  function v40WeekRange(base){
    const d=new Date((base||v40Today())+'T12:00:00');
    const dow=d.getDay();
    const mon=new Date(d); mon.setDate(d.getDate()-(dow===0?6:dow-1));
    const sun=new Date(mon); sun.setDate(mon.getDate()+6);
    const fmt=x=>`${x.getFullYear()}-${v40Pad(x.getMonth()+1)}-${v40Pad(x.getDate())}`;
    return {s:fmt(mon),e:fmt(sun)};
  }
  function v40Cat(text){
    const t=String(text||'').toLowerCase();
    if(/편집|컷|자막|렌더|프리미어|영상|쇼츠|릴스|업로드|썸네일|수정/.test(t))return '편집';
    if(/기획|대본|스크립트|아이디어|구성|리서치|자료|레퍼런스/.test(t))return '기획';
    if(/회의|미팅|콜|컨펌|피드백|클라이언트|소통/.test(t))return '회의';
    if(/회고|정리|메모|복기|리뷰/.test(t))return '회고';
    if(/디자인|카드|피그마|로고|배너|이미지|시안/.test(t))return '디자인';
    return '기타';
  }
  function v40CollectWeek(){
    const r=v40WeekRange(); const cats={편집:0,기획:0,회의:0,회고:0,디자인:0,기타:0};
    let ttCount=0, taskDone=0, taskTotal=0, meetingCount=0, retroCount=0, totalMin=0;
    Object.keys(S.tt||{}).forEach(ds=>{
      if(ds<r.s||ds>r.e)return;
      (S.tt[ds]||[]).forEach(ev=>{const c=v40Cat(ev.title);const dur=Math.max(15,ev.dur||60);cats[c]+=dur;totalMin+=dur;ttCount++;});
    });
    (S.projects||[]).forEach(p=>{
      (S.tasks[p.id]||[]).forEach(t=>{const due=t.due||t.created||''; if(due>=r.s&&due<=r.e){taskTotal++; if(t.done)taskDone++; cats[v40Cat(t.t)]+= t.done?18:10;}});
      (S.mnotes[p.id]||[]).forEach(n=>{if((n.date||'')>=r.s&&(n.date||'')<=r.e){meetingCount++; cats.회의+=25;}});
      const retro=(S.projRetro&&S.projRetro[p.id])||{};Object.keys(retro).forEach(ds=>{if(ds>=r.s&&ds<=r.e){retroCount++; cats.회고+=15;}});
    });
    return {cats,ttCount,taskDone,taskTotal,meetingCount,retroCount,totalMin};
  }
  function v40Insight(){
    const data=v40CollectWeek();
    const entries=Object.entries(data.cats).sort((a,b)=>b[1]-a[1]);
    const top=entries[0]||['기타',0];
    const second=entries[1]||['기타',0];
    const total=Math.max(1,entries.reduce((s,x)=>s+x[1],0));
    const pct=Math.round(top[1]/total*100);
    const doneRate=data.taskTotal?Math.round(data.taskDone/data.taskTotal*100):0;
    let main='이번 주 데이터가 아직 적어요. 타임블럭과 태스크가 쌓이면 작업 패턴을 더 정확히 보여줄게요.';
    if(top[1]>0){
      if(top[0]==='편집'&&pct>=45) main=`이번 주는 편집 작업 비중이 ${pct}%로 높아요. 제작은 잘 굴러가지만, 기획/정리 시간이 밀리지 않게 한 번 체크해보면 좋아요.`;
      else if(top[0]==='회의'&&data.taskDone<Math.max(2,data.meetingCount)) main=`회의·소통 기록이 많은 편이에요. 회의록에서 바로 실행 태스크로 전환되는 흐름을 한 번 점검해보면 좋아요.`;
      else if(doneRate<35&&data.taskTotal>=3) main=`이번 주 등록된 태스크 대비 완료율이 ${doneRate}%예요. 새 일을 늘리기보다 오래 열린 태스크부터 줄이는 게 좋아 보여요.`;
      else if(top[0]==='기획'&&pct>=40) main=`이번 주는 기획 비중이 ${pct}%예요. 방향 잡기는 충분해 보여서, 실행 태스크로 쪼개는 단계가 필요해 보여요.`;
      else main=`이번 주는 ${top[0]} 비중이 가장 높아요. 다음으로는 ${second[0]} 작업이 많아서, 지금 흐름은 ${top[0]} 중심으로 굴러가는 중이에요.`;
    }
    const hours=data.totalMin?`${Math.floor(data.totalMin/60)}h ${v40Pad(data.totalMin%60)}m`:'기록 적음';
    return {main,top:`${top[0]} ${pct}%`,done:data.taskTotal?`${data.taskDone}/${data.taskTotal} 완료`:'태스크 적음',time:hours};
  }
  function v40TodayTimeline(){
    const ds=v40Today();
    return ((S.tt||{})[ds]||[]).slice().sort((a,b)=>(a.h*60+(a.m||0))-(b.h*60+(b.m||0)));
  }
  window.mkAllInsightTop=function(){
    const ins=v40Insight();
    const list=v40TodayTimeline();
    const today=v40Today().slice(5).replace('-','/');
    const rows=list.slice(0,4).map(ev=>{const p=ev.pid?gP(ev.pid):null;const col=p?p.c:'#C8C8C0';return `<div class="today-line-row" style="border-left-color:${col}"><span class="today-line-time">${v40Pad(ev.h)}:${v40Pad(ev.m||0)}</span><span class="today-line-name">${escH(ev.title)}</span>${p?`<span class="today-line-proj" style="color:${dc(p.c)}">${escH(p.n)}</span>`:''}</div>`;}).join('');
    return `<section class="all-top-widgets" id="all-top-widgets">
      <div class="ai-work-card">
        <div class="ai-work-head"><div class="ai-work-title">AI 작업 인사이트</div><div class="ai-work-pill">이번 주 기준</div></div>
        <div class="ai-work-main">${escH(ins.main)}</div>
        <div class="ai-work-subgrid">
          <div class="ai-work-mini"><div class="ai-work-mini-lbl">가장 많은 작업</div><div class="ai-work-mini-val">${escH(ins.top)}</div></div>
          <div class="ai-work-mini"><div class="ai-work-mini-lbl">태스크 흐름</div><div class="ai-work-mini-val">${escH(ins.done)}</div></div>
          <div class="ai-work-mini"><div class="ai-work-mini-lbl">기록된 시간</div><div class="ai-work-mini-val">${escH(ins.time)}</div></div>
        </div>
      </div>
      <div class="today-line-card">
        <div class="today-line-head"><div class="today-line-title">오늘의 타임라인</div><div class="today-line-date">${today}</div></div>
        <div class="today-line-list">${rows || '<div class="today-line-empty">오늘 등록된 타임블럭이 없어요.<br>캘린더에서 오늘 일정을 잡아보세요.</div>'}</div>
        ${list.length>4?`<div class="today-line-more">+${list.length-4}개 더 있음</div>`:''}
      </div>
    </section>`;
  };
  const prevRAll=window.rAll;
  window.rAll=rAll=function(){
    prevRAll();
    const main=document.getElementById('main');
    if(!main||typeof window.mkAllInsightTop!=='function')return;
    const _ew=document.getElementById('all-top-widgets');
    if(_ew){const _t=document.createElement('div');_t.innerHTML=window.mkAllInsightTop();const _n=_t.firstElementChild;if(_n)_ew.replaceWith(_n);}
    else{const tabs=main.querySelector('.all-tabs');if(tabs)tabs.insertAdjacentHTML('beforebegin',window.mkAllInsightTop());}
  };
})();
</script>


<script id="plan-archive-patch">
(function(){
  function ensureArchiveState(){
    if(!S.archiveFilter)S.archiveFilter={q:'',pid:'all',status:'all'};
    (S.projects||[]).forEach(p=>{
      (S.plans[p.id]||[]).forEach(pl=>{
        if(pl.archived===undefined)pl.archived=false;
      });
    });
  }
  function arcStatus(pl){return pl.status==='done'?'done':(pl.status==='review'?'review':'ongoing');}
  function arcStatusLabel(st){return st==='done'?'완료':st==='review'?'검토':'진행중';}
  function arcStatusColor(st,p){return st==='done'?'#3A7A0A':st==='review'?'#BA7517':(p?p.c:'#7F77DD');}
  function arcPlan(pid,id){return (S.plans[pid]||[]).find(x=>String(x.id)===String(id));}
  function archivedItems(){
    ensureArchiveState();
    const items=[];
    (S.projects||[]).forEach(p=>{
      (S.plans[p.id]||[]).forEach(pl=>{if(pl.archived)items.push({pid:p.id,project:p,plan:pl});});
    });
    items.sort((a,b)=>String(b.plan.archivedAt||b.plan.date||'').localeCompare(String(a.plan.archivedAt||a.plan.date||'')));

    const all=document.getElementById('nav-all'); if(!all||document.getElementById('nav-plan-archive'))return;
    all.insertAdjacentHTML('afterend',`<div class="ni" id="nav-plan-archive" onclick="openPlanArchive()"><div class="ndot" style="background:#B5B5AD;cursor:default"></div><span class="nname">기획안 아카이브</span></div>`);
  }
  const oldRsb=window.rSB||rSB;
  window.rSB=rSB=function(){
    oldRsb();ensureArchiveNav();
    const nav=document.getElementById('nav-plan-archive');
    if(nav)nav.className='ni'+(S.tab==='planArchive'?' active':'');
    const all=document.getElementById('nav-all');
    if(all&&S.tab==='planArchive')all.classList.remove('active');
  };
  window.openPlanArchive=function(){S.tab='planArchive';sv();rSB();rPlanArchive();closeSB&&closeSB();};
  const oldR=window.R||R;
  window.R=R=function(){if(S.tab==='planArchive'){rSB();rPlanArchive();return;}oldR();};

  window.mkPlans=function(pid){
    ensureArchiveState();
    const p=gP(pid); if(!p) return '';
    const all=(S.plans[pid]||[]);
    const plans=all.filter(pl=>!pl.archived);
    const archivedN=all.filter(pl=>pl.archived).length;
    const cols=[['ongoing','진행중'],['review','검토'],['done','완료']];
    const counts={ongoing:0,review:0,done:0};
    plans.forEach(pl=>counts[arcStatus(pl)]++);
    const doneN=counts.done,total=plans.length;
    let h=`<div class="kanban-toolbar"><div class="kanban-meta">
      <div class="kb-chip"><span class="kb-dot" style="background:${p.c}"></span>활성 ${total}개</div>
      <div class="kb-chip"><span class="kb-dot" style="background:#BA7517"></span>검토 ${counts.review}개</div>
      <div class="kb-chip"><span class="kb-dot" style="background:#3A7A0A"></span>완료 ${doneN}개</div>
      ${archivedN?`<div class="kb-chip"><span class="kb-dot" style="background:#B5B5AD"></span>보관 ${archivedN}개</div>`:''}
    </div></div>`;
    h+=`<div class="kanban-board">`;
    cols.forEach(([st,label])=>{
      const colPlans=plans.filter(pl=>arcStatus(pl)===st);
      h+=`<section class="kb-col" data-status="${st}" ondragover="kbDragOver(event,'${pid}','${st}')" ondragleave="kbDragLeave(event)" ondrop="kbDrop(event,'${pid}','${st}')">
        <div class="kb-col-hd"><div class="kb-col-title"><span class="kb-dot" style="background:${arcStatusColor(st,p)}"></span>${label}</div><div class="kb-count">${colPlans.length}</div></div>
        <div class="kb-list">${colPlans.length?colPlans.map(pl=>mkKanbanCard(pid,pl,p)).join(''):`<div class="kb-empty">여기로 카드를 드래그해도 돼요</div>`}</div>
      </section>`;
    });
    h+=`</div>`;
    return h;
  };

  window.archivePlan=function(pid,id){
    const pl=arcPlan(pid,id); if(!pl)return;
    pl.archived=true;pl.archivedAt=todayStr();sv();closePlanSide&&closePlanSide();
    if(S.tab==='planArchive')rPlanArchive();else uPlan(pid);
  };
  window.restorePlan=function(pid,id){
    const pl=arcPlan(pid,id); if(!pl)return;
    pl.archived=false;delete pl.archivedAt;sv();closePlanSide&&closePlanSide();
    if(S.tab==='planArchive')rPlanArchive();else uPlan(pid);
  };
  window.archiveDonePlans=function(pid){
    const arr=(S.plans[pid]||[]).filter(pl=>!pl.archived&&arcStatus(pl)==='done');
    if(!arr.length){alert('아카이브할 완료 기획안이 없어요.');return;}
    if(!confirm(`완료된 기획안 ${arr.length}개를 아카이브할까요?`))return;
    arr.forEach(pl=>{pl.archived=true;pl.archivedAt=todayStr();});sv();uPlan(pid);rSB();
  };

  const oldOpen=window.openPlanSide;
  window.openPlanSide=function(pid,id){
    oldOpen(pid,id);
    setTimeout(()=>{
      const pl=arcPlan(pid,id); const ft=document.querySelector('#plan-side .plan-side-ft');
      if(!pl||!ft||document.getElementById('ps-archive-toggle'))return;
      const btn=document.createElement('button');
      btn.id='ps-archive-toggle';btn.className='btn-cancel';
      btn.style.marginRight='8px';
      btn.textContent=pl.archived?'아카이브 해제':'아카이브';
      btn.onclick=function(){pl.archived?restorePlan(pid,id):archivePlan(pid,id);};
      const right=ft.querySelector('div:last-child')||ft;
      right.insertBefore(btn,right.firstChild);
    },0);
  };

  window.setArchiveFilter=function(k,v){ensureArchiveState();S.archiveFilter[k]=v;sv();rPlanArchive();};
  window.clearArchiveFilter=function(){S.archiveFilter={q:'',pid:'all',status:'all'};sv();rPlanArchive();};
  window.rPlanArchive=function(){
    ensureArchiveState();
    const f=S.archiveFilter||{q:'',pid:'all',status:'all'};
    let items=archivedItems();
    const q=String(f.q||'').trim().toLowerCase();
    if(f.pid&&f.pid!=='all')items=items.filter(x=>x.pid===f.pid);
    if(f.status&&f.status!=='all')items=items.filter(x=>arcStatus(x.plan)===f.status);
    if(q)items=items.filter(x=>[x.plan.title,x.plan.caption,x.plan.content,x.project.n,(x.plan.tags||[]).join(' ')].some(v=>String(v||'').toLowerCase().includes(q)));
    const allItems=archivedItems();
    const doneAll=allItems.filter(x=>arcStatus(x.plan)==='done').length;
    const main=document.getElementById('main'); if(!main)return;
    main.innerHTML=`<div class="archive-page">
      <div class="ph" style="margin-bottom:0"><div class="ptitle">기획안 아카이브</div></div>
      <section class="archive-hero"><div><div class="archive-title">끝난 기획안은 여기서 가볍게 보관해요</div><div class="archive-desc">완료 컬럼이 너무 길어지지 않도록 보관한 기획안을 모아두는 페이지예요. 검색/필터로 다시 찾고, 필요하면 바로 복원할 수 있어요.</div></div><div class="archive-stats"><div class="archive-stat"><div class="archive-stat-lbl">Archived</div><div class="archive-stat-val">${allItems.length}</div></div><div class="archive-stat"><div class="archive-stat-lbl">Done</div><div class="archive-stat-val">${doneAll}</div></div><div class="archive-stat"><div class="archive-stat-lbl">Projects</div><div class="archive-stat-val">${new Set(allItems.map(x=>x.pid)).size}</div></div></div></section>
      <section class="archive-controls"><input class="archive-input" value="${escH(f.q||'')}" placeholder="제목, 태그, 내용 검색…" oninput="setArchiveFilter('q',this.value)"><select class="archive-select" onchange="setArchiveFilter('pid',this.value)"><option value="all">모든 프로젝트</option>${S.projects.map(p=>`<option value="${p.id}" ${f.pid===p.id?'selected':''}>${escH(p.n)}</option>`).join('')}</select><select class="archive-select" onchange="setArchiveFilter('status',this.value)"><option value="all">모든 상태</option><option value="done" ${f.status==='done'?'selected':''}>완료</option><option value="review" ${f.status==='review'?'selected':''}>검토</option><option value="ongoing" ${f.status==='ongoing'?'selected':''}>진행중</option></select></section>
      <section class="archive-grid">${items.length?items.map(x=>archiveCard(x)).join(''):`<div class="archive-empty">보관된 기획안이 없어요.<br>각 프로젝트의 기획안 상세에서 ‘아카이브’를 누르면 여기로 모여요.</div>`}</section>
    </div>`;
  };
  function archiveCard(x){
    const p=x.project,pl=x.plan,st=arcStatus(pl);
    const tags=(pl.tags||[]).slice(0,5).map(t=>`<span class="archive-tag">#${escH(t)}</span>`).join('');
    return `<article class="archive-card" style="border-left-color:${p.c}" onclick="openPlanSide('${x.pid}',${pl.id})">
      <div class="archive-card-top"><span class="archive-proj-dot" style="background:${p.c}"></span><span class="archive-proj-name">${escH(p.n)}</span><span class="archive-date">${escH(pl.archivedAt||pl.date||'')}</span></div>
      <div class="archive-card-title">${escH(pl.title||'제목 없음')}</div>
      ${pl.caption?`<div class="archive-caption">${escH(pl.caption)}</div>`:''}
      <div class="archive-tags">${tags||`<span class="archive-tag">${arcStatusLabel(st)}</span>`}</div>
      <div class="archive-actions"><button class="archive-btn" onclick="event.stopPropagation();restorePlan('${x.pid}',${pl.id})">복원</button><button class="archive-btn" onclick="event.stopPropagation();openPlanSide('${x.pid}',${pl.id})">열기</button></div>
    </article>`;
  }

  ensureArchiveState();
  const oldSv=window.sv||sv;
  window.sv=sv=function(){ensureArchiveState();oldSv();};
  setTimeout(()=>{ensureArchiveNav();rSB&&rSB();},0);
})();
</script>

<script id="all-retro-page-patch">
(function(){
  function ensureAllRetroState(){
    if(!S.projRetro)S.projRetro={};
    if(!S.projWeeklyRetro)S.projWeeklyRetro={};
    if(!S.allRetroFilter)S.allRetroFilter={q:'',pid:'all',type:'all'};
    (S.projects||[]).forEach(p=>{if(!S.projRetro[p.id])S.projRetro[p.id]={};if(!S.projWeeklyRetro[p.id])S.projWeeklyRetro[p.id]={};});
  }
  function retroPlain(r){
    if(!r)return'';
    if(typeof r==='string')return r;
    return [r.note,r.summary,r.wins,r.issues,r.learned,r.next].map(x=>String(x||'').trim()).filter(Boolean).join('\n');
  }
  function allRetroDaily(){
    ensureAllRetroState();
    const out=[];
    (S.projects||[]).forEach(p=>{
      Object.keys(S.projRetro[p.id]||{}).forEach(ds=>{
        const r=S.projRetro[p.id][ds];
        const text=retroPlain(r);
        if(text.trim())out.push({kind:'daily',pid:p.id,project:p,date:ds,title:`${fmtDate(ds)} 회고`,text,retro:r,updated:(r&&r.updated)||0});
      });
    });
    return out;
  }
  function allRetroWeekly(){
    ensureAllRetroState();
    const out=[];
    (S.projects||[]).forEach(p=>{
      Object.keys(S.projWeeklyRetro[p.id]||{}).forEach(wk=>{
        const obj=S.projWeeklyRetro[p.id][wk]||{};
        const text=String(obj.text||'').trim();
        if(text)out.push({kind:'weekly',pid:p.id,project:p,date:wk,title:`${fmtDate(wk)} 주간 회고`,text,updated:obj.updated||0});
      });
    });
    return out;
  }
  function allRetroItems(){return allRetroDaily().concat(allRetroWeekly()).sort((a,b)=>(b.updated||0)-(a.updated||0)||String(b.date).localeCompare(String(a.date)));}
  function ensureAllRetroNav(){
    if(document.getElementById('nav-all-retro'))return;
    const anchor=document.getElementById('nav-plan-archive')||document.getElementById('nav-all');
    if(!anchor)return;
    anchor.insertAdjacentHTML('afterend',`<div class="ni" id="nav-all-retro" onclick="openAllRetro()"><div class="ndot" style="background:#8D8A80;cursor:default"></div><span class="nname">전체 회고</span></div>`);
  }
  const prevRsb=window.rSB||rSB;
  window.rSB=rSB=function(){
    prevRsb();ensureAllRetroNav();
    const nav=document.getElementById('nav-all-retro');
    if(nav)nav.className='ni'+(S.tab==='allRetro'?' active':'');
    if(S.tab==='allRetro'){
      const all=document.getElementById('nav-all');if(all)all.classList.remove('active');
      const arc=document.getElementById('nav-plan-archive');if(arc)arc.classList.remove('active');
    }
  };
  window.openAllRetro=function(){ensureAllRetroState();S.tab='allRetro';sv();rSB();rAllRetro();if(typeof closeSB==='function')closeSB();};
  const prevR=window.R||R;
  window.R=R=function(){if(S.tab==='allRetro'){rSB();rAllRetro();return;}prevR();};
  window.setAllRetroFilter=function(k,v){ensureAllRetroState();S.allRetroFilter[k]=v;sv();rAllRetro();};
  window.goAllRetroItem=function(kind,pid,date){
    if(kind==='weekly'){
      if(!S.retroSel)S.retroSel={};S.retroSel[pid]=date;
      if(!S.ptab)S.ptab={};S.ptab[pid]='retro';S.tab=pid;sv();R();return;
    }
    if(typeof goRetro==='function'){goRetro(pid,date);return;}
    if(!S.retroSel)S.retroSel={};S.retroSel[pid]=date;
    if(!S.ptab)S.ptab={};S.ptab[pid]='retro';S.tab=pid;sv();R();
  };
  function card(x){
    const p=x.project;
    const text=x.text||'';
    const tags=[];
    tags.push(x.kind==='weekly'?'주간':'날짜별');
    if(x.kind==='daily'&&x.retro){if(x.retro.mood)tags.push(x.retro.mood);if(x.retro.focus)tags.push('집중 '+x.retro.focus);if(x.retro.score!==''&&x.retro.score!==undefined)tags.push(x.retro.score+'/10');}
    return `<article class="all-retro-card" style="border-left-color:${p.c}" onclick="goAllRetroItem('${x.kind}','${x.pid}','${x.date}')">
      <div class="all-retro-card-top"><span class="all-retro-proj-dot" style="background:${p.c}"></span><span class="all-retro-proj-name">${escH(p.n)}</span><span class="all-retro-date">${escH(x.date)}</span></div>
      <div class="all-retro-card-title">${escH(x.title)}</div>
      <div class="all-retro-note">${escH(text.slice(0,240))}${text.length>240?'…':''}</div>
      <div class="all-retro-tags">${tags.slice(0,5).map(t=>`<span class="all-retro-tag">${escH(t)}</span>`).join('')}</div>
    </article>`;
  }
  window.rAllRetro=function(){
    ensureAllRetroState();
    const f=S.allRetroFilter||{q:'',pid:'all',type:'all'};
    const all=allRetroItems();
    let items=all.slice();
    const q=String(f.q||'').trim().toLowerCase();
    if(f.pid&&f.pid!=='all')items=items.filter(x=>x.pid===f.pid);
    if(f.type&&f.type!=='all')items=items.filter(x=>x.kind===f.type);
    if(q)items=items.filter(x=>[x.project.n,x.date,x.title,x.text].some(v=>String(v||'').toLowerCase().includes(q)));
    const main=document.getElementById('main');if(!main)return;
    main.innerHTML=`<div class="all-retro-page">
      <div class="ph" style="margin-bottom:0"><div class="ptitle">전체 회고</div></div>
      <section class="all-retro-hero"><div><div class="all-retro-title">프로젝트 회고를 한 곳에서 모아봐요</div><div class="all-retro-desc">날짜별 회고와 저장된 주간회고를 전체 프로젝트 기준으로 모아보는 페이지예요. 카드를 클릭하면 해당 프로젝트의 회고 탭으로 바로 이동해요.</div></div><div class="all-retro-stats"><div class="all-retro-stat"><div class="all-retro-stat-lbl">Daily</div><div class="all-retro-stat-val">${allRetroDaily().length}</div></div><div class="all-retro-stat"><div class="all-retro-stat-lbl">Weekly</div><div class="all-retro-stat-val">${allRetroWeekly().length}</div></div><div class="all-retro-stat"><div class="all-retro-stat-lbl">Projects</div><div class="all-retro-stat-val">${new Set(all.map(x=>x.pid)).size}</div></div></div></section>
      <section class="all-retro-controls"><input class="all-retro-input" value="${escH(f.q||'')}" placeholder="회고 내용, 프로젝트명, 날짜 검색…" oninput="setAllRetroFilter('q',this.value)"><select class="all-retro-select" onchange="setAllRetroFilter('pid',this.value)"><option value="all">모든 프로젝트</option>${S.projects.map(p=>`<option value="${p.id}" ${f.pid===p.id?'selected':''}>${escH(p.n)}</option>`).join('')}</select><select class="all-retro-select" onchange="setAllRetroFilter('type',this.value)"><option value="all">전체 회고</option><option value="daily" ${f.type==='daily'?'selected':''}>날짜별</option><option value="weekly" ${f.type==='weekly'?'selected':''}>주간</option></select></section>
      <section class="all-retro-grid">${items.length?items.map(card).join(''):`<div class="all-retro-empty">아직 모아볼 회고가 없어요.<br>프로젝트 회고 탭에서 날짜별 회고를 작성하거나 주간회고를 저장하면 여기에 쌓여요.</div>`}</section>
    </div>`;
  };
  ensureAllRetroState();
  setTimeout(()=>{ensureAllRetroNav();if(typeof rSB==='function')rSB();},0);
})();
</script>



<style id="global-weekly-retro-style">

<script id="global-weekly-retro-repair-patch">
(function(){
  function pad(n){return String(n).padStart(2,'0');}
  function dsFromDate(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
  function weekStart(ds){const d=new Date((ds||todayStr())+'T12:00:00');const dow=d.getDay();d.setDate(d.getDate()-(dow===0?6:dow-1));return dsFromDate(d);}
  function weekEnd(wk){const d=new Date(wk+'T12:00:00');d.setDate(d.getDate()+6);return dsFromDate(d);}
  function ensureGlobalRetroState(){
    if(!S.globalWeeklyRetro)S.globalWeeklyRetro={};
    if(!S.globalRetroWeek)S.globalRetroWeek=weekStart(todayStr());
    if(!S.projRetro)S.projRetro={};
    if(!S.projWeeklyRetro)S.projWeeklyRetro={};
  }
  function inWeek(ds,wk){const end=weekEnd(wk);return ds>=wk&&ds<=end;}
  function plainRetro(r){if(!r)return'';if(typeof r==='string')return r;return [r.note,r.summary,r.wins,r.issues,r.learned,r.next].map(x=>String(x||'').trim()).filter(Boolean).join(' / ');}
  function ttMinutesForProject(pid,wk){let min=0;Object.keys(S.tt||{}).forEach(ds=>{if(!inWeek(ds,wk))return;(S.tt[ds]||[]).forEach(e=>{if(e.pid===pid)min+=(e.dur||60);});});return min;}
  function ttMinutesAll(wk){let min=0;Object.keys(S.tt||{}).forEach(ds=>{if(!inWeek(ds,wk))return;(S.tt[ds]||[]).forEach(e=>{min+=(e.dur||60);});});return min;}
  function fmtMin(min){const h=Math.floor(min/60),m=min%60;return h?`${h}h ${String(m).padStart(2,'0')}m`:`${m}m`;}
  function projectWeekRows(wk){
    return (S.projects||[]).map(p=>{
      const tasks=(S.tasks[p.id]||[]).filter(t=>(t.due&&inWeek(t.due,wk))||(t.created&&inWeek(t.created,wk)));
      const done=tasks.filter(t=>t.done).length;
      const minutes=ttMinutesForProject(p.id,wk);
      const retros=Object.keys((S.projRetro||{})[p.id]||{}).filter(ds=>inWeek(ds,wk)).map(ds=>plainRetro(S.projRetro[p.id][ds])).filter(Boolean);
      const meetings=(S.mnotes[p.id]||[]).filter(n=>n.date&&inWeek(n.date,wk));
      const plans=(S.plans[p.id]||[]).filter(pl=>pl.date&&inWeek(pl.date,wk));
      return {p,tasks,done,minutes,retros,meetings,plans};
    }).filter(x=>x.tasks.length||x.minutes||x.retros.length||x.meetings.length||x.plans.length);
  }
  function deriveGlobalText(wk){
    const rows=projectWeekRows(wk);
    const allMin=ttMinutesAll(wk);
    const allTasks=rows.reduce((s,x)=>s+x.tasks.length,0);
    const allDone=rows.reduce((s,x)=>s+x.done,0);
    const top=rows.slice().sort((a,b)=>b.minutes-a.minutes)[0];
    const retroTexts=rows.flatMap(x=>x.retros).join(' ').toLowerCase();
    const words=['편집','기획','회의','수정','업로드','레퍼런스','쇼츠','디자인','회고','촬영'].map(w=>({w,c:(retroTexts.match(new RegExp(w,'g'))||[]).length})).filter(x=>x.c>0).sort((a,b)=>b.c-a.c).slice(0,3);
    const lines=[];
    lines.push(`이번 주는 총 ${fmtMin(allMin)} 작업했고, 태스크는 ${allDone}/${allTasks}개 완료했어요.`);
    if(top)lines.push(`가장 비중이 큰 프로젝트는 ${top.p.n}이고, 기록된 작업시간은 ${fmtMin(top.minutes)}예요.`);
    if(words.length)lines.push(`회고에서 자주 보인 키워드는 ${words.map(x=>x.w).join(', ')} 쪽이에요.`);
    const low=rows.find(x=>x.minutes>=120&&x.done===0&&x.tasks.length>0);
    if(low)lines.push(`${low.p.n}은 작업시간 대비 완료 태스크가 적어서, 다음 주엔 범위를 더 작게 쪼개보는 게 좋아요.`);
    const manyMeet=rows.find(x=>x.meetings.length>=2&&x.tasks.length===0);
    if(manyMeet)lines.push(`${manyMeet.p.n}은 회의록은 있는데 연결된 태스크가 적어요. 회의 후 액션아이템을 바로 태스크로 바꾸면 좋아요.`);
    if(!rows.length)lines.push('이번 주 기록이 아직 부족해요. 타임블럭이나 날짜별 회고를 조금만 쌓으면 자동 회고가 더 선명해져요.');
    lines.push('다음 주는 시간이 많이 들어간 프로젝트부터 “완료 기준”을 먼저 정하고 시작해보면 좋아요.');
    return lines.join('\n');
  }
  window.generateGlobalWeeklyRetro=function(){ensureGlobalRetroState();const wk=S.globalRetroWeek||weekStart(todayStr());const text=deriveGlobalText(wk);S.globalWeeklyRetro[wk]={text,created:Date.now(),updated:Date.now(),week:wk};sv();rAllRetro();};
  window.setGlobalRetroWeek=function(wk){ensureGlobalRetroState();S.globalRetroWeek=wk;sv();rAllRetro();};
  window.navGlobalRetroWeek=function(dir){ensureGlobalRetroState();const d=new Date((S.globalRetroWeek||weekStart(todayStr()))+'T12:00:00');d.setDate(d.getDate()+dir*7);S.globalRetroWeek=dsFromDate(d);sv();rAllRetro();};
  window.openAllRetro=function(){ensureGlobalRetroState();S.tab='allRetro';sv();if(typeof rSB==='function')rSB();rAllRetro();if(typeof closeSB==='function')closeSB();};
  window.rAllRetro=function(){
    ensureGlobalRetroState();
    const wk=S.globalRetroWeek||weekStart(todayStr());const end=weekEnd(wk);const saved=S.globalWeeklyRetro[wk];const rows=projectWeekRows(wk);
    const totalMin=ttMinutesAll(wk);const totalTasks=rows.reduce((s,x)=>s+x.tasks.length,0);const totalDone=rows.reduce((s,x)=>s+x.done,0);
    const hist=Object.keys(S.globalWeeklyRetro||{}).sort().reverse();
    const main=document.getElementById('main');if(!main)return;
    main.innerHTML=`<div class="global-retro-page">
      <div class="ph" style="margin-bottom:0"><div class="ptitle">전체 회고</div></div>
      <section class="global-retro-hero">
        <div><div class="global-retro-title">주간 전체 회고</div><div class="global-retro-desc">모든 프로젝트의 타임블럭, 태스크, 회의록, 날짜별 회고를 모아서 한 주의 흐름을 정리해요. 프로젝트별 회고는 각 프로젝트에 남기고, 전체 회고는 주간 운영 리포트처럼 쌓입니다.</div><div class="global-retro-actions"><button class="global-retro-btn" onclick="generateGlobalWeeklyRetro()">AI 주간 전체 회고 생성</button><button class="global-retro-btn ghost" onclick="setGlobalRetroWeek('${weekStart(todayStr())}')">이번 주 보기</button></div></div>
        <div class="global-retro-weekbox"><div><div class="global-retro-week-label">Selected week</div><div class="global-retro-week-main">${escH(wk)} ~ ${escH(end)}</div><div class="global-retro-week-sub">작업 ${fmtMin(totalMin)} · 태스크 ${totalDone}/${totalTasks} · 활동 프로젝트 ${rows.length}개</div></div><div class="global-retro-nav"><button onclick="navGlobalRetroWeek(-1)">‹ 이전 주</button><button onclick="navGlobalRetroWeek(1)">다음 주 ›</button></div></div>
      </section>
      <section class="global-retro-grid">
        <div class="global-retro-card"><div class="global-retro-card-title"><span>AI 주간 전체 회고</span><span>${saved?'저장됨':'미생성'}</span></div>${saved?`<div class="global-retro-summary">${escH(saved.text||'')}</div>`:`<div class="global-retro-empty">아직 이 주의 전체 회고가 없어요.<br>위 버튼을 누르면 현재 주 기록을 기준으로 자동 생성돼요.</div>`}</div>
        <div class="global-retro-card"><div class="global-retro-card-title">저장된 주간 회고</div><div class="global-retro-list">${hist.length?hist.map(k=>`<div class="global-retro-mini${k===wk?' on':''}" onclick="setGlobalRetroWeek('${k}')"><div class="global-retro-mini-date">${escH(k)} ~ ${escH(weekEnd(k))}</div><div class="global-retro-mini-text">${escH((S.globalWeeklyRetro[k].text||'').slice(0,120))}${(S.globalWeeklyRetro[k].text||'').length>120?'…':''}</div></div>`).join(''):`<div class="global-retro-empty">저장된 전체 주간회고가 아직 없어요.</div>`}</div></div>
      </section>
      <section class="global-retro-card"><div class="global-retro-card-title">프로젝트별 이번 주 요약</div><div class="global-retro-proj-list">${rows.length?rows.map(x=>`<div class="global-retro-proj" style="border-left-color:${x.p.c}"><div class="global-retro-proj-top"><span class="global-retro-dot" style="background:${x.p.c}"></span><span class="global-retro-proj-name">${escH(x.p.n)}</span><span class="global-retro-proj-meta">${fmtMin(x.minutes)}</span></div><div class="global-retro-proj-body">태스크 ${x.done}/${x.tasks.length} · 회의록 ${x.meetings.length} · 회고 ${x.retros.length} · 기획안 ${x.plans.length}</div><div class="global-retro-pillrow">${x.retros.slice(0,2).map(t=>`<span class="global-retro-pill">${escH(t.slice(0,28))}${t.length>28?'…':''}</span>`).join('')}</div></div>`).join(''):`<div class="global-retro-empty">이 주에 기록된 프로젝트 활동이 없어요.</div>`}</div></section>
    </div>`;
  };
  const prevR=window.R||R;
  window.R=R=function(){if(S.tab==='allRetro'){if(typeof rSB==='function')rSB();rAllRetro();return;}prevR();};
  const prevRsb=window.rSB||rSB;
  window.rSB=rSB=function(){prevRsb();const nav=document.getElementById('nav-all-retro');if(nav){nav.querySelector('.nname').textContent='전체 회고';nav.className='ni'+(S.tab==='allRetro'?' active':'');}};
  setTimeout(()=>{ensureGlobalRetroState();if(typeof rSB==='function')rSB();},0);
})();
</script>

<script id="tt-tags-undo-ai-patch">
(function(){
  const AUTO_TAG_RULES={
    "편집":["편집","컷편집","컷","자막","프리미어","렌더","영상","쇼츠","릴스","썸네일","수정"],
    "기획":["기획","아이디어","대본","스크립트","구성","리서치","레퍼런스","자료조사"],
    "소통":["회의","미팅","콜","컨펌","피드백","클라이언트","소통","답장"],
    "운영":["업로드","예약","발행","게시","관리","세팅","정리"],
    "디자인":["디자인","피그마","카드뉴스","배너","로고","이미지","시안"],
    "수익":["정산","인보이스","견적","계약","수익","입금","청구"]
  };
  function pad(n){return String(n).padStart(2,'0');}
  function esc(s){return (typeof escH==='function')?escH(s):String(s||'').replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));}
  function parseTags(v){
    return [...new Set(String(v||'').split(/[#,，,\s]+/).map(x=>x.trim().replace(/^#/,'')).filter(Boolean))].slice(0,8);
  }
  function tagsToText(tags){return (tags||[]).map(t=>'#'+t).join(' ');}
  function autoTags(text){
    const val=String(text||'').toLowerCase();
    const out=[];
    Object.entries(AUTO_TAG_RULES).forEach(([tag,keys])=>{
      if(keys.some(k=>val.includes(String(k).toLowerCase())))out.push(tag);
    });
    return [...new Set(out)].slice(0,5);
  }
  function allExistingTags(){
    const set=new Set();
    Object.keys(S.tt||{}).forEach(ds=>(S.tt[ds]||[]).forEach(e=>(e.tags||[]).forEach(t=>set.add(t))));
    Object.keys(S.tasks||{}).forEach(pid=>(S.tasks[pid]||[]).forEach(t=>(t.tags||[]).forEach(x=>set.add(x))));
    Object.keys(S.mnotes||{}).forEach(pid=>(S.mnotes[pid]||[]).forEach(n=>(n.tags||[]).forEach(x=>set.add(x))));
    Object.keys(S.plans||{}).forEach(pid=>(S.plans[pid]||[]).forEach(pl=>(pl.tags||[]).forEach(x=>set.add(x))));
    Object.keys(AUTO_TAG_RULES).forEach(t=>set.add(t));
    return [...set];
  }
  function effectiveTags(title,manual){
    const t=parseTags(manual);
    return t.length?t:autoTags(title);
  }
  function bindTagSuggest(titleId,tagsId,boxId){
    const title=document.getElementById(titleId), inp=document.getElementById(tagsId), box=document.getElementById(boxId);
    if(!title||!inp||!box||box.dataset.bound==='1')return;
    box.dataset.bound='1';
    const render=()=>{
      const q=parseTags(inp.value).pop() || '';
      const typed=parseTags(inp.value);
      const suggestions=[...new Set([...autoTags(title.value),...allExistingTags().filter(t=>!q || t.includes(q))])]
        .filter(t=>!typed.includes(t)).slice(0,6);
      box.innerHTML=suggestions.length? suggestions.map(t=>`<button type="button" data-tag="${esc(t)}">#${esc(t)}</button>`).join('') : '<span class="tt-tag-hint">제목 기준으로 태그를 추천해요. 직접 여러 개 입력해도 돼요.</span>';
      box.querySelectorAll('button').forEach(btn=>btn.onclick=()=>{
        const tag=btn.getAttribute('data-tag');
        const next=[...new Set([...parseTags(inp.value),tag])];
        inp.value=tagsToText(next);
        render();
      });
    };
    title.addEventListener('input',render);
    inp.addEventListener('input',render);
    render();
  }
  function ensureTtEventTags(){
    Object.keys(S.tt||{}).forEach(ds=>(S.tt[ds]||[]).forEach(e=>{if(!Array.isArray(e.tags))e.tags=autoTags(e.title);}));
  }
  function decorateTtEventTags(){
    ensureTtEventTags();
    const date=S.ttDate||((typeof todayStr==='function')?todayStr():new Date().toISOString().slice(0,10));
    document.querySelectorAll('.ttl-ev').forEach(el=>{
      if(el.querySelector('.tt-ev-tags'))return;
      const id=String(el.dataset.id || (el.id||'').replace('ttlev-',''));
      let ev=null;
      const col=el.closest('.ttl-grid');
      const ds=col?.dataset?.date || date;
      ev=((S.tt||{})[ds]||[]).find(x=>String(x.id)===id);
      if(!ev || !(ev.tags||[]).length)return;
      const wrap=document.createElement('div');
      wrap.className='tt-ev-tags';
      wrap.innerHTML=(ev.tags||[]).slice(0,3).map(t=>`<span class="tt-ev-tag">#${esc(t)}</span>`).join('');
      el.appendChild(wrap);
    });
  }

  // ── Undo / Redo ──
  let undoStack=[], redoStack=[], undoLock=false;
  let lastJSON=null;
  function currentJSON(){try{return JSON.stringify(S);}catch(e){return null;}}
  function showUndoToast(msg){

  window.ttlEvSave=function(id){

  // ── Improved AI work insight ──
  function weekRange(base){
    const d=new Date((base||todayStr())+'T12:00:00');const dow=d.getDay();

    const fmt=x=>`${x.getFullYear()}-${pad(x.getMonth()+1)}-${pad(x.getDate())}`;
    return {s:fmt(mon),e:fmt(sun)};
  }
  function overlapNightMinutes(h,m,dur){
    let mins=0;const start=h*60+(m||0),end=start+(dur||60);
    for(let x=start;x<end;x+=15){const hm=((x%1440)+1440)%1440;if(hm>=22*60||hm<6*60)mins+=Math.min(15,end-x);}
    return mins;
  }
  function tagOf(ev){return ((ev.tags&&ev.tags[0])||autoTags(ev.title)[0]||'기타');}
  function collectInsight(){
    const wr=weekRange(); const byTag={}, byProj={}; let total=0, night=0;
    Object.keys(S.tt||{}).forEach(ds=>{
      if(ds<wr.s||ds>wr.e)return;
      (S.tt[ds]||[]).forEach(ev=>{
        const dur=Math.max(15,ev.dur||60); total+=dur; night+=overlapNightMinutes(ev.h,ev.m||0,dur);
        const tg=tagOf(ev); byTag[tg]=(byTag[tg]||0)+dur;
        if(ev.pid){byProj[ev.pid]=(byProj[ev.pid]||0)+dur;}
      });
    });
    const tagRows=Object.entries(byTag).sort((a,b)=>b[1]-a[1]);
    const top=tagRows[0]||['기타',0]; const topPct=total?Math.round(top[1]/total*100):0;
    const nightPct=total?Math.round(night/total*100):0;
    const cy=TD.getFullYear(), cm=TD.getMonth()+1;
