<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로젝트 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F7F5;--surface:#fff;--border:rgba(0,0,0,.08);--bmd:rgba(0,0,0,.14);--text:#1C1C1A;--muted:#7A7A72;--faint:#B5B5AD;--r:12px;--rs:8px;--sw:234px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
/* SIDEBAR */
.sb{width:var(--sw);min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;overflow-y:auto;z-index:20}
.sb-head{padding:20px 18px 14px;border-bottom:1px solid var(--border)}
.sb-title-wrap{display:flex;align-items:center;gap:6px;cursor:text;border-bottom:2px solid transparent;transition:border-color .12s;padding-bottom:2px}
.sb-title-wrap:hover{border-bottom-color:var(--border)}
.sb-title{font-size:16px;font-weight:700;letter-spacing:-.03em;flex:1}
.sb-title-edit{font-size:11px;color:var(--faint);opacity:0;transition:opacity .12s}
.sb-title-wrap:hover .sb-title-edit{opacity:1}
.sb-title-inp{font-size:16px;font-weight:700;letter-spacing:-.03em;border:none;outline:none;background:none;font-family:'Noto Sans KR',sans-serif;color:var(--text);width:100%}
.sb-date{font-size:11px;color:var(--muted);margin-top:4px}
.timer-sb{display:none;align-items:center;gap:6px;margin-top:8px;padding:6px 10px;background:rgba(226,75,74,.07);border-radius:var(--rs);cursor:pointer}
.timer-sb.on{display:flex}
.timer-dot{width:6px;height:6px;border-radius:50%;background:#E24B4A;flex-shrink:0;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.timer-sb-lbl{font-size:11px;color:#C23A39;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.timer-sb-time{font-size:11px;font-family:'DM Mono',monospace;color:#C23A39;font-weight:700;flex-shrink:0}
.sb-nav{padding:10px 10px 8px;flex:1}
.sb-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);padding:0 8px;margin:10px 0 4px;display:block}
.ni{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--rs);cursor:pointer;transition:background .12s;margin-bottom:1px;user-select:none}
.ni:hover{background:var(--bg)}.ni.active{background:var(--bg)}
.ndot{width:10px;height:10px;border-radius:50%;cursor:pointer;flex-shrink:0;transition:transform .1s;border:2px solid transparent}
.ndot:hover{transform:scale(1.3);border-color:rgba(0,0,0,.15)}
.nname{font-size:13px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.ni.active .nname{font-weight:700}
.nbadge{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;flex-shrink:0}
.ndel{background:none;border:none;color:var(--faint);cursor:pointer;font-size:15px;padding:0 2px;opacity:0;transition:opacity .12s;font-family:inherit;line-height:1}
.ni:hover .ndel{opacity:1}
.nname-inp{flex:1;border:none;outline:none;background:none;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);font-weight:700;padding:0;min-width:0;width:100%}
.add-proj{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;margin:6px 0 0;border-radius:var(--rs);cursor:pointer;color:var(--muted);font-size:12px;transition:all .12s;border:1px dashed var(--border);background:none;font-family:'Noto Sans KR',sans-serif;width:100%}
.add-proj:hover{background:var(--bg);color:var(--text);border-color:var(--bmd)}
.sb-foot{padding:14px 18px;border-top:1px solid var(--border);margin-top:auto;flex-shrink:0}
.foot-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.foot-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
.foot-eye{background:none;border:none;cursor:pointer;font-size:14px;padding:0;opacity:.5;transition:opacity .12s}
.foot-eye:hover{opacity:1}
.foot-amt{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-.02em}
/* COLOR PICKER */
.cpop{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;box-shadow:0 8px 28px rgba(0,0,0,.12);z-index:200;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;width:180px}
.csw{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform .1s;border:2px solid transparent}
.csw:hover{transform:scale(1.2)}.csw.sel{border-color:var(--text);transform:scale(1.1)}
/* MAIN */
.main{margin-left:var(--sw);flex:1;padding:32px;max-width:calc(100% - var(--sw))}
.ph{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.pdot{width:13px;height:13px;border-radius:50%;cursor:pointer;flex-shrink:0;transition:transform .1s}.pdot:hover{transform:scale(1.2)}
.ptitle{font-size:22px;font-weight:700;letter-spacing:-.03em;padding-bottom:2px;cursor:text;border-bottom:2px solid transparent;transition:border-color .12s}
.ptitle:hover{border-bottom-color:var(--border)}
.ptitle-inp{font-size:22px;font-weight:700;letter-spacing:-.03em;border:none;outline:none;background:none;font-family:'Noto Sans KR',sans-serif;color:var(--text);border-bottom:2px solid var(--bmd);padding-bottom:2px}
/* ALL VIEW TABS */
.all-tabs{display:flex;margin-bottom:16px;border-bottom:1px solid var(--border)}
.all-tab{padding:8px 18px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--muted);background:none;border-top:none;border-left:none;border-right:none;font-family:'Noto Sans KR',sans-serif;transition:all .12s}
.all-tab:hover{color:var(--text)}.all-tab.on{color:var(--text);font-weight:700;border-bottom-color:var(--text)}
/* INNER TABS */
.itabs{display:flex;margin-bottom:22px;border-bottom:1px solid var(--border)}
.itab{padding:8px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--muted);transition:all .12s;background:none;border-top:none;border-left:none;border-right:none;font-family:'Noto Sans KR',sans-serif}
.itab:hover{color:var(--text)}.itab.on{color:var(--text);font-weight:700;border-bottom-color:var(--text)}
/* STATS */
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;border-top:3px solid transparent}
.sc-lbl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.sc-val{font-size:26px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-.02em}
/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.g2w{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px}
.ctitle{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
/* CALENDAR */
.cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-ml{font-size:14px;font-weight:700;letter-spacing:-.02em}
.cal-nav{background:none;border:1px solid var(--border);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:15px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .1s;font-family:inherit}
.cal-nav:hover{background:var(--bg);color:var(--text)}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}.cg.lg{gap:3px}
.cdl{font-size:9px;font-weight:700;letter-spacing:.06em;text-align:center;padding:6px 0;color:var(--faint)}
.cc{display:flex;flex-direction:column;align-items:flex-start;padding:4px 3px;border-radius:7px;min-height:72px}
.cc.lg{min-height:72px;padding:8px 4px}
.dn{font-size:12px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--text);font-weight:500;margin:0 auto 2px;flex-shrink:0}
.cc.lg .dn{width:28px;height:28px;font-size:13px}
.cc.ot .dn{color:var(--faint)}.cc.td .dn{background:var(--text);color:#fff;font-weight:700}
.cdots{display:flex;gap:2px;margin-top:4px;justify-content:center;flex-wrap:wrap}
.cdot-c{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.evl{margin-top:12px;display:flex;flex-direction:column;gap:4px;max-height:100px;overflow-y:auto}
.evl.lg{max-height:140px}
.evi{display:flex;align-items:center;gap:6px;padding:4px 9px;border-radius:6px;font-size:11px}
.ev-dl{font-weight:700;min-width:28px;flex-shrink:0}
.ev-del{background:none;border:none;cursor:pointer;font-size:13px;padding:0;margin-left:auto;opacity:.5;font-family:inherit}.ev-del:hover{opacity:1}
.ev-form{display:flex;gap:6px;margin-top:12px}
.ev-di{width:60px;border:1px solid var(--border);border-radius:var(--rs);padding:5px 7px;font-size:13px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);text-align:center}
.ev-ni{flex:1;border:1px solid var(--border);border-radius:var(--rs);padding:5px 8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text)}
.ev-di:focus,.ev-ni:focus{outline:none;border-color:var(--bmd)}
.ev-ab{border:none;border-radius:var(--rs);padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:#fff;white-space:nowrap}
/* TASKS */
.t-form{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.t-inp{flex:1;border:1px solid var(--border);border-radius:var(--rs);padding:7px 10px;font-size:13px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-width:0}
.t-inp:focus{outline:none;border-color:var(--bmd)}
.abtn{border:none;border-radius:var(--rs);padding:7px 14px;font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer;color:#fff;white-space:nowrap;flex-shrink:0}
.tlist{display:flex;flex-direction:column;gap:5px;max-height:220px;overflow-y:auto}
.ti{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--bg);border-radius:var(--rs);border-left:3px solid transparent}
.tcb{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--bmd);cursor:pointer;flex-shrink:0;background:var(--surface);display:flex;align-items:center;justify-content:center;transition:all .15s}
.ttxt{font-size:13px;flex:1;word-break:break-word;color:var(--text)}.ttxt.done{text-decoration:line-through;color:var(--faint)}
.tdel{background:none;border:none;color:var(--faint);cursor:pointer;font-size:16px;padding:0 2px;opacity:0;line-height:1;font-family:inherit}.ti:hover .tdel{opacity:1}
.done-tasks-hd{display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);user-select:none}
.done-tasks-lbl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);flex:1}
.done-tasks-list{margin-top:6px;display:flex;flex-direction:column;gap:4px;max-height:160px;overflow-y:auto}
/* PLAN FILTER + DRAG */
.filter-row{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ftab{border:1px solid var(--border);border-radius:20px;padding:4px 13px;font-size:11px;cursor:pointer;background:var(--surface);color:var(--muted);font-family:'Noto Sans KR',sans-serif;transition:all .12s}
.ftab:hover{color:var(--text);border-color:var(--bmd)}.ftab.on{background:var(--text);color:#fff;border-color:var(--text)}
.drag-handle{cursor:grab;color:var(--faint);font-size:14px;padding:0 4px;opacity:0;flex-shrink:0;user-select:none;line-height:1}
.plan-hd:hover .drag-handle{opacity:1}
.plan-doc.dragging{opacity:.4;transform:scale(.98)}
.plan-doc.drag-over-top{box-shadow:0 -3px 0 var(--text)}
.plan-doc.drag-over-bot{box-shadow:0 3px 0 var(--text)}
/* PLAN CARDS */
.plan-doc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:box-shadow .15s,opacity .15s,transform .15s}
.plan-doc.open{box-shadow:0 4px 18px rgba(0,0,0,.08)}
.plan-hd{display:flex;align-items:center;gap:8px;padding:13px 16px;cursor:pointer;user-select:none;transition:background .12s}
.plan-hd:hover{background:var(--bg)}
.plan-doc.open .plan-hd{background:var(--bg);border-bottom:1px solid var(--border)}
.pst{border:none;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;flex-shrink:0;transition:all .15s}
.pst.done{background:#E6F4D7;color:#3A7A0A}.pst.ongoing{color:#fff}
.plan-ttl-lbl{font-size:14px;font-weight:600;flex:1;letter-spacing:-.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.tags-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0}
.tag{display:inline-flex;align-items:center;gap:3px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--muted);white-space:nowrap}
.tag button{background:none;border:none;cursor:pointer;color:var(--faint);font-size:12px;padding:0;font-family:inherit;line-height:1}.tag button:hover{color:var(--text)}
.tag-add-btn{background:none;border:1px dashed var(--border);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--faint);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .12s;white-space:nowrap;flex-shrink:0}
.tag-add-btn:hover{border-color:var(--bmd);color:var(--muted)}
.plan-date-chip{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:20px;flex-shrink:0}
.plan-date-inp{border:none;outline:none;background:transparent;font-size:11px;font-family:'Noto Sans KR',sans-serif;color:var(--muted);width:108px;cursor:pointer;padding:3px 8px}
.plan-arr{font-size:10px;color:var(--faint);flex-shrink:0;margin-left:2px}
.plan-del-btn{background:none;border:none;color:var(--faint);cursor:pointer;font-size:17px;padding:0 2px;font-family:inherit;line-height:1;flex-shrink:0;opacity:0;transition:opacity .12s}.plan-hd:hover .plan-del-btn{opacity:1}
.plan-body{padding:18px 20px;display:flex;flex-direction:column;gap:12px}
.plan-name-inp{font-size:18px;font-weight:700;letter-spacing:-.03em;border:none;outline:none;background:none;font-family:'Noto Sans KR',sans-serif;color:var(--text);border-bottom:2px solid var(--border);padding-bottom:6px;width:100%}
.plan-name-inp:focus{border-bottom-color:var(--bmd)}
.plan-ta{width:100%;min-height:180px;border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--bg);resize:vertical;line-height:1.8}
.plan-ta:focus{outline:none;border-color:var(--bmd)}
.plan-section-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:12px 0 8px;padding-top:12px;border-top:1px solid var(--border)}
.plan-section-lbl:first-child{border-top:none;margin-top:0;padding-top:0}
.plan-summary{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.ps-chip{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:7px 13px;font-size:12px}
.ps-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.add-plan{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px;border:1px dashed var(--border);border-radius:var(--r);cursor:pointer;color:var(--muted);font-size:13px;background:none;font-family:'Noto Sans KR',sans-serif;width:100%;transition:all .12s;margin-top:4px}
.add-plan:hover{background:var(--bg);color:var(--text);border-color:var(--bmd)}
/* MEETING NOTES */
.mn-doc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:box-shadow .15s}
.mn-doc.open{box-shadow:0 4px 18px rgba(0,0,0,.08)}
.mn-hd{display:flex;align-items:center;gap:10px;padding:13px 18px;cursor:pointer;user-select:none;transition:background .12s}
.mn-hd:hover{background:var(--bg)}
.mn-doc.open .mn-hd{background:var(--bg);border-bottom:1px solid var(--border)}
.mn-date{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;flex-shrink:0;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px 9px}
.mn-ttl{font-size:14px;font-weight:600;flex:1;letter-spacing:-.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.mn-arr{font-size:10px;color:var(--faint);flex-shrink:0}
.mn-del{background:none;border:none;color:var(--faint);cursor:pointer;font-size:17px;padding:0 2px;font-family:inherit;line-height:1;opacity:0;transition:opacity .12s}.mn-hd:hover .mn-del{opacity:1}
.mn-body{padding:18px 20px;display:flex;flex-direction:column;gap:12px}
.mn-name-inp{font-size:18px;font-weight:700;letter-spacing:-.03em;border:none;outline:none;background:none;font-family:'Noto Sans KR',sans-serif;color:var(--text);border-bottom:2px solid var(--border);padding-bottom:6px;width:100%}
.mn-name-inp:focus{border-bottom-color:var(--bmd)}
.mn-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.mn-meta-lbl{font-size:11px;color:var(--muted)}
.mn-date-inp{border:1px solid var(--border);outline:none;background:var(--bg);font-size:11px;font-family:'Noto Sans KR',sans-serif;color:var(--muted);border-radius:20px;padding:3px 10px;cursor:pointer}
.mn-ta{width:100%;min-height:200px;border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--bg);resize:vertical;line-height:1.8}
.mn-ta:focus{outline:none;border-color:var(--bmd)}
.add-mn{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px;border:1px dashed var(--border);border-radius:var(--r);cursor:pointer;color:var(--muted);font-size:13px;background:none;font-family:'Noto Sans KR',sans-serif;width:100%;transition:all .12s;margin-top:4px}
.add-mn:hover{background:var(--bg);color:var(--text);border-color:var(--bmd)}
/* TIMER */
.timer-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;margin-top:16px}
.timer-main{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.timer-disp{font-size:38px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:.02em;flex-shrink:0}
.timer-disp.active{color:#C23A39}
.timer-controls{display:flex;flex-direction:column;gap:8px;flex:1;min-width:180px}
.timer-note-inp{border:1px solid var(--border);border-radius:var(--rs);padding:6px 10px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);width:100%}
.timer-note-inp:focus{outline:none;border-color:var(--bmd)}
.timer-btn{border:none;border-radius:var(--rs);padding:8px 18px;font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer;color:#fff}
.timer-log{margin-top:14px;border-top:1px solid var(--border);padding-top:12px}
.tl-title{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
.tl-entries{display:flex;flex-direction:column;gap:4px;max-height:130px;overflow-y:auto}
.tl-row{display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--bg);border-radius:var(--rs);font-size:12px}
.tl-date{color:var(--faint);font-family:'DM Mono',monospace;flex-shrink:0;font-size:11px}
.tl-dur{font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0}
.tl-note{color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-del{background:none;border:none;color:var(--faint);cursor:pointer;font-size:13px;padding:0;opacity:0;font-family:inherit}.tl-row:hover .tl-del{opacity:1}
/* REVENUE */
.rev-total{font-size:28px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-.02em;margin-bottom:14px}
.r-form{display:grid;grid-template-columns:60px 54px 1fr 88px 32px;gap:5px;margin-bottom:10px}
.r-sel{border:1px solid var(--border);border-radius:var(--rs);padding:5px 4px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);width:100%}
.r-sel:focus{outline:none;border-color:var(--bmd)}
.r-inp{border:1px solid var(--border);border-radius:var(--rs);padding:6px 7px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);width:100%}
.r-inp:focus{outline:none;border-color:var(--bmd)}
.r-ab{border:none;border-radius:var(--rs);font-size:20px;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center}
.rlist{display:flex;flex-direction:column;gap:4px;max-height:160px;overflow-y:auto;margin-bottom:16px}
.rrow{display:flex;align-items:center;gap:7px;padding:6px 10px;background:var(--bg);border-radius:var(--rs);font-size:12px}
.rmon-badge{font-size:10px;font-weight:700;font-family:'DM Mono',monospace;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1px 6px;flex-shrink:0;white-space:nowrap}
.rdesc{flex:1;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ramt{font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0}
.rdel{background:none;border:none;color:var(--faint);cursor:pointer;font-size:14px;padding:0;opacity:0;font-family:inherit;flex-shrink:0}.rrow:hover .rdel{opacity:1}
.nta{width:100%;height:150px;border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--bg);resize:none;line-height:1.7}
.nta:focus{outline:none;border-color:var(--bmd)}
.nsb{margin-top:8px;background:none;border:1px solid var(--border);border-radius:var(--rs);padding:5px 14px;font-size:12px;cursor:pointer;color:var(--muted);font-family:'Noto Sans KR',sans-serif;transition:all .12s}
.nsb:hover{color:var(--text);border-color:var(--bmd)}
/* TIMETABLE */
.tt-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;margin-bottom:16px}
.tt-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.tt-date-lbl{font-size:14px;font-weight:700;letter-spacing:-.02em;flex:1}
.tt-nav-btn{background:none;border:1px solid var(--border);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .1s;font-family:inherit}
.tt-nav-btn:hover{background:var(--bg);color:var(--text)}
.tt-today-btn{background:none;border:1px solid var(--bmd);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--muted);transition:all .12s}
.tt-today-btn:hover{background:var(--text);color:#fff;border-color:var(--text)}
.tt-grid{display:flex;flex-direction:column}
.tt-row{display:flex;align-items:flex-start;gap:12px;min-height:36px;border-top:1px solid rgba(0,0,0,.04);padding:5px 0}
.tt-hour{font-size:11px;color:var(--faint);font-family:'DM Mono',monospace;width:42px;flex-shrink:0;padding-top:6px;text-align:right}
.tt-now .tt-hour{color:var(--text);font-weight:700}
.tt-events-col{flex:1;display:flex;flex-direction:column;gap:3px;padding:2px 0}
.tt-ev{display:flex;align-items:center;gap:8px;padding:5px 11px;border-radius:7px;font-size:12px}
.tt-ev-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0;min-width:34px}
.tt-ev-title{flex:1;font-weight:500}.tt-ev-title.done{text-decoration:line-through;opacity:.5}
.tt-ev-proj{font-size:9px;font-weight:700;border-radius:10px;padding:2px 8px;flex-shrink:0;white-space:nowrap}
.tt-check{width:18px;height:18px;border-radius:4px;border:1.5px solid rgba(0,0,0,.18);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;background:rgba(255,255,255,.7);flex-shrink:0;transition:all .15s}
.tt-check.done{border-color:transparent}
.tt-del-btn{background:none;border:none;color:var(--faint);cursor:pointer;font-size:13px;padding:0;opacity:0;font-family:inherit;flex-shrink:0}
.tt-ev:hover .tt-del-btn{opacity:1}
.tt-form{display:flex;gap:6px;align-items:center;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap}
.tt-inp{border:1px solid var(--border);border-radius:var(--rs);padding:6px 8px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text)}
.tt-inp.sm{width:52px;text-align:center}.tt-inp.flex{flex:1;min-width:120px}
.tt-inp:focus{outline:none;border-color:var(--bmd)}
.tt-sep{color:var(--faint);font-size:14px;flex-shrink:0;font-weight:700}
.tt-sel{border:1px solid var(--border);border-radius:var(--rs);padding:6px 8px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text)}
.tt-sel:focus{outline:none;border-color:var(--bmd)}
.tt-add-btn{border:none;border-radius:var(--rs);padding:6px 14px;font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer;color:#fff;background:var(--text);white-space:nowrap}
.tt-add-btn:hover{opacity:.85}
/* ALL VIEW */
.all-cal-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px 28px;margin-bottom:16px}
.month-rev-bar{background:linear-gradient(135deg,#F3F3F0 0%,#E8E7E1 100%)!important;color:var(--text)!important;border:1px solid rgba(0,0,0,.08);border-radius:22px;padding:22px 28px;display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:16px;box-shadow:0 10px 28px rgba(0,0,0,.045)}
.mrb-left{display:flex;flex-direction:column;gap:2px}
.mrb-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.mrb-amt{font-size:34px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-.03em;color:var(--text)}
.mrb-right{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.mrb-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.mrb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.mrb-pamt{font-family:'DM Mono',monospace;font-size:11px}
.mrb-eye{background:rgba(255,255,255,.72);border:1px solid rgba(0,0,0,.10);border-radius:12px;padding:6px 12px;font-size:12px;cursor:pointer;color:var(--muted);font-family:'Noto Sans KR',sans-serif;transition:all .15s;white-space:nowrap;flex-shrink:0;align-self:flex-start}
.mrb-eye:hover{border-color:var(--bmd);color:var(--text);background:#F7F7F5}
.pcards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;border-left:4px solid transparent;cursor:pointer;transition:all .15s}
.pcard:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,0,0,.07)}
.pcard-name{font-size:14px;font-weight:700;margin-bottom:5px}
.pmini{font-size:12px;color:var(--muted);padding:2px 0;display:flex;align-items:center;gap:6px}
.pmdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.empty{font-size:12px;color:var(--faint);padding:5px 0}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Calendar cells clickable */
.cc:not(.ot){cursor:pointer;transition:background .1s}.cc:not(.ot):hover:not(.td){background:rgba(0,0,0,.05)}
/* Day modal */
.day-modal{position:fixed;inset:0;z-index:100;display:flex;justify-content:flex-end}
.dm-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.38);cursor:pointer}
.dm-panel{position:relative;width:min(460px,100vw);background:var(--surface);overflow-y:auto;box-shadow:-8px 0 40px rgba(0,0,0,.16);display:flex;flex-direction:column;animation:slideIn .18s ease}
@keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
.dm-hd{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;position:sticky;top:0;background:var(--surface);z-index:2}
.dm-title{font-size:17px;font-weight:700;letter-spacing:-.03em;flex:1}
.dm-close{background:none;border:1px solid var(--border);border-radius:var(--rs);width:28px;height:28px;cursor:pointer;font-size:18px;color:var(--muted);display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1}
.dm-close:hover{background:var(--bg);color:var(--text)}
.dm-body{padding:20px 22px;flex:1}
.dm-sec{margin-bottom:22px}
.dm-sec-title{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
.dm-ev{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;font-size:13px;margin-bottom:3px}
.dm-task{display:flex;align-items:center;gap:9px;padding:7px 10px;background:var(--bg);border-radius:var(--rs);margin-bottom:3px;font-size:13px}
.dm-tt-row{display:flex;align-items:center;gap:8px;padding:5px 10px;background:var(--bg);border-radius:var(--rs);font-size:12px;margin-bottom:3px}
.dm-proj-sec{margin-bottom:14px}
.dm-proj-hd{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
/* Weekly timetable */
.ttv-toggle{display:flex;gap:4px;margin-left:auto;flex-shrink:0}
.ttv-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:var(--muted);transition:all .12s}
.ttv-btn:hover{color:var(--text);border-color:var(--bmd)}.ttv-btn.on{background:var(--text);color:#fff;border-color:var(--text)}
.ttw-wrap{overflow-x:auto;margin-top:2px}
.ttw-grid{display:grid;grid-template-columns:42px repeat(7,1fr);gap:1px;background:var(--border);border-radius:8px;overflow:hidden;min-width:560px}
.ttw-empty{background:var(--bg)}
.ttw-h-day{background:var(--bg);padding:8px 5px;text-align:center;cursor:pointer;transition:background .12s}
.ttw-h-day:hover{background:rgba(0,0,0,.04)}.ttw-h-day.ttw-today-hd{background:var(--text);color:#fff}
.ttw-day-name{font-size:10px;font-weight:700;opacity:.6}
.ttw-day-num{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;line-height:1.2}
.ttw-hour-cell{background:var(--bg);font-size:10px;color:var(--faint);font-family:'DM Mono',monospace;padding:5px 5px 5px 4px;display:flex;align-items:flex-start;justify-content:flex-end;min-height:48px}
.ttw-cell{background:var(--surface);min-height:48px;padding:2px;display:flex;flex-direction:column;gap:2px;cursor:pointer;transition:background .12s}
.ttw-cell:hover{background:rgba(0,0,0,.025)}.ttw-cell.ttw-today-col{background:rgba(0,0,0,.018)}
.ttw-ev{padding:2px 5px;border-radius:4px;font-size:10px;display:flex;align-items:center;gap:3px;line-height:1.3}
.ttw-ev-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.ttw-ev-title.done{text-decoration:line-through;opacity:.5}
.ttw-ev .tt-check{width:13px;height:13px;border-radius:3px;flex-shrink:0}
.ttw-add-form{display:flex;gap:5px;align-items:center;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap}

/* ── WELCOME ── */
.welcome-ov{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px}
.welcome-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:44px 40px;max-width:460px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.1);text-align:center}
.wc-icon{font-size:48px;margin-bottom:18px;display:block}
.wc-title{font-size:24px;font-weight:700;letter-spacing:-.04em;margin-bottom:8px}
.wc-desc{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.65}
.wc-features{text-align:left;background:var(--bg);border-radius:var(--r);padding:14px 18px;margin-bottom:22px;display:flex;flex-direction:column;gap:7px}
.wc-feat{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px}
.wc-feat::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--text);flex-shrink:0}
.wc-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:block;text-align:left;margin-bottom:6px}
.wc-inp{width:100%;border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;font-size:15px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);outline:none;font-weight:600;letter-spacing:-.02em;margin-bottom:18px;transition:border-color .15s}
.wc-inp:focus{border-color:var(--bmd)}
.wc-btn{width:100%;background:var(--text);color:#fff;border:none;border-radius:var(--rs);padding:13px;font-size:15px;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer;letter-spacing:-.02em;transition:opacity .15s}
.wc-btn:hover{opacity:.85}
.wc-note{font-size:11px;color:var(--faint);margin-top:12px}


/* ── MOBILE RESPONSIVE ── */
.mob-hd{display:none;position:fixed;top:0;left:0;right:0;height:54px;background:rgba(245,244,241,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:25;align-items:center;padding:0 16px;gap:12px}
.ham-btn{background:none;border:1px solid var(--border);border-radius:8px;width:36px;height:36px;font-size:18px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s}
.ham-btn:hover{background:var(--bg)}
.mob-page-title{font-size:15px;font-weight:700;letter-spacing:-.03em;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-bd{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:19;backdrop-filter:blur(2px)}
@media(max-width:768px){
  .mob-hd{display:flex}
  .sb{position:fixed;transform:translateX(-100%);transition:transform .26s cubic-bezier(.4,0,.2,1);top:0;bottom:0;z-index:22;box-shadow:none;overflow-y:auto}
  .sb.mob-open{transform:translateX(0);box-shadow:6px 0 32px rgba(0,0,0,.15)}
  .sb-bd.show{display:block}
  .main{margin-left:0!important;padding:16px!important;padding-top:72px!important;max-width:100%!important}
  .g2,.g2w{grid-template-columns:1fr!important}
  .pcards{grid-template-columns:1fr!important}
  .srow{grid-template-columns:1fr 1fr!important;gap:10px}
  .srow .sc:last-child{grid-column:1/-1}
  .r-form{grid-template-columns:1fr 1fr 38px!important;row-gap:6px}
  .r-form>:nth-child(1){grid-column:1}
  .r-form>:nth-child(2){grid-column:2}
  .r-form>:nth-child(3){grid-column:1/-1}
  .r-form>:nth-child(4){grid-column:1/3}
  .r-form>:nth-child(5){grid-column:3}
  .itabs{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap}
  .itab{flex-shrink:0;padding:8px 12px}
  .all-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap}
  .all-tab{flex-shrink:0}
  .img-grid{columns:2 120px!important}
  .plan-hd{flex-wrap:wrap;gap:6px}
  .tags-wrap{order:10;flex-basis:100%;margin-top:2px}
  .plan-date-chip{flex-shrink:1}
  .plan-arr{margin-left:auto}
  .dm-panel{width:min(100vw,460px)}
  .month-rev-bar{flex-direction:column;gap:12px;align-items:stretch}
  .mrb-right{display:none}
  .mrb-eye{align-self:flex-start}
  .all-cal-wrap{padding:16px 14px}
  .sc-val{font-size:20px}
  .foot-amt{font-size:17px}
  .timer-main{flex-direction:column;gap:12px}
  .ttw-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .ev-form{flex-wrap:wrap}
  .ev-di{width:100%}
  .ev-ni{flex:1;min-width:0}
  .t-form{flex-wrap:wrap}
  .t-inp{min-width:0}
  .tt-form{flex-wrap:wrap;gap:6px}
  .tt-inp.flex{min-width:120px}
  .plan-summary{gap:6px}
  .ps-chip{font-size:11px;padding:5px 10px}
  .ph .ptitle{font-size:18px}
  .banner{flex-direction:column;gap:12px}
  .bamt{font-size:24px}
  .filter-row{gap:5px}
  .mn-hd{flex-wrap:wrap;gap:6px}
  .mn-hd .tags-wrap{flex-basis:100%;order:10}
  .card-grid,.card-grid.wide{grid-template-columns:1fr}
  .tt-wrap{padding:16px}
  .timer-card{padding:16px}
  .all-cal-wrap .ctitle{margin-bottom:10px}
}
@media(max-width:480px){
  .srow{grid-template-columns:1fr!important}
  .srow .sc:last-child{grid-column:auto}
  .img-grid{columns:1!important}
  .welcome-box{padding:32px 24px}
  .wc-title{font-size:20px}
}


.wc-credit{margin-top:16px;padding-top:14px;border-top:1px solid var(--border);font-size:11px;color:var(--faint);display:flex;align-items:center;justify-content:center;gap:6px}
.wc-credit a{color:var(--muted);text-decoration:none;font-weight:700;letter-spacing:.04em;text-transform:lowercase;transition:color .12s}
.wc-credit a:hover{color:var(--text)}
.wc-credit-ig{font-size:15px;opacity:.6}

/* ── TIMELINE TIMETABLE ── */
.ttl-outer{border:1px solid var(--border);border-radius:var(--rs);overflow-y:auto;max-height:560px;margin-bottom:14px;scroll-behavior:smooth}
.ttl-wrap{display:flex;position:relative;background:var(--surface)}
.ttl-labels{width:46px;flex-shrink:0;position:relative;background:var(--surface)}
.ttl-lbl{position:absolute;right:7px;font-size:10px;color:var(--faint);font-family:'DM Mono',monospace;transform:translateY(-50%);pointer-events:none;white-space:nowrap}
.ttl-grid{flex:1;position:relative;cursor:crosshair;border-left:1px solid var(--border);user-select:none;-webkit-user-select:none}
.ttl-hline{position:absolute;left:0;right:0;border-top:1px solid rgba(0,0,0,.06);pointer-events:none}
.ttl-hline.ttl-major{border-top-color:rgba(0,0,0,.1)}
.ttl-ev{position:absolute;left:4px;right:4px;border-radius:7px;padding:3px 9px;font-size:11px;cursor:pointer;overflow:hidden;border-left:3px solid transparent;transition:box-shadow .12s,filter .12s;z-index:2;box-sizing:border-box}
.ttl-ev:hover{box-shadow:0 3px 12px rgba(0,0,0,.14);filter:brightness(.97);z-index:4}
.ttl-ev.ttl-dragging{opacity:.5;z-index:5}
.ttl-ev-time{font-size:9px;font-family:'DM Mono',monospace;line-height:1.3;opacity:.7}
.ttl-ev-title{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4}
.ttl-ev-title.done{text-decoration:line-through;opacity:.45}
.ttl-ev-proj{font-size:9px;opacity:.6;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ttl-now{position:absolute;left:0;right:0;height:2px;background:#E24B4A;pointer-events:none;z-index:5}
.ttl-now::before{content:'';width:8px;height:8px;border-radius:50%;background:#E24B4A;position:absolute;left:-4px;top:-3px}
.ttl-ghost{position:absolute;left:4px;right:4px;border-radius:7px;background:rgba(0,0,0,.07);border:2px dashed var(--bmd);pointer-events:none;z-index:10;display:none;min-height:16px;will-change:transform,height;top:0;transform:translateY(0)}
.ttl-ghost.copy{background:rgba(55,130,220,.1);border-color:#378ADD}
/* Quick add & edit popover */
.ttl-pop{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:0 10px 32px rgba(0,0,0,.18);z-index:300;width:276px;animation:slideUp .15s ease}
.ttl-pop-time{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:9px;display:flex;align-items:center;gap:4px}
.ttl-pop-inp{width:100%;border:1px solid var(--border);border-radius:var(--rs);padding:7px 10px;font-size:13px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);outline:none;margin-bottom:8px;transition:border-color .15s}
.ttl-pop-inp:focus{border-color:var(--bmd)}
.ttl-pop-time-row{display:grid;grid-template-columns:46px 10px 46px auto 46px 10px 46px;align-items:center;gap:4px;margin-bottom:8px}
.ttl-pop-time-row input{border:1px solid var(--border);border-radius:var(--rs);padding:5px 4px;font-size:12px;font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);text-align:center;outline:none;width:100%}
.ttl-pop-time-row input:focus{border-color:var(--bmd)}
.ttl-pop-sel{width:100%;border:1px solid var(--border);border-radius:var(--rs);padding:6px 8px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);outline:none;margin-bottom:10px}
.ttl-pop-btns{display:flex;gap:6px}
.ttl-pop-save{flex:1;background:var(--text);color:#fff;border:none;border-radius:var(--rs);padding:7px;font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer}
.ttl-pop-save:hover{opacity:.85}
.ttl-pop-btn{background:none;border:1px solid var(--border);border-radius:var(--rs);padding:7px 10px;font-size:11px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;color:var(--muted);white-space:nowrap;transition:all .12s}
.ttl-pop-btn:hover{background:var(--bg);color:var(--text)}
.ttl-pop-btn.del:hover{background:#FEE2E2;color:#DC2626;border-color:#FECACA}
/* Plan caption */
.plan-caption-inp{width:100%;border:none;outline:none;background:none;font-size:12px;font-family:'Noto Sans KR',sans-serif;color:var(--muted);padding:2px 0 4px;border-bottom:1px solid transparent;transition:border-color .12s;font-style:italic;margin-bottom:6px}
.plan-caption-inp:focus{border-bottom-color:var(--border)}
.plan-caption-inp::placeholder{color:var(--faint)}
.plan-cap-preview{font-size:11px;color:var(--faint);font-style:italic;order:2;flex-basis:100%;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px}


.cal-ev-bar{font-size:9px;padding:1px 5px;border-radius:3px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;color:#fff;width:100%;cursor:pointer;line-height:1.4}
.cal-ev-more{font-size:9px;color:var(--muted);padding:1px 4px;margin-top:1px;line-height:1.3}
.cal-ev-time{font-size:9px;padding:1px 2px;margin-top:2px;overflow:hidden;white-space:nowrap;cursor:pointer;line-height:1.4;display:flex;align-items:center;gap:2px}
.cal-ev-tlbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);font-weight:500;font-size:9px}
.cc.td .cal-ev-bar{opacity:.9}

.modal-ov{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.2)}
.modal-hd{padding:18px 20px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.modal-tt{font-size:16px;font-weight:700;flex:1}
.modal-x{background:none;border:1px solid var(--border);border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center;font-family:inherit;flex-shrink:0}
.modal-body{padding:18px 20px}
.modal-ft{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.fg{margin-bottom:12px}.fl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px}
.fi{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);outline:none}
.fi:focus{border-color:var(--bmd)}
.btn-cancel{background:none;border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;color:var(--muted);font-family:'Noto Sans KR',sans-serif}
.btn-save{background:var(--text);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}


/* ── TASK DASHBOARD SPLIT ── */
.task-split{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.task-mini-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.task-mini-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.task-mini-list{display:flex;flex-direction:column;gap:5px;max-height:210px;overflow-y:auto}
.task-mini-empty{font-size:12px;color:var(--faint);padding:4px 0}
.task-row-compact{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:var(--rs);padding:7px 9px;border-left:3px solid transparent;font-size:12px}
.task-row-compact .task-proj{font-size:10px;font-weight:700;white-space:nowrap;opacity:.72}
.task-row-compact .task-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-row-compact.done .task-title{text-decoration:line-through;color:var(--faint)}
.task-section-note{font-size:11px;color:var(--faint);margin:-4px 0 10px}
/* ── AIRY REVENUE PANEL ── */
.rev-air{background:#FAFAF8!important;color:var(--text)!important;border:1px solid rgba(0,0,0,.075)!important;border-radius:22px;padding:28px 32px;margin-bottom:18px;display:grid;grid-template-columns:minmax(260px,.9fr) 1.2fr auto;gap:24px;align-items:stretch;box-shadow:0 12px 32px rgba(0,0,0,.045)!important}
.rev-air.hidden .rev-air-amt,.rev-air.hidden .rev-air-mini-amt,.rev-air.hidden .rev-air-total{filter:blur(7px);user-select:none}
.rev-air-kicker{font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)!important;margin-bottom:8px}
.rev-air-amt{font-size:48px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-.05em;line-height:1.05;color:var(--text)!important}
.rev-air-total{font-size:13px;color:var(--muted)!important;margin-top:10px}
.rev-air-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;align-content:center}
.rev-air-mini{background:#FFFFFF!important;border:1px solid rgba(0,0,0,.07)!important;border-radius:14px;padding:12px 14px;min-width:0;box-shadow:0 4px 16px rgba(0,0,0,.025)}
.rev-air-mini-name{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)!important;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rev-air-mini-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.rev-air-mini-amt{font-family:'DM Mono',monospace;font-weight:700;font-size:15px;color:var(--text)!important}
.rev-air-toggle{align-self:start;background:#FFFFFF!important;border:1px solid rgba(0,0,0,.10)!important;border-radius:12px;padding:9px 14px;font-size:12px;cursor:pointer;color:var(--muted)!important;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;box-shadow:0 3px 12px rgba(0,0,0,.025)}
.rev-air-toggle:hover{background:#F1F1ED!important;color:var(--text)!important;border-color:var(--bmd)!important}
.rev-project-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;margin-bottom:18px}
.rev-project-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
.rev-project-amt{font-size:34px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-.04em}
@media(max-width:900px){.rev-air{grid-template-columns:1fr}.rev-air-grid{grid-template-columns:1fr}.task-split{grid-template-columns:1fr}}

/* 백업/복원 버튼 */
.bk-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:10px;cursor:pointer;color:var(--faint);font-family:'Noto Sans KR',sans-serif;transition:all .12s}
.bk-btn:hover{color:var(--text);border-color:var(--bmd)}
/* 수익 차트 */
.rev-chart{margin:18px 0 18px;padding:26px 28px;background:linear-gradient(180deg,#FFFFFF 0%,#F8F8F5 100%);border:1px solid rgba(0,0,0,.07);border-radius:24px;overflow-x:auto;box-shadow:0 10px 30px rgba(0,0,0,.045)}
.rev-chart-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px}
.rev-chart-lbl{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.rev-chart-sub{font-size:12px;color:var(--faint);line-height:1.45}
.rev-chart-hide{background:none;border:1px solid var(--border);border-radius:12px;padding:7px 12px;font-size:12px;cursor:pointer;color:var(--muted);font-family:'Noto Sans KR',sans-serif;white-space:nowrap;transition:all .12s}
.rev-chart-hide:hover{background:var(--bg);color:var(--text);border-color:var(--bmd)}
.rev-chart-body{min-width:760px}
.rev-chart.hidden .rev-chart-body{filter:blur(9px);opacity:.45;user-select:none;pointer-events:none}
.rev-chart.hidden{background:linear-gradient(180deg,var(--surface),var(--bg))}
/* 태스크 마감일 */
.task-due-inp{border:1px solid var(--border);border-radius:6px;padding:3px 6px;font-size:11px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--muted);cursor:pointer;outline:none;flex-shrink:0}
.task-due-inp:focus{border-color:var(--bmd)}
.due-chip{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600;margin-left:6px;flex-shrink:0;background:#F3F3F0!important;color:var(--muted)!important;border:1px solid rgba(0,0,0,.06)}
.due-chip.overdue,.due-chip.today,.due-chip.soon,.due-chip.normal{background:#F3F3F0!important;color:var(--muted)!important;border:1px solid rgba(0,0,0,.06)}
.ti{display:flex;align-items:center;gap:6px}
/* 캘린더 필터 */
.cal-proj-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}

.tag-ac-item{padding:7px 12px;font-size:12px;cursor:pointer;color:var(--text);font-family:'Noto Sans KR',sans-serif;border-bottom:1px solid var(--border)}.tag-ac-item:last-child{border-bottom:none}.tag-ac-item:hover{background:var(--bg)}

.ttl-grid{touch-action:none}
.ttl-ev{touch-action:none}
.month-rev-bar *{color:inherit}


/* v7 force: 전체보기 월 수익 패널을 밝은 연그레이/화이트로 고정 */
.rev-air{background:#FAFAF8!important;color:var(--text)!important;border:1px solid rgba(0,0,0,.075)!important;box-shadow:0 12px 32px rgba(0,0,0,.045)!important}
.rev-air *{color:inherit}
.rev-air-kicker,.rev-air-total,.rev-air-mini-name{color:var(--muted)!important}
.rev-air-amt,.rev-air-mini-amt{color:var(--text)!important}
.rev-air-mini{background:#FFFFFF!important;border:1px solid rgba(0,0,0,.07)!important}
.rev-air-toggle{background:#FFFFFF!important;color:var(--muted)!important;border:1px solid rgba(0,0,0,.10)!important}
.rev-air-toggle:hover{background:#F1F1ED!important;color:var(--text)!important}


/* ── Sidebar Search + Task Tags v11 ── */
.sb-search-wrap{padding:0 8px 10px}
.sb-search{width:100%;border:1px solid var(--border);border-radius:10px;padding:8px 10px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);outline:none}
.sb-search:focus{border-color:var(--bmd)}
.sb-search-empty{font-size:11px;color:var(--faint);padding:8px 10px;display:none}
.task-tag{display:inline-flex;align-items:center;padding:1px 7px;border-radius:999px;background:#F1F1EF;color:#777;font-size:10px;border:1px solid rgba(0,0,0,.06);white-space:nowrap;line-height:1.5}
.task-tags{display:flex;gap:4px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.task-tag-btn{border:1px dashed var(--border);background:transparent;color:var(--faint);border-radius:999px;padding:1px 7px;font-size:10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap}
.task-tag-btn:hover{border-color:var(--bmd);color:var(--muted)}
.task-tag-inp{width:96px;flex:0 0 96px}
.ti.neutral,.task-row-compact.neutral{border-left-color:#D8D8D4!important}
.ti.neutral .tcb,.task-row-compact.neutral .tcb{border-color:#D6D6D2!important}
.ti.neutral .tcb.checked,.task-row-compact.neutral .tcb.checked{background:#AFAFAA!important;border-color:#AFAFAA!important}


/* 오늘자 태스크는 프로젝트 컬러, 그 외 날짜/주간 태스크는 회색 */
.task-row-compact.neutral{border-left-color:#D8D8D4!important}
.ti.neutral{border-left-color:#D8D8D4!important}
.cc[data-date]{user-select:none}


/* Connected multi-day calendar bars */
.cal-multi-bar{
  height:18px;
  border-radius:0;
  font-size:9px;
  padding:1px 6px;
  margin-top:2px;
  display:flex;
  align-items:center;
  overflow:hidden;
  white-space:nowrap;
  opacity:.58;
  font-weight:600;
}
.cal-multi-start{
  border-top-left-radius:8px;
  border-bottom-left-radius:8px;
}
.cal-multi-end{
  border-top-right-radius:8px;
  border-bottom-right-radius:8px;
}
.cal-multi-single{
  border-radius:8px;
}
.cal-multi-mid{
  border-radius:0;
}


/* 실제 멀티데이 연결 바 */
.cal-ev-bar.multi{
  opacity:.62;
  color:#444!important;
  height:18px;
  line-height:16px;
  font-size:9px;
  font-weight:600;
  padding:1px 6px;
  margin-left:-4px;
  margin-right:-4px;
  border-radius:0;
}
.cal-ev-bar.multi.start{
  margin-left:0;
  border-top-left-radius:8px!important;
  border-bottom-left-radius:8px!important;
}
.cal-ev-bar.multi.end{
  margin-right:0;
  border-top-right-radius:8px!important;
  border-bottom-right-radius:8px!important;
}
.cal-ev-bar.multi.single{
  margin-left:0;
  margin-right:0;
  border-radius:8px!important;
}
.multi-form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  width:100%;
}
.multi-form-grid input{
  width:100%;
}
@media(max-width:768px){
  .multi-form-grid{grid-template-columns:1fr}
}


/* v18: 멀티데이 일정은 더 연하고 이어진 바처럼 표시 */
.cal-ev-bar.multi{
  opacity:.62!important;
  color:#4f4f4a!important;
  margin-left:-4px;
  margin-right:-4px;
  border-radius:0!important;
}
.cal-ev-bar.multi.start{
  margin-left:0;
  border-top-left-radius:8px!important;
  border-bottom-left-radius:8px!important;
}
.cal-ev-bar.multi.end{
  margin-right:0;
  border-top-right-radius:8px!important;
  border-bottom-right-radius:8px!important;
}
.cal-ev-bar.multi.single{
  margin-left:0;
  margin-right:0;
  border-radius:8px!important;
}


/* v20 검색 결과 패널 */
.search-panel{
  margin-top:8px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  max-height:260px;
  overflow-y:auto;
  display:none;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
}
.search-panel.show{display:block}
.search-result{
  padding:8px 10px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  font-size:12px;
}
.search-result:last-child{border-bottom:none}
.search-result:hover{background:var(--bg)}
.search-type{
  font-size:9px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--faint);
  margin-bottom:2px;
}
.search-title{
  font-weight:700;
  color:var(--text);
}
.search-sub{
  color:var(--muted);
  font-size:11px;
  margin-top:1px;
  line-height:1.35;
}
.ttl-grid{touch-action:none}
.ttl-ghost{pointer-events:none!important}

/* ── RETRO PAGE ── */
.retro-wrap{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
.retro-cal-col{flex:1;min-width:300px}
.retro-detail-col{width:350px;flex-shrink:0;position:sticky;top:20px}
.retro-day-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px}
.retro-day-empty{color:var(--faint);font-size:13px;padding:40px 0;text-align:center}
.retro-day-title{font-size:17px;font-weight:700;letter-spacing:-.03em;margin-bottom:4px}
.retro-day-sub{font-size:11px;color:var(--muted);margin-bottom:16px}
.retro-sec{margin-bottom:16px}
.retro-sec-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.retro-item{display:flex;align-items:center;gap:7px;padding:5px 9px;background:var(--bg);border-radius:var(--rs);font-size:12px;margin-bottom:3px;border-left:3px solid transparent}
.retro-empty{color:var(--faint);font-size:11px;padding:4px 0}
.retro-note-ta{width:100%;min-height:100px;border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--bg);resize:vertical;line-height:1.7;margin-top:2px}
.retro-note-ta:focus{outline:none;border-color:var(--bmd)}
.retro-save-btn{margin-top:8px;border:none;border-radius:var(--rs);padding:8px 20px;font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer;color:#fff;transition:opacity .12s}
.retro-save-btn:hover{opacity:.85}
.retro-saved{font-size:11px;color:var(--muted);margin-left:8px;opacity:0;transition:opacity .3s}
/* retro calendar cell indicators */
.cc.has-retro .dn{box-shadow:0 0 0 2px #7F77DD33}
.cc.has-activity{background:rgba(127,119,221,.04)}
/* task inline edit */
.ttxt[title]{cursor:default}
.ttxt{cursor:pointer}
input.ttxt-edit{flex:1;border:none;border-bottom:2px solid var(--bmd);outline:none;background:transparent;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);padding:0;min-width:60px}
/* due date popup */
.due-picker-pop{position:fixed;z-index:600;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;box-shadow:0 8px 28px rgba(0,0,0,.13);display:flex;align-items:center;gap:8px}
.due-picker-pop input[type=date]{border:1px solid var(--border);border-radius:var(--rs);padding:6px 10px;font-size:13px;font-family:inherit;outline:none;color:var(--text);background:var(--bg)}
.due-picker-pop input[type=date]:focus{border-color:var(--bmd)}
.due-picker-confirm{border:none;border-radius:var(--rs);padding:6px 14px;font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer;color:#fff}



/* ===== v25 Kanban Plan + Project Retro ===== */
.kanban-toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.kanban-meta{display:flex;gap:8px;flex-wrap:wrap}
.kb-chip{background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:6px 11px;font-size:11px;color:var(--muted);display:flex;gap:6px;align-items:center}
.kanban-board{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;align-items:start}
.kb-col{background:rgba(255,255,255,.62);border:1px solid var(--border);border-radius:16px;padding:12px;min-height:320px}
.kb-col.drag-over{outline:2px solid rgba(0,0,0,.12);background:#fff}
.kb-col-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px}
.kb-col-title{font-size:12px;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:7px}
.kb-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.kb-count{font-size:11px;color:var(--faint);font-family:'DM Mono',monospace}
.kb-list{display:flex;flex-direction:column;gap:8px;min-height:250px}
.kb-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px;cursor:pointer;transition:transform .13s,box-shadow .13s,border-color .13s;box-shadow:0 2px 10px rgba(0,0,0,.025)}
.kb-card:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.07);border-color:var(--bmd)}
.kb-card.dragging{opacity:.45;transform:scale(.98)}
.kb-title{font-size:13px;font-weight:800;letter-spacing:-.025em;margin-bottom:7px;line-height:1.35;word-break:break-word}
.kb-card-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:8px}

<script>
const COLS=['#7F77DD','#1D9E75','#D85A30','#BA7517','#D4537E','#378ADD','#639922','#E24B4A','#D4A853','#9B59B6','#16A085','#E67E22','#2980B9','#27AE60','#F06292','#26C6DA','#7F8C8D','#636E72','#2D3436','#1A1A18'];
const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const DN=['일','월','화','수','목','금','토'];
const TD=new Date();
const CK=`<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
function lc(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgb(${Math.round(r*.13+255*.87)},${Math.round(g*.13+255*.87)},${Math.round(b*.13+255*.87)})`}
function dc(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);const f=.55;return`rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDate(s){if(!s)return'날짜 없음';const[y,m,d]=s.split('-');return`${+m}/${+d}`}
function fmtDur(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;if(h>0)return`${h}h ${String(m).padStart(2,'0')}m`;return`${m}m ${String(sec).padStart(2,'0')}s`}
function showAmt(n){if(S.hideRev)return'•••••원';return n.toLocaleString()+'원'}
function todayStr(){return`${TD.getFullYear()}-${String(TD.getMonth()+1).padStart(2,'0')}-${String(TD.getDate()).padStart(2,'0')}`}

function eachDate(start,end){
  const out=[];
  let d=new Date(start+'T12:00:00');
  const ed=new Date(end+'T12:00:00');
  while(d<=ed){
    out.push(d.toISOString().slice(0,10));
    d.setDate(d.getDate()+1);
  }
  return out;
}
function isMultiDay(ev){
  return ev && ev.end && ev.end!==ev.d;
}

function fmtTTDate(s){if(!s)return'';const d=new Date(s+'T12:00:00');const days=['일','월','화','수','목','금','토'];const isT=s===todayStr();return`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})${isT?' 🟢':''}`}

function dd(){
  const cy=TD.getFullYear(),cm=TD.getMonth();
  return{
    siteTitle:'내 대시보드', firstRun:true,
    tab:'all', cy, cm, ptab:{}, hideRev:false, allTab:'calendar', calFilter:null,
    planFilter:{}, showDoneTask:{},
    timer:{active:false,pid:null,startTs:null,note:''},
    ttDate:todayStr(), tt:{}, _ttid:1, ttView:'day',
    projects:[], ev:{}, tasks:{}, plans:{}, mnotes:{},
    timelog:{}, notes:{}, rev:{}, retro:{},
    _pid:1, _eid:{}, _tid:{}, _rid:{}, _plid:{}, _mnid:{}, _tlid:{}
  };
}

let S=(()=>{try{const s=localStorage.getItem('dash-share-v1');if(s){const d=JSON.parse(s);mg(d);return d;}return dd();}catch(e){return dd();}})();
function mg(d){
  if(d.plans)Object.keys(d.plans).forEach(pid=>(d.plans[pid]||[]).forEach(pl=>{if(pl.items!==undefined&&pl.content===undefined){pl.content=(pl.items||[]).map(i=>(i.done?'✓ ':'☐ ')+i.t).join('\n');delete pl.items;pl.status=pl.status||'ongoing';pl.tags=pl.tags||[];pl.date=pl.date||'';pl.open=false;}}));
  if(!d.mnotes){d.mnotes={};(d.projects||[]).forEach(p=>{d.mnotes[p.id]=[];d._mnid={};});}
  Object.keys(d.mnotes||{}).forEach(pid=>(d.mnotes[pid]||[]).forEach(n=>{if(!n.tags)n.tags=[];}));
  if(!d.timelog){d.timelog={};(d.projects||[]).forEach(p=>{d.timelog[p.id]=[];});d._tlid={};}
  Object.keys(d.tasks||{}).forEach(pid=>(d.tasks[pid]||[]).forEach(t=>{if(!t.tags)t.tags=[];}));
  if(!d.timer)d.timer={active:false,pid:null,startTs:null,note:''};
  if(!d.hideRev)d.hideRev=false;if(!d.ptab)d.ptab={};if(!d.siteTitle)d.siteTitle='내 프로젝트';
  if(!d.allTab)d.allTab='calendar';if(!d.planFilter)d.planFilter={};if(!d.showDoneTask)d.showDoneTask={};
  if(!d.tt)d.tt={};if(!d.ttDate)d.ttDate=todayStr();if(!d._ttid)d._ttid=1;
  if(!d.retro)d.retro={};
  const cy=TD.getFullYear(),cm=TD.getMonth()+1;
  Object.keys(d.rev||{}).forEach(pid=>(d.rev[pid]||[]).forEach(r=>{if(!r.y)r.y=cy;if(!r.m)r.m=cm;}));
}
function sv(){try{localStorage.setItem('dash-share-v1',JSON.stringify(S));}catch(e){}}
function gP(id){return S.projects.find(p=>p.id===id)}
function rTot(pid){return(S.rev[pid]||[]).reduce((s,r)=>s+r.a,0)}
function allRev(){return S.projects.reduce((s,p)=>s+rTot(p.id),0)}
function monthRev(y,m){return S.projects.reduce((s,p)=>s+(S.rev[p.id]||[]).filter(r=>r.y===y&&r.m===m).reduce((s,r)=>s+r.a,0),0)}
function monthRevP(pid,y,m){return(S.rev[pid]||[]).filter(r=>r.y===y&&r.m===m).reduce((s,r)=>s+r.a,0)}

function R(){rSB();S.tab==='all'?rAll():rProj(S.tab);}
function setTab(t){S.tab=t;if(t!=="all")S.calFilter=null;sv();R();closeSB();}
function setPTab(pid,t){if(!S.ptab)S.ptab={};S.ptab[pid]=t;sv();rProj(pid);closeSB();}
function gPT(pid){return S.ptab&&S.ptab[pid]?S.ptab[pid]:'overview'}
function setAllTab(t){S.allTab=t;sv();rAll();if(t==='timetable')ttlAutoScroll();}
function toggleRevHide(){S.hideRev=!S.hideRev;sv();R();}
window.setTab=setTab;window.setPTab=setPTab;window.setAllTab=setAllTab;window.toggleRevHide=toggleRevHide;


function sbSearch(v){S.sbSearch=(v||'').trim().toLowerCase();sv();rSB();searchAllData(v);}
window.sbSearch=sbSearch;
function taskTagsHtml(t,pid,editable=true){const tags=(t.tags||[]).filter(Boolean);const body=tags.map(x=>`<span class="task-tag">#${escH(x)}</span>`).join('');return `<span class="task-tags">${body}${editable?`<button class="task-tag-btn" onclick="tEditTags('${pid}',${t.i})">${tags.length?'수정':'태그'}</button>`:''}</span>`;}
function parseTags(v){return (v||'').split(/[#,，,\s]+/).map(x=>x.trim().replace(/^#/,'')).filter(Boolean).filter((x,i,a)=>a.indexOf(x)===i).slice(0,5);}

function rSB(){
  const days=['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
  const lbl=document.getElementById('sb-title-lbl');if(lbl)lbl.textContent=S.siteTitle||'내 프로젝트';
  document.getElementById('today-lbl').textContent=`${TD.getFullYear()}년 ${MN[TD.getMonth()]} ${TD.getDate()}일 ${days[TD.getDay()]}`;
  document.getElementById('foot-rev').textContent=showAmt(allRev());const _mt=document.getElementById('mob-title');if(_mt)_mt.textContent=S.siteTitle||'내 프로젝트';
  document.getElementById('foot-eye').textContent=S.hideRev?'🙈':'👁';const _sbi=document.getElementById('sb-search');if(_sbi&&document.activeElement!==_sbi)_sbi.value=S.sbSearch||'';
  document.getElementById('nav-all').className='ni'+(S.tab==='all'?' active':'');
  const tsb=document.getElementById('timer-sb');
  if(S.timer&&S.timer.active){tsb.className='timer-sb on';const p=gP(S.timer.pid);if(p)document.getElementById('timer-sb-proj').textContent=p.n;}
  else tsb.className='timer-sb';
  const q=(S.sbSearch||'').toLowerCase();
  const shown=S.projects.filter(p=>!q || p.n.toLowerCase().includes(q) || (S.tasks[p.id]||[]).some(t=>(t.t||'').toLowerCase().includes(q)||(t.tags||[]).some(tag=>tag.toLowerCase().includes(q))));
  document.getElementById('pnav').innerHTML=shown.map(p=>{
    const done=(S.tasks[p.id]||[]).filter(t=>t.done).length,tot=(S.tasks[p.id]||[]).length;
    return`<div class="ni${S.tab===p.id?' active':''}" id="ni-${p.id}"><div class="ndot" style="background:${p.c}" onclick="openCP(event,'${p.id}')"></div><span class="nname" id="nn-${p.id}" onclick="setTab('${p.id}')" ondblclick="startRen('${p.id}',event)">${p.n}</span><span class="nbadge">${done}/${tot}</span><button class="ndel" onclick="projDel('${p.id}')">×</button></div>`;
  }).join('')+(q&&!shown.length?'<div class="sb-search-empty" style="display:block">검색 결과가 없어요</div>':'');
}

/* ── SITE TITLE ──── */
function startSiteTitleRen(){
  const wrap=document.querySelector('.sb-title-wrap'),lbl=document.getElementById('sb-title-lbl');if(!lbl)return;
  const inp=document.createElement('input');inp.className='sb-title-inp';inp.value=S.siteTitle||'내 프로젝트';
  lbl.replaceWith(inp);inp.focus();inp.select();
  const done=()=>{S.siteTitle=inp.value.trim()||S.siteTitle;sv();rSB();};
  inp.addEventListener('blur',done);inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=S.siteTitle;inp.blur();}});
}
window.startSiteTitleRen=startSiteTitleRen;

/* ── COLOR PICKER ── */
let _cpid=null;
function openCP(e,pid){e.stopPropagation();_cpid=pid;const pop=document.getElementById('cpop');pop.innerHTML=COLS.map(c=>`<div class="csw${gP(pid).c===c?' sel':''}" style="background:${c}" onclick="pickC('${c}')"></div>`).join('');const rect=e.target.getBoundingClientRect();pop.style.left=(rect.right+8)+'px';pop.style.top=(rect.top-6)+'px';pop.style.display='grid';}
function pickC(c){if(!_cpid)return;const p=gP(_cpid);if(p)p.c=c;document.getElementById('cpop').style.display='none';_cpid=null;sv();R();}
document.addEventListener('click',()=>{document.getElementById('cpop').style.display='none';_cpid=null;});
window.openCP=openCP;window.pickC=pickC;

/* ── RENAME ── */
function startRen(pid,e){if(e)e.stopPropagation();const p=gP(pid),span=document.getElementById('nn-'+pid);if(!span)return;const inp=document.createElement('input');inp.className='nname-inp';inp.value=p.n;span.replaceWith(inp);inp.focus();inp.select();const done=()=>{p.n=inp.value.trim()||p.n;sv();R();};inp.addEventListener('blur',done);inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=p.n;inp.blur();}});}
function startMRen(pid){const p=gP(pid),el=document.getElementById('main-title');if(!el)return;const inp=document.createElement('input');inp.className='ptitle-inp';inp.value=p.n;el.replaceWith(inp);inp.focus();inp.select();const done=()=>{p.n=inp.value.trim()||p.n;sv();R();};inp.addEventListener('blur',done);inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=p.n;inp.blur();}});}
window.startRen=startRen;window.startMRen=startMRen;

/* ── PROJECTS ── */
function projAdd(){const id='p'+(S._pid++);const c=COLS[S.projects.length%COLS.length];S.projects.push({id,n:'새 프로젝트',c});['ev','tasks','plans','mnotes','timelog'].forEach(k=>{if(!S[k])S[k]={};S[k][id]=[];});S.notes[id]='';S.rev[id]=[];sv();R();setTimeout(()=>startRen(id),60);}
function projDel(pid){if(!confirm(`"${gP(pid).n}" 프로젝트를 삭제할까요?`))return;S.projects=S.projects.filter(p=>p.id!==pid);['ev','tasks','plans','mnotes','timelog','notes','rev'].forEach(k=>delete S[k][pid]);if(S.tab===pid)S.tab='all';sv();R();}
window.projAdd=projAdd;window.projDel=projDel;

/* ── CALENDAR ── */
function mkCal(pid,large=false){
  const y=S.cy,m=S.cm,first=new Date(y,m,1).getDay(),last=new Date(y,m+1,0).getDate(),pL=new Date(y,m,0).getDate();
  const pids=pid?[pid]:S.projects.map(p=>p.id);const ev={};

/* ── 캘린더 퀵 추가 + 드래그 ── */
let _calDrag=null,_calDragged=false,_calSuppressClick=false;

function clearCalDragUI(){
  document.querySelectorAll('.cc[data-date]').forEach(el=>{
    el.style.outline='';
    el.style.background='';
  });
}

function calMD(e,ds,pid=null){
  if(e.target.closest('.cal-ev-bar')||e.target.closest('.cal-ev-time')||e.target.closest('.cal-ev-more'))return;
  _calDrag={start:ds,end:ds,pid:pid};
  _calDragged=false;
  e.preventDefault&&e.preventDefault();
}

function calME(ds){
  if(!_calDrag)return;
  if(ds!==_calDrag.end){_calDragged=true;_calDrag.end=ds;}
  const a=Math.min(_calDrag.start,_calDrag.end);
  const b=Math.max(_calDrag.start,_calDrag.end);
  document.querySelectorAll('.cc[data-date]').forEach(el=>{
    const d=el.getAttribute('data-date');
    const inRange=d>=a&&d<=b;
    el.style.outline=inRange?'2px solid rgba(0,0,0,.24)':'';
    el.style.outlineOffset='-2px';
    el.style.background=inRange?'rgba(127,119,221,.08)':'';
  });
}

function finishCalDrag(e,ds,pid=null){
  if(!_calDrag)return;
  const start=_calDrag.start<=ds?_calDrag.start:ds;
  const end=_calDrag.start<=ds?ds:_calDrag.start;
  const dragPid=pid||_calDrag.pid||null;
  const wasDragged=_calDragged&&start!==end;
  _calDrag=null;
  clearCalDragUI();
  if(wasDragged){
    _calSuppressClick=true;
    openMultiDayModal(start,end,dragPid);
    setTimeout(()=>{_calSuppressClick=false;},140);
  }
}

function calMU(e,ds,pid=null){finishCalDrag(e,ds,pid);}

let _lastCalClickDS='',_lastCalClickTs=0;
function calClick(e,ds,pid=null){
  if(_calSuppressClick)return;
  const now=Date.now();
  if(_lastCalClickDS===ds && now-_lastCalClickTs<120)return;
  _lastCalClickDS=ds;_lastCalClickTs=now;
  if(e.target.closest('.cal-ev-bar')||e.target.closest('.cal-ev-time')||e.target.closest('.cal-ev-more'))return;
  openMultiDayModal(ds,ds,pid||((S.tab&&S.tab!=='all')?S.tab:null));
}

document.addEventListener('mouseup',(e)=>{
  if(!_calDrag)return;
  const cell=e.target.closest?.('.cc[data-date]');
  const ds=cell?.getAttribute('data-date')||_calDrag.end||_calDrag.start;
  finishCalDrag(e,ds,_calDrag.pid||null);
});

function normalizeImportedData(raw){

function mkRevChart(pid){
  const months=[];
  const numMonths=12;
  for(let i=numMonths-1;i>=0;i--){
    const d=new Date(TD.getFullYear(),TD.getMonth()-i,1);
    const y=d.getFullYear(),m=d.getMonth()+1;
    const amt=pid?monthRevP(pid,y,m):monthRev(y,m);
    months.push({y,m,amt,lbl:`${m}월`});
  }
  const maxAmt=Math.max(...months.map(m=>m.amt),1);
  const p=pid?gP(pid):null;
  const color=p?p.c:'#7F77DD';
  const W=760,H=210,baseY=164,left=18,right=18;
  const plotW=W-left-right;
  const gap=10;
  const barW=Math.max(28,Math.floor((plotW-(numMonths-1)*gap)/numMonths));
  const usedW=numMonths*barW+(numMonths-1)*gap;
  const x0=left+(plotW-usedW)/2;
  const guideVals=[0,.25,.5,.75,1];
  let svg='';
  guideVals.forEach(g=>{
    const y=baseY-(g*(baseY-38));
    svg+=`<line x1="${left}" y1="${y}" x2="${W-right}" y2="${y}" stroke="rgba(0,0,0,.055)" stroke-width="1"/>`;
  });
  months.forEach((mo,i)=>{
    const x=x0+i*(barW+gap);
    const barH=mo.amt>0?Math.max(8,Math.round((mo.amt/maxAmt)*(baseY-44))):4;
    const y=baseY-barH;
    const isNow=mo.y===TD.getFullYear()&&mo.m===TD.getMonth()+1;
    const fill=isNow?color:color+'4D';
    svg+=`<rect x="${x}" y="${y}" width="${barW}" height="${barH}" rx="8" fill="${fill}"/>`;
    if(mo.amt>0){
      const val=mo.amt>=100000000?Math.round(mo.amt/100000000)+'억':mo.amt>=10000?Math.round(mo.amt/10000)+'만':mo.amt.toLocaleString();
      svg+=`<text x="${x+barW/2}" y="${Math.max(16,y-8)}" text-anchor="middle" font-size="11" fill="${color}" font-weight="800" font-family="DM Mono,monospace">${val}</text>`;
    }
    svg+=`<text x="${x+barW/2}" y="${baseY+25}" text-anchor="middle" font-size="11" fill="${isNow?'#1C1C1A':'#9B9B94'}" font-weight="${isNow?'800':'500'}" font-family="Noto Sans KR,sans-serif">${mo.lbl}</text>`;
  });
  const total=months.reduce((a,b)=>a+b.amt,0);
  const avg=Math.round(total/numMonths);
  const maxMonth=months.reduce((a,b)=>a.amt>=b.amt?a:b,months[0]);
  const summary=S.hideRev?'수익 그래프가 숨겨져 있어요':`월 평균 ${showAmt(avg)} · 최고 ${maxMonth.m}월 ${showAmt(maxMonth.amt)}`;
  return`<div class="rev-chart${S.hideRev?' hidden':''}"><div class="rev-chart-head"><div><div class="rev-chart-lbl">최근 ${numMonths}개월 수익 그래프</div><div class="rev-chart-sub">${summary}</div></div><button class="rev-chart-hide" onclick="toggleRevHide()">${S.hideRev?'🙈 보이기':'👁 숨기기'}</button></div><div class="rev-chart-body"><svg width="100%" height="260" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="overflow:visible;display:block">${svg}</svg></div></div>`;
}

function dueStat(due){
  if(!due)return null;
  const today=`${TD.getFullYear()}-${String(TD.getMonth()+1).padStart(2,'0')}-${String(TD.getDate()).padStart(2,'0')}`;
  const tom=new Date(TD);tom.setDate(tom.getDate()+3);

  if(due<today)return'overdue';if(due===today)return'today';if(due<=tomStr)return'soon';return'normal';
}
function dueLabel(due){const[y,m,d]=due.split('-');return`${m}/${d}`;}

function ensureTaskCreatedDates(){
  let changed=false;
  Object.keys(S.tasks||{}).forEach(pid=>(S.tasks[pid]||[]).forEach(t=>{if(!taskCreatedDate(t)){t.created=t.due||todayStr();changed=true;}}));

function startOfWeekStr(base=todayStr()){const d=new Date(base+'T12:00:00');const dow=d.getDay();d.setDate(d.getDate()-(dow===0?6:dow-1));return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function endOfWeekStr(base=todayStr()){const d=new Date(startOfWeekStr(base)+'T12:00:00');d.setDate(d.getDate()+6);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function isThisWeek(ds){if(!ds)return false;const s=startOfWeekStr(),e=endOfWeekStr();return ds>=s&&ds<=e;}
function collectTasks(kind,pid=null){
  const pids=pid?[pid]:S.projects.map(p=>p.id);let arr=[];
  pids.forEach(id=>{const p=gP(id);(S.tasks[id]||[]).forEach(t=>{
    if(kind==='todayCreated'&&taskCreatedDate(t)!==todayStr())return;
    if(kind==='weekDue'&&(!t.due||!isThisWeek(t.due)||t.done))return;
    arr.push({...t,pid:id,project:p});
  });});
  arr.sort((a,b)=>{
    if(kind==='weekDue')return (b.due||'0000').localeCompare(a.due||'0000') || (b.i||0)-(a.i||0);
    return (b.i||0)-(a.i||0);
  });
  return arr;
}
