      const p=gP(pid); const rev=(typeof monthRevP==='function')?monthRevP(pid,cy,cm):0;
      return {pid,p,min,rev,perHour:min?Math.round(rev/(min/60)):0};
    }).filter(x=>x.p).sort((a,b)=>b.min-a.min);
    const highNoRev=projRows.find(x=>x.min>=180 && x.rev<=0);
    const lowEff=projRows.filter(x=>x.rev>0&&x.min>=60).sort((a,b)=>a.perHour-b.perHour)[0];
    let main='타임블럭에 태그가 쌓이면 시간 대비 수익성, 밤 작업 비율, 과하게 몰린 업무를 더 정확히 보여줄게요.';
    if(total){
      if(nightPct>=28) main=`이번 주 밤 10시 이후 작업 비중이 ${nightPct}%예요. 일정이 뒤로 밀리는 패턴이 보여서, 다음 주엔 밤 작업을 줄이는 블럭을 먼저 잡아보면 좋아요.`;
      else if(top[0]==='편집' && topPct>=45) main=`이번 주는 편집 시간이 ${topPct}%로 가장 커요. 제작량은 나오지만, 기획/수익 연결 작업이 밀리지 않는지 체크해보면 좋아요.`;
      else if(highNoRev) main=`${highNoRev.p.n}에 ${Math.round(highNoRev.min/60)}시간 이상 썼는데 이번 달 수익 기록이 없어요. 수익 연결 여부를 한 번 확인해보면 좋아요.`;
      else if(lowEff && lowEff.perHour>0) main=`${lowEff.p.n}은 시간 대비 수익성이 상대적으로 낮게 보여요. 범위 조정이나 단가 점검 후보로 봐도 좋아요.`;
      else main=`이번 주는 ${top[0]} 작업이 ${topPct}%로 가장 많아요. 전체 기록 시간은 ${Math.floor(total/60)}h ${pad(total%60)}m이고, 밤 작업 비중은 ${nightPct}%예요.`;
    }
    return {main,top:`${top[0]} ${topPct}%`,night:`밤작업 ${nightPct}%`,money:lowEff&&lowEff.perHour?`${lowEff.p.n} ${lowEff.perHour.toLocaleString()}원/h`:(highNoRev?`${highNoRev.p.n} 수익 미연결`:'수익 연결 적음')};
  }
  if(window.mkAllInsightTop){
    window.mkAllInsightTop=function(){
      const ins=collectInsight();
      const ds=todayStr();
      const list=((S.tt||{})[ds]||[]).slice().sort((a,b)=>(a.h*60+(a.m||0))-(b.h*60+(b.m||0)));
      const rows=list.slice(0,4).map(ev=>{const p=ev.pid?gP(ev.pid):null;const col=p?p.c:'#C8C8C0';const tg=(ev.tags||[])[0]||autoTags(ev.title)[0]||'';return `<div class="today-line-row" style="border-left-color:${col}"><span class="today-line-time">${pad(ev.h)}:${pad(ev.m||0)}</span><span class="today-line-name">${esc(ev.title)}</span>${tg?`<span class="today-line-proj">#${esc(tg)}</span>`:(p?`<span class="today-line-proj" style="color:${dc(p.c)}">${esc(p.n)}</span>`:'')}</div>`;}).join('');
      return `<section class="all-top-widgets" id="all-top-widgets">
        <div class="ai-work-card">
          <div class="ai-work-head"><div class="ai-work-title">AI 작업 인사이트</div><div class="ai-work-pill">시간/수익 기준</div></div>
          <div class="ai-work-main">${esc(ins.main)}</div>
          <div class="ai-work-subgrid">
            <div class="ai-work-mini"><div class="ai-work-mini-lbl">업무 편중</div><div class="ai-work-mini-val">${esc(ins.top)}</div></div>
            <div class="ai-work-mini"><div class="ai-work-mini-lbl">생활 패턴</div><div class="ai-work-mini-val">${esc(ins.night)}</div></div>
            <div class="ai-work-mini"><div class="ai-work-mini-lbl">수익성 힌트</div><div class="ai-work-mini-val">${esc(ins.money)}</div></div>
          </div>
        </div>
        <div class="today-line-card">
          <div class="today-line-head"><div class="today-line-title">오늘의 타임라인</div><div class="today-line-date">${ds.slice(5).replace('-','/')}</div></div>
          <div class="today-line-list">${rows || '<div class="today-line-empty">오늘 등록된 타임블럭이 없어요.<br>타임테이블에서 오늘 일정을 잡아보세요.</div>'}</div>
          ${list.length>4?`<div class="today-line-more">+${list.length-4}개 더 있음</div>`:''}
        </div>
      </section>`;
    };
  }
})();

<script id="mbh-business-repair-js">
(function(){
  function won(n){
    n = Math.round(Number(n)||0);
    return n.toLocaleString() + '원';
  }
  function hoursLabel(h){
    h = Number(h)||0;
    if(h <= 0) return '0h';
    const hr = Math.floor(h);
    const mn = Math.round((h-hr)*60);
    return mn ? `${hr}h ${String(mn).padStart(2,'0')}m` : `${hr}h`;
  }
  function getProjectHours(pid){
    let minutes = 0;
    const tt = (window.S && S.tt) ? S.tt : {};
    Object.keys(tt).forEach(ds=>{
      (tt[ds]||[]).forEach(ev=>{
        if(ev && ev.pid === pid){
          minutes += Number(ev.dur || 60);
        }
      });
    });
    const tl = (window.S && S.timelog && S.timelog[pid]) ? S.timelog[pid] : [];
    tl.forEach(x=>{ minutes += Math.round((Number(x.dur)||0)/60); });
    return minutes / 60;
  }
  function getProjectRevenue(pid){
    if(typeof window.rTot === 'function') return window.rTot(pid);
    return ((S.rev||{})[pid]||[]).reduce((a,b)=>a+(Number(b.a)||0),0);
  }
  function ensureRevisionStore(){
    if(!window.S) return;
    if(!S.revisions) S.revisions = {};
    (S.projects||[]).forEach(p=>{ if(!S.revisions[p.id]) S.revisions[p.id] = []; });
  }
  window.getProjectHours = getProjectHours;
  window.getProjectHourlyRate = function(pid){
    const rev = getProjectRevenue(pid);
    const hrs = getProjectHours(pid);
    return hrs > 0 ? rev / hrs : 0;
  };
  window.mkFreelanceMetrics = function(pid){
    ensureRevisionStore();
    const rev = getProjectRevenue(pid);
    const hrs = getProjectHours(pid);
    const rate = hrs > 0 ? rev / hrs : 0;
    const revs = (S.revisions && S.revisions[pid]) ? S.revisions[pid] : [];
    let comment = '';
    if(hrs <= 0) comment = '타임블럭을 프로젝트에 연결하면 실제 시급이 자동 계산돼요.';
    else if(rate < 30000) comment = '작업시간 대비 수익성이 낮은 편이에요. 다음 견적에서 범위/단가를 다시 봐도 좋아요.';
    else if(rate < 60000) comment = '무난한 흐름이에요. 수정 요청이 늘면 실제 시급이 떨어질 수 있어요.';
    else comment = '시간 대비 수익성이 좋은 편이에요. 비슷한 유형의 일을 더 늘려도 좋아요.';

    return `<div class="freelance-metrics">
      <div class="freelance-metric">
        <div class="freelance-metric-label">실제 시급</div>
        <div class="freelance-metric-value">${hrs>0 ? won(rate) : '-'}</div>
        <div class="freelance-metric-sub">총 수익 ÷ 연결된 작업시간</div>
      </div>
      <div class="freelance-metric">
        <div class="freelance-metric-label">작업시간</div>
        <div class="freelance-metric-value">${hoursLabel(hrs)}</div>
        <div class="freelance-metric-sub">타임테이블 + 타이머 기록 기준</div>
      </div>
      <div class="freelance-metric">
        <div class="freelance-metric-label">수정 요청</div>
        <div class="freelance-metric-value">${revs.length}회</div>
        <div class="freelance-metric-sub">${revs.length>=3?'단가 재조정 후보':'아직 안정적인 편'}</div>
      </div>
    </div>
    <div class="business-note">${comment}</div>`;
  };
  window.mkRevisionBox = function(pid){
    ensureRevisionStore();
    const p = (typeof gP === 'function') ? gP(pid) : null;
    const color = p ? p.c : '#7F77DD';
    const arr = (S.revisions && S.revisions[pid]) ? S.revisions[pid] : [];
    return `<div class="revision-box">
      <div class="ctitle" style="color:${color}">수정 요청 기록</div>
      <div class="revision-form">
        <input class="r-inp" id="rev-round" type="text" placeholder="1차">
        <input class="r-inp" id="rev-memo" type="text" placeholder="예: 썸네일 문구 수정 / 자막 톤 변경">
        <input class="r-inp" id="rev-date" type="date" value="${(typeof todayStr==='function')?todayStr():''}">
        <button class="r-ab" style="background:${color}" onclick="addRevision('${pid}')">+</button>
      </div>
      <div class="revision-list" id="revision-list-${pid}">
        ${arr.length ? arr.slice().reverse().map(r=>`<div class="revision-row">
          <span class="revision-round">${r.round||'수정'}</span>
          <span class="revision-memo">${(typeof escH==='function')?escH(r.memo):r.memo}</span>
          <span class="revision-date">${r.date||''}</span>
          <button class="revision-del" onclick="delRevision('${pid}',${r.id})">×</button>
        </div>`).join('') : '<div class="empty">수정 요청 기록이 없어요</div>'}
      </div>
    </div>`;
  };
  window.addRevision = function(pid){
    ensureRevisionStore();
    if(typeof pushUndo === 'function') pushUndo();
    const round = document.getElementById('rev-round')?.value.trim() || `${(S.revisions[pid]||[]).length+1}차`;
    const memo = document.getElementById('rev-memo')?.value.trim();
    const date = document.getElementById('rev-date')?.value || ((typeof todayStr==='function')?todayStr():'');
    if(!memo) return;
    if(!S._revisionId) S._revisionId = 1;
    S.revisions[pid].push({id:S._revisionId++, round, memo, date});
    if(typeof sv === 'function') sv();
    if(typeof rPT === 'function') rPT(pid,'revenue');
    else if(typeof R === 'function') R();
  };
  window.delRevision = function(pid,id){
    ensureRevisionStore();
    if(typeof pushUndo === 'function') pushUndo();
    S.revisions[pid] = (S.revisions[pid]||[]).filter(x=>x.id!==id);
    if(typeof sv === 'function') sv();
    if(typeof rPT === 'function') rPT(pid,'revenue');
    else if(typeof R === 'function') R();
  };

  // Patch revenue tab renderer without touching other pages.
  function patchRevenueRenderer(){
    if(typeof window.rPT !== 'function' || window.__businessRevenuePatched) return;
    const oldRPT = window.rPT;
    window.rPT = function(pid, tab){
      oldRPT(pid, tab);
      if(tab !== 'revenue') return;
      const cont = document.getElementById('tcont');
      if(!cont || cont.querySelector('.freelance-metrics')) return;
      const panel = cont.querySelector('.rev-project-panel') || cont.firstElementChild;
      if(panel){
        const head = panel.querySelector('.rev-project-head');
        const html = window.mkFreelanceMetrics(pid) + window.mkRevisionBox(pid);
        if(head) head.insertAdjacentHTML('afterend', html);
        else panel.insertAdjacentHTML('afterbegin', html);
      }
    };
    window.__businessRevenuePatched = true;
  }

  // Patch AI insight if existing widget uses common function names.
  function buildBusinessInsightLine(){
    ensureRevisionStore();
    const projects = S.projects || [];
    if(!projects.length) return null;
    const rows = projects.map(p=>{
      const hrs = getProjectHours(p.id);
      const rev = getProjectRevenue(p.id);
      const rate = hrs>0 ? rev/hrs : 0;
      const revs = (S.revisions && S.revisions[p.id]) ? S.revisions[p.id].length : 0;
      return {p,hrs,rev,rate,revs};
    }).filter(x=>x.hrs>0 || x.rev>0 || x.revs>0);
    if(!rows.length) return null;
    const low = rows.filter(x=>x.hrs>0).sort((a,b)=>a.rate-b.rate)[0];
    const manyRev = rows.sort((a,b)=>b.revs-a.revs)[0];
    if(manyRev && manyRev.revs>=3){
      return `${manyRev.p.n} 수정 요청이 ${manyRev.revs}회예요. 다음 견적 때 수정 범위/단가를 따로 잡아도 좋아 보여요.`;
    }
    if(low && low.hrs>0 && low.rate>0){
      return `${low.p.n} 실제 시급은 ${won(low.rate)}/h예요. 작업시간 대비 수익 흐름을 확인해보면 좋아요.`;
    }
    return null;
  }
  window.getBusinessInsightLine = buildBusinessInsightLine;

  // Try adding a small business insight line inside AI insight cards after render.
  function injectInsightLine(){
    const line = buildBusinessInsightLine();
    if(!line) return;
    const candidates = Array.from(document.querySelectorAll('.ai-insight-card,.insight-card,.top-insight,.dash-insight,[class*="insight"]'));
    const card = candidates.find(el=>el.textContent && el.textContent.includes('AI')) || candidates[0];
    if(card && !card.querySelector('.business-ai-line')){
      const div = document.createElement('div');
      div.className = 'business-ai-line';
      div.style.cssText = 'margin-top:10px;padding-top:10px;border-top:1px solid rgba(0,0,0,.08);font-size:13px;color:var(--muted);line-height:1.55';
      div.textContent = line;
      card.appendChild(div);
    }
  }

  document.addEventListener('DOMContentLoaded', function(){
    ensureRevisionStore();
    patchRevenueRenderer();
    setTimeout(injectInsightLine, 100);
  });

  const oldR = window.R;
  if(typeof oldR === 'function' && !window.__businessRPatched){
    window.R = function(){
      const res = oldR.apply(this, arguments);
      patchRevenueRenderer();
      setTimeout(injectInsightLine, 50);
      return res;
    };
    window.__businessRPatched = true;
  }
})();
</script>


<script id="mbh-plan-layout-final-js">
(function(){
  function normalizePlanLayout(){
    const section = document.getElementById('plan-section');

    const addBtn = section.querySelector('.add-plan, button[onclick*="planAdd"]');

    if((addBtn || archiveBtn) && !section.querySelector('.plan-toolbar')){

      toolbar.className = 'plan-toolbar';

      // Put toolbar after summary/filter if possible, before board/cards.

        anchor.parentNode.insertBefore(toolbar, anchor.nextSibling);
      }else{
        section.insertBefore(toolbar, section.firstChild);
      }

      if(archiveBtn) toolbar.appendChild(archiveBtn);
      if(addBtn) toolbar.appendChild(addBtn);

    // Remove giant circular layout from direct child stat cards if any.

<script id="mbh-final-clean-js">
(function(){
  function cleanPlanToolbar(){
    const section = document.getElementById('plan-section') || document;
    Array.from(section.querySelectorAll('button')).forEach(btn=>{
      const txt = (btn.textContent || '').replace(/\s+/g,' ').trim();
      if(txt === '완료 아카이브'){
        btn.remove();
      }
    });

    // make sure + 새 기획안 is visible
    Array.from(section.querySelectorAll('button')).forEach(btn=>{
      const txt = (btn.textContent || '').replace(/\s+/g,' ').trim();
      if(txt.includes('새 기획안')){
        btn.style.display = '';
        btn.style.visibility = 'visible';
        btn.style.opacity = '1';
      }
    });
  }

  function dedupeArchiveNav(){
    const archiveItems = Array.from(document.querySelectorAll('.ni')).filter(el=>{
      const txt = (el.textContent || '').replace(/\s+/g,' ').trim();
      return txt === '기획안 아카이브';
    });
    archiveItems.forEach((el, idx)=>{
      if(idx > 0) el.remove();
    });
  }

  function finalClean(){
    cleanPlanToolbar();
    dedupeArchiveNav();
  }

  document.addEventListener('DOMContentLoaded',()=>setTimeout(finalClean,120));

  if(typeof window.R === 'function' && !window.__mbhFinalCleanR){
    const oldR = window.R;
    window.R = function(){
      const out = oldR.apply(this, arguments);
      setTimeout(finalClean,80);
      return out;
    };
    window.__mbhFinalCleanR = true;
  }

  if(typeof window.rSB === 'function' && !window.__mbhFinalCleanRSB){
    const oldRSB = window.rSB;
    window.rSB = function(){
      const out = oldRSB.apply(this, arguments);
      setTimeout(dedupeArchiveNav,20);
      return out;
    };
    window.__mbhFinalCleanRSB = true;
  }

  if(typeof window.rPT === 'function' && !window.__mbhFinalCleanRPT){
    const oldRPT = window.rPT;
    window.rPT = function(pid, tab){
      const out = oldRPT.apply(this, arguments);
      if(tab === 'plan') setTimeout(cleanPlanToolbar,50);
      return out;
    };
    window.__mbhFinalCleanRPT = true;
  }
})();
</script>

<script id="mbh-braindump-js">
(function(){
  if(window.__mbhBrainDumpInstalled)return;window.__mbhBrainDumpInstalled=true;
  const BD_UNCAT='__uncat__';
  function esc(s){return typeof escH==='function'?escH(s):String(s||'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]));}
  function ensureBD(){
    if(!S.brainDump)S.brainDump=[];
    if(!S._bdid)S._bdid=1;
    S.brainDump.forEach(x=>{if(!x.tags)x.tags=[];if(!('pid' in x))x.pid=null;if(!x.created)x.created=todayStr();});
  }
  function bdProj(pid){return pid?gP(pid):null;}
  function bdDate(v){if(!v)return'';const d=String(v).slice(0,10).split('-');return d.length===3?`${d[1]}/${d[2]}`:v;}
  function bdProjectOptions(sel, allowAll=false){
    let h=allowAll?`<option value="all"${sel==='all'?' selected':''}>전체 프로젝트</option>`:'';
    h+=`<option value=""${!sel?' selected':''}>미분류</option>`;
    h+=S.projects.map(p=>`<option value="${p.id}"${sel===p.id?' selected':''}>${esc(p.n)}</option>`).join('');
    return h;
  }
  function bdTypeOptions(sel){return ['idea','task','content','memo'].map(v=>{const n={idea:'아이디어',task:'할 일 후보',content:'콘텐츠',memo:'메모'}[v];return`<option value="${v}"${sel===v?' selected':''}>${n}</option>`}).join('');}
  function bdStats(pid){const arr=(S.brainDump||[]).filter(x=>pid===undefined?true:(pid?x.pid===pid:!x.pid));return{total:arr.length,uncat:arr.filter(x=>!x.pid).length,today:arr.filter(x=>String(x.created||'').slice(0,10)===todayStr()).length};}
  function bdFiltered(pid){
    const q=(S.bdQuery||'').toLowerCase();const f=S.bdFilter===undefined?'all':S.bdFilter;const type=S.bdTypeFilter||'all';
    let arr=(S.brainDump||[]).slice();
    if(pid!==undefined)arr=arr.filter(x=>pid?x.pid===pid:!x.pid);
    else if(f&&f!=='all')arr=arr.filter(x=>f===BD_UNCAT?!x.pid:x.pid===f);
    if(type&&type!=='all')arr=arr.filter(x=>(x.type||'idea')===type);
    if(q)arr=arr.filter(x=>(x.text||'').toLowerCase().includes(q)||(x.tags||[]).some(t=>String(t).toLowerCase().includes(q))||(bdProj(x.pid)?.n||'미분류').toLowerCase().includes(q));
    arr.sort((a,b)=>(b.updated||b.created||'').localeCompare(a.updated||a.created||''));
    return arr;
  }
  function bdCard(x,contextPid){
    const p=bdProj(x.pid);const col=p?p.c:'#B5B5AD';const name=p?p.n:'미분류';const typeName={idea:'아이디어',task:'할 일 후보',content:'콘텐츠',memo:'메모'}[x.type||'idea']||'아이디어';
    return `<div class="bd-card" style="border-left-color:${col}" id="bd-card-${x.id}"><div class="bd-card-top"><span class="bd-proj-dot" style="background:${col}"></span><span class="bd-proj-name">${esc(name)} · ${typeName}</span><span class="bd-date">${bdDate(x.updated||x.created)}</span></div><div class="bd-body">${esc(x.text||'')}</div><div class="bd-tags">${(x.tags||[]).map(t=>`<span class="bd-tag">#${esc(t)}</span>`).join('')}</div><div class="bd-actions"><button class="bd-mini-btn" onclick="bdEdit(${x.id},${contextPid?`'${contextPid}'`:'null'})">수정</button><button class="bd-mini-btn" onclick="bdToTask(${x.id},${contextPid?`'${contextPid}'`:'null'})">태스크로</button><button class="bd-mini-btn danger" onclick="bdDelete(${x.id},${contextPid?`'${contextPid}'`:'null'})">삭제</button></div></div>`;
  }
  function mkBD(pid){
    ensureBD();const isProject=!!pid;const p=isProject?gP(pid):null;const stats=bdStats(isProject?pid:undefined);const arr=bdFiltered(isProject?pid:undefined);const accent=p?p.c:'#1C1C1A';

<script id="mbh-braindump-connect-js">
(function(){
  if(window.__mbhBrainDumpConnectInstalled)return;window.__mbhBrainDumpConnectInstalled=true;
  function esc(s){return typeof escH==='function'?escH(s):String(s||'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]||m));}
  function ensureBD(){if(!S.brainDump)S.brainDump=[];if(!S._bdid)S._bdid=1;if(!S._tid)S._tid={};if(!S._eid)S._eid={};if(!S._plid)S._plid={};}
  function bdGet(id){ensureBD();return (S.brainDump||[]).find(x=>String(x.id)===String(id));}
  function firstLine(x){return String(x?.text||'').split('\n').map(v=>v.trim()).find(Boolean)||'새 항목';}
  function projOptions(sel){return (S.projects||[]).map(p=>`<option value="${p.id}"${sel===p.id?' selected':''}>${esc(p.n)}</option>`).join('');}

      body=`<div class="bd-field"><label class="bd-label">프로젝트</label><select id="bd-task-pid-${id}">${projOptions(pid)}</select></div><div class="bd-field"><label class="bd-label">태스크 제목</label><input id="bd-task-title-${id}" value="${esc(line)}"></div><div class="bd-field"><label class="bd-label">마감일 선택</label><input id="bd-task-due-${id}" type="date"></div>`;
    }else if(mode==='calendar'){
      body=`<div class="bd-field"><label class="bd-label">프로젝트</label><select id="bd-calendar-pid-${id}">${projOptions(pid)}</select></div><div class="bd-field"><label class="bd-label">일정 제목</label><input id="bd-calendar-title-${id}" value="${esc(line)}"></div><div class="bd-field"><label class="bd-label">날짜</label><input id="bd-calendar-date-${id}" type="date" value="${date}"></div><div class="bd-small-note">캘린더에 하루 일정으로 들어가요. 멀티데이는 캘린더에서 이어서 수정하면 돼요.</div>`;
    }else if(mode==='plan'){
      body=`<div class="bd-field"><label class="bd-label">프로젝트</label><select id="bd-plan-pid-${id}">${projOptions(pid)}</select></div><div class="bd-field"><label class="bd-label">기획안 제목</label><input id="bd-plan-title-${id}" value="${esc(line)}"></div><div class="bd-field"><label class="bd-label">상세 내용</label><textarea id="bd-plan-content-${id}">${esc(x.text||'')}</textarea></div>`;

  }
  window.bdOpenConvert=function(mode,id,ctx){const x=bdGet(id);if(!x)return;if(!(S.projects||[]).length){alert('먼저 프로젝트를 하나 만들어줘야 연결할 수 있어요.');return;}document.getElementById('bd-convert-ov')?.remove();document.body.insertAdjacentHTML('beforeend',modalHTML(mode,x,ctx||null));document.body.style.overflow='hidden';setTimeout(()=>document.querySelector('#bd-convert-ov input,#bd-convert-ov textarea,#bd-convert-ov select')?.focus(),40);};

    if(mode==='link'){
      const pid=projectFromModal(mode,id);if(!pid)return;x.pid=pid;x.updated=new Date().toISOString();sv();closeBDConvert();toast('프로젝트와 연결했어요 ✓');refresh(ctx);return;

      if(!S._eid[pid])S._eid[pid]=1;(S.ev[pid]||(S.ev[pid]=[])).push({id:S._eid[pid]++,y,m:m-1,d,t:title});x.pid=pid;x.type='memo';x.updated=new Date().toISOString();sv();closeBDConvert();toast('캘린더에 일정으로 넣었어요 ✓');refresh(ctx);return;

    }

<script id="mbh-timetable-scroll-real-fix-v4">
/* ── REAL timetable inner-scroll fix v4 ──
   대상: 타임블럭 내부 시간 스크롤(.ttl-outer).
   원인: uTT()/R()가 타임테이블 DOM을 통째로 다시 그리면서 .ttl-outer가 새로 생기고 scrollTop이 0으로 초기화됨.
   해결: 렌더 직전의 .ttl-outer scrollTop을 저장하고, 새 .ttl-outer가 생긴 뒤 여러 프레임에 걸쳐 강제로 복원.
*/
var __MBH_TT_SCROLL = window.__MBH_TT_SCROLL || {top:0,left:0,winY:0,winX:0,userTouched:false};
window.__MBH_TT_SCROLL = __MBH_TT_SCROLL;
function __mbhTtOuter(){
  var list=[].slice.call(document.querySelectorAll('#ttl-outer,.ttl-outer'));
  if(!list.length) return null;
  // 실제로 세로 스크롤이 있는 컨테이너를 우선 사용
  return list.find(function(el){return el.scrollHeight>el.clientHeight+10;}) || list[0];
}
function __mbhRememberTtScroll(){
  var o=__mbhTtOuter();
  if(o){
    __MBH_TT_SCROLL.top=o.scrollTop||0;
    __MBH_TT_SCROLL.left=o.scrollLeft||0;
  }
  __MBH_TT_SCROLL.winY=window.scrollY||window.pageYOffset||0;
  __MBH_TT_SCROLL.winX=window.scrollX||window.pageXOffset||0;
  return {top:__MBH_TT_SCROLL.top,left:__MBH_TT_SCROLL.left,winY:__MBH_TT_SCROLL.winY,winX:__MBH_TT_SCROLL.winX};
}
function __mbhRestoreTtScroll(snap){
  snap=snap||__MBH_TT_SCROLL;
  function apply(){
    var o=__mbhTtOuter();
    if(o){
      o.scrollTop=snap.top||0;
      o.scrollLeft=snap.left||0;
    }
    // 화면 전체가 같이 튀는 경우도 방지
    if(typeof window.scrollTo==='function') window.scrollTo(snap.winX||0,snap.winY||0);
  }
  apply();
  requestAnimationFrame(apply);
  requestAnimationFrame(function(){requestAnimationFrame(apply);});
  [0,20,60,140,300,650].forEach(function(ms){setTimeout(apply,ms);});
}
function __mbhRenderTtPreserve(renderFn){
  var snap=__mbhRememberTtScroll();
  var out=renderFn();
  __mbhRestoreTtScroll(snap);
  setTimeout(__mbhBindTtScroll,0);
  return out;
}
function __mbhBindTtScroll(){
  var o=__mbhTtOuter();
  if(o && !o.__mbhRealScrollBound){
    o.addEventListener('scroll',function(){
      __MBH_TT_SCROLL.top=o.scrollTop||0;
      __MBH_TT_SCROLL.left=o.scrollLeft||0;
      __MBH_TT_SCROLL.userTouched=true;
    },{passive:true});
    o.addEventListener('wheel',function(){__MBH_TT_SCROLL.userTouched=true;},{passive:true});
    o.addEventListener('touchmove',function(){__MBH_TT_SCROLL.userTouched=true;},{passive:true});
    o.__mbhRealScrollBound=true;
  }
}
// 기존 uTT 자체를 교체. 내부 함수들이 uTT()를 직접 불러도 이 버전이 실행됨.
if(typeof uTT==='function'){
  uTT=function(){
    return __mbhRenderTtPreserve(function(){
      var el=document.getElementById('tt-wrap');
      if(el) el.innerHTML=mkTT();
    });
  };
  window.uTT=uTT;
}
// 전체 렌더 R()에서도 타임테이블을 보고 있으면 내부 시간 스크롤 보존
if(typeof R==='function' && !R.__mbhRealScrollWrapped){
  var __mbhOldR=R;
  R=function(){
    var shouldPreserve=!!__mbhTtOuter() || (window.S && S.tab==='all' && S.allTab==='timetable');
    if(!shouldPreserve) return __mbhOldR.apply(this,arguments);
    return __mbhRenderTtPreserve(function(){return __mbhOldR.apply(this,arguments);}.bind(this));
  };
  R.__mbhRealScrollWrapped=true;
  window.R=R;
}
// 자동스크롤이 사용자가 잡아둔 위치를 덮어쓰지 않게 변경
if(typeof ttlAutoScroll==='function'){
  ttlAutoScroll=function(){
    setTimeout(function(){
      var o=__mbhTtOuter();
      if(!o) return;
      if(__MBH_TT_SCROLL.userTouched){__mbhRestoreTtScroll();return;}
      // 처음 타임테이블에 들어왔을 때만 현재 시간 근처로 이동
      var now=new Date();
      var y=(now.getHours()*60+now.getMinutes())/60*(typeof TTL_H!=='undefined'?TTL_H:64)-150;
      o.scrollTop=Math.max(0,y);
      __MBH_TT_SCROLL.top=o.scrollTop||0;
    },80);
  };
  window.ttlAutoScroll=ttlAutoScroll;
}
// 혹시 버튼/팝업 클릭이 먼저 발생하는 케이스 대비: 타임테이블 영역에서 pointerdown 전에 현재 위치 저장
['pointerdown','mousedown','touchstart','click'].forEach(function(ev){
  document.addEventListener(ev,function(e){
    if(e.target && (e.target.closest('#tt-wrap') || e.target.closest('#ttl-pop'))){
      __mbhRememberTtScroll();
    }
  },true);
});
// DOM이 새로 생길 때마다 바인딩
var __mbhTtMo=new MutationObserver(function(){__mbhBindTtScroll();});
__mbhTtMo.observe(document.body,{childList:true,subtree:true});
__mbhBindTtScroll();
setTimeout(__mbhBindTtScroll,100);
setTimeout(__mbhBindTtScroll,500);
</script>



<script id="mbh-timetable-drag-time-edit-final">
/* ── FINAL: 타임블럭 드래그 생성 후 00:00으로 튀는 문제 + 생성 시 시간 수정 ── */
(function(){
  function outer(){
    var list=[].slice.call(document.querySelectorAll('#ttl-outer,.ttl-outer'));
    if(!list.length) return null;
    return list.find(function(el){ return el.scrollHeight > el.clientHeight + 10; }) || list[0];
  }
  function snap(){
    var o=outer();
    return {
      top:o ? o.scrollTop : (window.__MBH_FORCE_TT_TOP || 0),
      left:o ? o.scrollLeft : 0,
      winY:window.scrollY || window.pageYOffset || 0,
      winX:window.scrollX || window.pageXOffset || 0
    };
  }
  function restore(s){
    s=s || window.__MBH_LAST_TT_SNAP || {top:0,left:0,winY:0,winX:0};
    window.__MBH_FORCE_TT_TOP = s.top || 0;
    function apply(){
      var o=outer();
      if(o){
        o.scrollTop = s.top || 0;
        o.scrollLeft = s.left || 0;
      }
      if(typeof window.scrollTo==='function') window.scrollTo(s.winX||0, s.winY||0);
    }
    apply();
    requestAnimationFrame(apply);
    requestAnimationFrame(function(){ requestAnimationFrame(apply); });
    [0,10,30,80,160,320,700].forEach(function(ms){ setTimeout(apply,ms); });
  }
  function remember(){
    window.__MBH_LAST_TT_SNAP = snap();
    window.__MBH_FORCE_TT_TOP = window.__MBH_LAST_TT_SNAP.top || 0;
    return window.__MBH_LAST_TT_SNAP;
  }
  window.__mbhTimelineRememberFinal = remember;
  window.__mbhTimelineRestoreFinal = restore;

  // 타임테이블 안에서 무언가 하기 직전 위치 저장
  ['pointerdown','mousedown','touchstart','wheel','scroll','keydown'].forEach(function(ev){
    document.addEventListener(ev,function(e){
      var t=e.target;
      if(!t) return;
      if((t.closest && (t.closest('#tt-wrap') || t.closest('#ttl-pop'))) || ev==='scroll'){
        var o=outer();
        if(o) window.__MBH_LAST_TT_SNAP={top:o.scrollTop||0,left:o.scrollLeft||0,winY:window.scrollY||0,winX:window.scrollX||0};
      }
    },true);
  });

  // 기존 uTT를 다시 한 번 강하게 감싸기
  if(typeof window.uTT==='function' && !window.uTT.__mbhFinalTimeFixed){
    var oldUTT=window.uTT;
    window.uTT=function(){
      var s=window.__MBH_LAST_TT_SNAP || snap();
      var r=oldUTT.apply(this,arguments);
      restore(s);
      return r;
    };
    window.uTT.__mbhFinalTimeFixed=true;
  }

  // 드래그 후 뜨는 빠른 추가 팝업: 시간 수정 가능하게 교체
  window.showTtlQuickAdd=function(h,m,dur,cx,cy,dateOverride){
    var s=remember();
    document.getElementById('ttl-pop')?.remove();
    var dateForSave=dateOverride||S.ttDate;
    var endTotal=(h*60+(m||0)+(dur||60));
    var eh=Math.floor(endTotal/60)%24;
    var em=endTotal%60;
    var projOpts='<option value="">프로젝트 없음</option>'+S.projects.map(function(p){return '<option value="'+p.id+'">'+escH(p.n)+'</option>';}).join('');
    var pop=document.createElement('div');
    pop.id='ttl-pop';
    pop.className='ttl-pop';
    var px=Math.min((cx||200)+8,window.innerWidth-310);
    var py=Math.min((cy||200)-20,window.innerHeight-300);
    pop.style.cssText+=';left:'+px+'px;top:'+py+'px;width:300px';
    pop.innerHTML='\
      <div class="ttl-pop-time" style="margin-bottom:8px">🕐 드래그한 시간은 아래에서 수정 가능해요</div>\
      <input id="ttp-qa-title" class="ttl-pop-inp" placeholder="일정 제목...">\
      <div class="ttl-pop-time-row">\
        <input id="ttp-qa-sh" type="number" min="0" max="23" value="'+h+'">\
        <span style="text-align:center;color:var(--faint);font-size:12px">:</span>\
        <input id="ttp-qa-sm" type="number" min="0" max="55" step="5" value="'+(m||0)+'">\
        <span style="text-align:center;color:var(--faint);font-size:11px">~</span>\
        <input id="ttp-qa-eh" type="number" min="0" max="23" value="'+eh+'">\
        <span style="text-align:center;color:var(--faint);font-size:12px">:</span>\
        <input id="ttp-qa-em" type="number" min="0" max="55" step="5" value="'+em+'">\
      </div>\
      <select id="ttp-qa-pid" class="ttl-pop-sel">'+projOpts+'</select>\
      <div class="ttl-pop-btns">\
        <button class="ttl-pop-save" onclick="ttlQuickSave('+h+','+(m||0)+','+(dur||60)+',\''+dateForSave+'\')">추가</button>\
        <button class="ttl-pop-btn" onclick="document.getElementById(\'ttl-pop\')?.remove();__mbhTimelineRestoreFinal()">취소</button>\
      </div>';
    document.body.appendChild(pop);
    restore(s);
    var inp=document.getElementById('ttp-qa-title');
    if(inp){
      inp.focus({preventScroll:true});
      inp.addEventListener('keydown',function(e){
        if(e.key==='Enter') window.ttlQuickSave(h,m,dur,dateForSave);
        if(e.key==='Escape'){ pop.remove(); restore(s); }
      });
    }
    setTimeout(function(){
      var cl=function(e){
        if(!pop.contains(e.target)){
          pop.remove();
          document.removeEventListener('mousedown',cl);
          restore(s);
        }
      };
      document.addEventListener('mousedown',cl);
    },120);
  };

  // 빠른 추가 저장: 입력한 시작/종료 시간 기준으로 저장 + 스크롤 원위치
  window.ttlQuickSave=function(h,m,dur,dateOverride){
    var s=window.__MBH_LAST_TT_SNAP || snap();
    var title=document.getElementById('ttp-qa-title')?.value.trim();
    var pid=document.getElementById('ttp-qa-pid')?.value||null;
    var sh=parseInt(document.getElementById('ttp-qa-sh')?.value);
    var sm=parseInt(document.getElementById('ttp-qa-sm')?.value);
    var eh=parseInt(document.getElementById('ttp-qa-eh')?.value);
    var em=parseInt(document.getElementById('ttp-qa-em')?.value);
    if(!Number.isFinite(sh)) sh=h;
    if(!Number.isFinite(sm)) sm=m||0;
    if(!Number.isFinite(eh)) eh=Math.floor((h*60+(m||0)+(dur||60))/60)%24;
    if(!Number.isFinite(em)) em=(h*60+(m||0)+(dur||60))%60;
    sh=Math.max(0,Math.min(23,sh)); eh=Math.max(0,Math.min(23,eh));
    sm=Math.max(0,Math.min(59,sm)); em=Math.max(0,Math.min(59,em));
    var newDur=(eh*60+em)-(sh*60+sm);
    if(newDur<=0) newDur=15;
    if(!title){ document.getElementById('ttp-qa-title')?.focus({preventScroll:true}); restore(s); return; }
    var date=dateOverride||S.ttDate;
    if(!S.tt)S.tt={}; if(!S.tt[date])S.tt[date]=[];
    S.tt[date].push({id:S._ttid++,h:sh,m:sm,dur:newDur,title:title,pid:pid||null,done:false});
    if(pid){
      var parts=date.split('-');
      var y=parseInt(parts[0]), cm=parseInt(parts[1])-1, d=parseInt(parts[2]);
      if(!S._eid)S._eid={}; if(!S._eid[pid])S._eid[pid]=1;
      var ex=(S.ev[pid]||[]).find(function(e){return e.d===d&&e.m===cm&&e.y===y&&e.t===title;});
      if(!ex)(S.ev[pid]||(S.ev[pid]=[])).push({id:S._eid[pid]++,d:d,m:cm,y:y,t:title,startH:sh,startM:sm,endH:eh,endM:em});
    }
    document.getElementById('ttl-pop')?.remove();
    sv();
    if(typeof window.uTT==='function') window.uTT();
    restore(s);
  };

  // 기존 직접 추가 버튼도 스크롤 보존
  if(typeof window.ttAdd==='function' && !window.ttAdd.__mbhFinalScrollFixed){
    var oldTtAdd=window.ttAdd;
    window.ttAdd=function(){ var s=remember(); var r=oldTtAdd.apply(this,arguments); restore(s); return r; };
    window.ttAdd.__mbhFinalScrollFixed=true;
  }
})();
</script>

<script id="mbh-userfix-js">
(function(){
  function safe(fn){try{return fn()}catch(e){console.warn('[userfix]',e)}}
  function esc(x){return (typeof escH==='function')?escH(x):String(x??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));}
  function moneyNumber(v){return parseInt(String(v||'').replace(/[^0-9]/g,''),10)||0;}
  function comma(n){return (Number(n)||0).toLocaleString('ko-KR');}
  function parseDateParts(ds){const d=new Date((ds||todayStr())+'T12:00:00');return {y:d.getFullYear(),m:d.getMonth(),d:d.getDate()};}
  function refreshRevenueUI(pid){
    if(typeof uRL==='function')uRL(pid);
    const panel=document.querySelector('.rev-project-panel');
    if(panel&&typeof mkRevChart==='function'){
      const old=panel.querySelector('.rev-chart');
      if(old)old.outerHTML=mkRevChart(pid);
    }
    const metrics=document.getElementById('freelance-metrics-wrap');
    if(metrics&&typeof mkFreelanceMetrics==='function')metrics.innerHTML=mkFreelanceMetrics(pid);
    if(typeof rSB==='function')rSB();
  }

  // 1) 완료 태스크는 접지 않고 항상 아래에 연하게 표시
  window.mkDoneTL=function(pid){
    const p=(typeof gP==='function'?gP(pid):null)||{c:'#999'};
    const tasks=((S.tasks&&S.tasks[pid])||[]).filter(t=>t.done).sort((a,b)=>{
      if(a.due&&b.due)return b.due.localeCompare(a.due)||(b.i||0)-(a.i||0);
      if(a.due&&!b.due)return -1;if(!a.due&&b.due)return 1;return (b.i||0)-(a.i||0);
    });
    if(!tasks.length)return '<div id="done-wrap-'+pid+'"></div>';
    return `<div id="done-wrap-${pid}"><div class="done-tasks-hd"><span class="done-tasks-lbl">완료된 태스크 (${tasks.length})</span><span style="font-size:10px;color:var(--faint)">아래에 보관됨</span></div><div class="done-tasks-list always">${tasks.map(t=>{
      const due=t.due?`<span class="due-chip ${typeof dueStat==='function'?(dueStat(t.due)||'normal'):'normal'}" title="클릭해서 날짜 변경" onclick="tEditDue('${pid}',${t.i},event)" style="cursor:pointer">${typeof dueLabel==='function'?dueLabel(t.due):t.due}</span>`:'';
      const tags=(typeof taskTagsHtml==='function')?taskTagsHtml(t,pid,true):'';
      return `<div class="ti neutral" style="border-left-color:#D8D8D4"><div class="tcb checked" onclick="tTog('${pid}',${t.i})" style="background:#AFAFAA;border-color:#AFAFAA">${typeof CK!=='undefined'?CK:'✓'}</div><span class="ttxt done" ondblclick="tEdit(this,'${pid}',${t.i})">${esc(t.t)}</span>${tags}${due}<button class="tdel" onclick="tDel('${pid}',${t.i})">×</button></div>`;
    }).join('')}</div></div>`;
  };
  window.toggleDoneTasks=function(pid){
    const el=document.getElementById('task-card-'+pid);if(!el)return;
    const dw=el.querySelector('[id^="done-wrap-"]');
    if(dw)dw.outerHTML=mkDoneTL(pid);else el.querySelector('.tlist')?.insertAdjacentHTML('afterend',mkDoneTL(pid));
  };

  // 2) 수익: 콤마 입력 + 수정 가능
  window.formatMoneyInput=function(el){
    const n=moneyNumber(el.value); el.value=n?comma(n):'';
    const pv=document.getElementById('ramt-preview'); if(pv)pv.textContent=n?`입력 중: ${comma(n)}원`:'';
  };
  window.mkRL=function(pid){
    const p=(typeof gP==='function'?gP(pid):null)||{c:'#999'};const rev=(S.rev&&S.rev[pid])||[];
    if(!rev.length)return '<div class="empty">수익 기록이 없어요</div>';
    return rev.slice().reverse().map(r=>`<div class="rrow" id="rrow-${pid}-${r.i}"><span class="rmon-badge">${r.y||'?'}년 ${r.m||'?'}월</span><span class="rdesc">${esc(r.d)}</span><span class="ramt" style="color:${typeof dc==='function'?dc(p.c):p.c}">${typeof showAmt==='function'?showAmt(r.a):comma(r.a)+'원'}</span><button class="r-edit-btn" onclick="rEdit('${pid}',${r.i})">수정</button><button class="rdel" onclick="rDel('${pid}',${r.i})">×</button></div>`).join('');
  };
  window.rEdit=function(pid,id){
    const r=((S.rev&&S.rev[pid])||[]).find(x=>x.i===id);if(!r)return;
    const row=document.getElementById(`rrow-${pid}-${id}`);if(!row)return;
    const p=(typeof gP==='function'?gP(pid):null)||{c:'#777'};
    row.className='rrow editing';
    row.innerHTML=`<div class="r-edit-grid"><input class="r-inp" id="re-y-${id}" type="number" value="${r.y||new Date().getFullYear()}" min="2000" max="2100"><input class="r-inp" id="re-m-${id}" type="number" value="${r.m||new Date().getMonth()+1}" min="1" max="12"><input class="r-inp" id="re-d-${id}" type="text" value="${esc(r.d)}" placeholder="내용"><input class="r-inp" id="re-a-${id}" type="text" value="${comma(r.a)}" oninput="this.value=this.value.replace(/[^0-9]/g,'').replace(/\\B(?=(\\d{3})+(?!\\d))/g,',')" placeholder="금액"><button class="r-edit-btn" style="background:${p.c};color:#fff;border-color:${p.c}" onclick="rSaveEdit('${pid}',${id})">저장</button><button class="r-edit-btn" onclick="refreshRevenueUI('${pid}')">취소</button></div>`;
  };
  window.rSaveEdit=function(pid,id){
    const r=((S.rev&&S.rev[pid])||[]).find(x=>x.i===id);if(!r)return;
    const d=document.getElementById(`re-d-${id}`)?.value.trim();const a=moneyNumber(document.getElementById(`re-a-${id}`)?.value);
    const y=parseInt(document.getElementById(`re-y-${id}`)?.value,10)||new Date().getFullYear();const m=parseInt(document.getElementById(`re-m-${id}`)?.value,10)||new Date().getMonth()+1;
    if(!d||!a)return alert('내용과 금액을 입력해줘!');
    r.d=d;r.a=a;r.y=y;r.m=Math.max(1,Math.min(12,m));if(typeof sv==='function')sv();refreshRevenueUI(pid);
  };
  window.rAdd=function(pid){
    const ry=document.getElementById('ryear'),rm=document.getElementById('rmonth'),d=document.getElementById('rdesc'),a=document.getElementById('ramt');if(!d||!a||!ry||!rm)return;
    const dv=d.value.trim(),av=moneyNumber(a.value),yv=parseInt(ry.value,10),mv=parseInt(rm.value,10);if(!dv||!av||av<=0)return;
    if(!S._rid)S._rid={};if(!S._rid[pid])S._rid[pid]=1;if(!S.rev)S.rev={};
    (S.rev[pid]||(S.rev[pid]=[])).push({i:S._rid[pid]++,d:dv,a:av,y:yv,m:mv});
    d.value='';a.value='';const pv=document.getElementById('ramt-preview');if(pv)pv.textContent='';if(typeof sv==='function')sv();refreshRevenueUI(pid);
  };
  window.rDel=function(pid,id){S.rev[pid]=((S.rev&&S.rev[pid])||[]).filter(r=>r.i!==id);if(typeof sv==='function')sv();refreshRevenueUI(pid);};

  // 3) 회고 저장/수정 안정화 + 수정 중 표시
  window.markRetroDirty=function(){const b=document.querySelector('.retro-save-btn');if(b){b.classList.add('unsaved');b.textContent='변경사항 저장';}const s=document.getElementById('retro-saved');if(s){s.style.opacity=0;}};
  window.retroSave=function(pid,date){
    if(typeof ensureV25==='function')ensureV25();
    const get=id=>document.getElementById(id)?.value||'';
    const summary=get('retro-summary'),wins=get('retro-wins'),issues=get('retro-issues'),learned=get('retro-learned'),next=get('retro-next');
    const mood=get('retro-mood'),focus=get('retro-focus');const scoreRaw=get('retro-score');
    const score=scoreRaw===''?'':Math.max(0,Math.min(10,parseInt(scoreRaw||'0',10)||0));
    const note=[summary,wins,issues,learned,next].map(x=>String(x||'').trim()).filter(Boolean).join('\n');
    if(!S.projRetro)S.projRetro={};if(!S.projRetro[pid])S.projRetro[pid]={};
    S.projRetro[pid][date]={note,summary,wins,issues,learned,next,mood,focus,score,updated:Date.now()};
    if(typeof sv==='function')sv();
    const s=document.getElementById('retro-saved');if(s){s.textContent='저장됨 ✓';s.style.opacity=1;setTimeout(()=>{s.style.opacity=0},1200)}
    const b=document.querySelector('.retro-save-btn');if(b){b.classList.remove('unsaved');b.textContent='회고 저장'}
    const cal=document.querySelector('.retro-cal')?.parentElement; if(cal&&typeof mkRetroCal==='function') cal.innerHTML=mkRetroCal(pid);
    if(typeof mkRetroAI==='function'){const ai=document.querySelector('.retro-ai-panel'); if(ai) ai.outerHTML=mkRetroAI(pid);}
  };

  // 4) 회고 캘린더/타임테이블 원하는 날짜로 바로 이동
  const oldMkRetroCal=window.mkRetroCal;
  if(oldMkRetroCal){window.mkRetroCal=function(pid){
    const html=oldMkRetroCal(pid);
    const y=S.cy,m=S.cm;const cur=`${y}-${String(m+1).padStart(2,'0')}-01`;
    return html.replace(/<span class="cal-ml">.*?<\/span>/,`<input class="retro-jump-input" type="month" value="${cur.slice(0,7)}" title="원하는 연도/월로 이동" onchange="retroJumpMonth('${pid}',this.value)">`);
  }}
  window.retroJumpMonth=function(pid,ym){if(!ym)return;const [y,m]=ym.split('-').map(Number);S.cy=y;S.cm=m-1;if(!S.retroSel)S.retroSel={};const day=String(Math.min(new Date(y,m,0).getDate(), new Date(((S.retroSel[pid])||todayStr())+'T12:00:00').getDate())).padStart(2,'0');S.retroSel[pid]=`${y}-${String(m).padStart(2,'0')}-${day}`;if(typeof sv==='function')sv();const el=document.getElementById('retro-section');if(el&&typeof mkProjectRetro==='function')el.innerHTML=mkProjectRetro(pid);};
  window.retroSelectDay=function(pid,date){if(!S.retroSel)S.retroSel={};S.retroSel[pid]=date;const parts=parseDateParts(date);S.cy=parts.y;S.cm=parts.m;if(typeof sv==='function')sv();const el=document.getElementById('retro-section');if(el&&typeof mkProjectRetro==='function')el.innerHTML=mkProjectRetro(pid);};
  window.ttJumpDate=function(v){if(!v)return;S.ttDate=v;if(typeof sv==='function')sv();if(typeof uTT==='function')uTT();};
  function addTTJump(html){
    const date=S.ttDate||todayStr();
    if(html.includes('tt-jump-input'))return html;
    return html.replace(/<span class="tt-date-lbl">([\s\S]*?)<\/span>/,`<input class="tt-jump-input" type="date" value="${date}" title="원하는 날짜/주간으로 이동" onchange="ttJumpDate(this.value)">`);
  }
  const oldMkTTDay=window.mkTTDay, oldMkTTWeek=window.mkTTWeek, oldMkTT=window.mkTT;
  if(oldMkTTDay)window.mkTTDay=function(){return addTTJump(oldMkTTDay.apply(this,arguments));};
  if(oldMkTTWeek)window.mkTTWeek=function(){return addTTJump(oldMkTTWeek.apply(this,arguments));};
  if(oldMkTT)window.mkTT=function(){return addTTJump(oldMkTT.apply(this,arguments));};

  // 5) 실제 시급/작업시간: 수익/타임테이블/타이머 변경 후 즉시 갱신
  const oldGetHours=window.getProjectHours;
  window.getProjectHours=function(pid){
    let minutes=0;Object.keys((S&&S.tt)||{}).forEach(ds=>{((S.tt[ds])||[]).forEach(ev=>{if(ev&&ev.pid===pid)minutes+=Number(ev.dur||60);});});
    const tl=(S&&S.timelog&&S.timelog[pid])?S.timelog[pid]:[];tl.forEach(x=>{minutes+=Math.round((Number(x.dur)||0)/60);});
    return minutes/60;
  };
  window.refreshFreelanceMetrics=function(pid){
    const box=document.getElementById('freelance-metrics-wrap');
    if(box&&typeof mkFreelanceMetrics==='function')box.innerHTML=mkFreelanceMetrics(pid);
  };
  ['ttAdd','ttAddWeek','ttDel','ttCheck','ttCheckDate','saveTTLPop','timerStop'].forEach(name=>{
    const old=window[name];if(typeof old==='function'&&!old.__mbhMetricsFixed){
      window[name]=function(){const ret=old.apply(this,arguments);setTimeout(()=>{try{const pid=S.tab&&S.tab!=='all'?S.tab:null;if(pid)refreshFreelanceMetrics(pid);}catch(e){}},50);return ret;};
      window[name].__mbhMetricsFixed=true;
    }
  });

  // 수익 탭 렌더 후 입력 포맷/수정 UI 주입
  const oldRPT=window.rPT;
  if(typeof oldRPT==='function'){
    window.rPT=function(pid,tab){
      const ret=oldRPT.apply(this,arguments);
      if(tab==='revenue'){
        const a=document.getElementById('ramt');
        if(a){a.type='text';a.placeholder='금액 예: 000,000';a.setAttribute('inputmode','numeric');a.oninput=function(){formatMoneyInput(a)};a.insertAdjacentHTML('afterend','<div class="r-amount-preview" id="ramt-preview"></div>');}
        const list=document.getElementById('rlist'); if(list)list.innerHTML=mkRL(pid);
      }
      if(tab==='retro'){
        setTimeout(()=>{document.querySelectorAll('#retro-section textarea,#retro-section input,#retro-section select').forEach(el=>{el.addEventListener('input',markRetroDirty);el.addEventListener('change',markRetroDirty);});},0);
      }
      return ret;
    };
  }
  // 회고 디테일 렌더 후 변경 감지 이벤트 유지
  const oldMkProjectRetro=window.mkProjectRetro;
  if(oldMkProjectRetro){window.mkProjectRetro=function(pid){const h=oldMkProjectRetro(pid);setTimeout(()=>{document.querySelectorAll('#retro-section textarea,#retro-section input,#retro-section select').forEach(el=>{el.addEventListener('input',markRetroDirty);el.addEventListener('change',markRetroDirty);});},0);return h;};}

  // 최초 화면 재렌더
  setTimeout(()=>safe(()=>{if(typeof R==='function')R();}),0);
})();
</script>

<!-- MBH FINAL STABILITY PATCH: BrainDump save + Calendar drag/timeblock dedupe -->
<script id="mbh-final-braindump-calendar-stability-patch">
(function(){
  if(window.__MBH_FINAL_STABILITY_PATCH__) return;
  window.__MBH_FINAL_STABILITY_PATCH__ = true;

  function parseHashTags(v){
    if(typeof window.parseTags === 'function') return window.parseTags(v);
    return String(v||'').split(/[#,，,\s]+/).map(function(x){return x.trim().replace(/^#/,'');}).filter(Boolean).filter(function(x,i,a){return a.indexOf(x)===i;}).slice(0,8);
  }
  function save(){ if(typeof window.sv === 'function') window.sv(); }
  function toast(msg){
    if(typeof window.showToast === 'function') window.showToast(msg);
    else if(typeof window.toast === 'function') window.toast(msg);
    else if(typeof window.toast3 === 'function') window.toast3(msg);
  }
  function ensureBD(){
    if(!window.S) return;
    if(!Array.isArray(S.brainDump)) S.brainDump=[];
    var maxId=S.brainDump.reduce(function(mx,x){return Math.max(mx,Number(x&&x.id)||0);},0);
    if(!Number.isFinite(Number(S._bdid)) || Number(S._bdid)<=maxId) S._bdid=maxId+1;
    S.brainDump.forEach(function(x){
      if(!Array.isArray(x.tags)) x.tags=[];
      if(!('pid' in x)) x.pid=null;
      if(!x.type) x.type='idea';
      if(!x.created) x.created=new Date().toISOString();
      if(!x.updated) x.updated=x.created;
    });
  }
  function rerenderBD(contextPid){
    try{
      if(typeof window.renderBrainDump === 'function') window.renderBrainDump(contextPid||null);
      if(typeof window.rSB === 'function') window.rSB();
      setTimeout(function(){
        try{
          if(typeof window.renderBrainDump === 'function') window.renderBrainDump(contextPid||null);
          if(typeof window.rSB === 'function') window.rSB();
        }catch(e){}
      },0);
    }catch(e){ console.warn('BrainDump rerender failed', e); }
  }

  window.bdAdd = function(contextPid){
    ensureBD();
    var textEl=document.getElementById('bd-text');
    var text=(textEl && textEl.value ? textEl.value : '').trim();
    if(!text){ if(textEl) textEl.focus(); return; }
    var pid=contextPid || (document.getElementById('bd-pid') && document.getElementById('bd-pid').value) || null;
    var tags=parseHashTags((document.getElementById('bd-tags') && document.getElementById('bd-tags').value) || '');
    var type=(document.getElementById('bd-type') && document.getElementById('bd-type').value) || 'idea';
    var now=new Date().toISOString();
    S.brainDump.unshift({id:S._bdid++,pid:pid||null,text:text,tags:tags,type:type,created:now,updated:now});
    if(textEl) textEl.value='';
    var tagEl=document.getElementById('bd-tags'); if(tagEl) tagEl.value='';
    if(!contextPid){ S.bdFilter='all'; S.bdTypeFilter='all'; S.bdQuery=''; }
    save();
    rerenderBD(contextPid||null);
    toast('브레인덤프 카드가 저장됐어요 ✓');
  };

  var calDrag=null, calMoved=false, suppressClickUntil=0;
  function clearCalUI(){
    document.querySelectorAll('.cc[data-date]').forEach(function(el){
      el.style.outline=''; el.style.outlineOffset=''; el.style.background='';
    });
  }
  function isCalendarInnerTarget(e){
    return e && e.target && e.target.closest && e.target.closest('.cal-ev-bar,.cal-ev-time,.cal-ev-more,.cal-task-dot,.cal-task-pip,.ev-ab,button,input,select,textarea');
  }
  window.calMD=function(e,ds,pid){
    if(isCalendarInnerTarget(e)) return;
    calDrag={start:ds,end:ds,pid:pid||((S.tab&&S.tab!=='all'&&S.tab!=='braindump'&&S.tab!=='worknotes')?S.tab:null)};
    calMoved=false;
    if(e && e.preventDefault) e.preventDefault();
  };
  window.calME=function(ds){
    if(!calDrag) return;
    if(ds!==calDrag.end){ calMoved=true; calDrag.end=ds; }
    var a=calDrag.start<=calDrag.end?calDrag.start:calDrag.end;
    var b=calDrag.start<=calDrag.end?calDrag.end:calDrag.start;
    document.querySelectorAll('.cc[data-date]').forEach(function(el){
      var d=el.getAttribute('data-date');
      var on=d>=a && d<=b;
      el.style.outline=on?'2px solid rgba(0,0,0,.24)':'';
      el.style.outlineOffset=on?'-2px':'';
      el.style.background=on?'rgba(127,119,221,.08)':'';
    });
  };
  window.calMU=function(e,ds,pid){
    if(!calDrag) return;
    var drag=calDrag; calDrag=null; clearCalUI();
    var end=ds||drag.end||drag.start;
    var startDS=drag.start<=end?drag.start:end;
    var endDS=drag.start<=end?end:drag.start;
    var chosenPid=pid||drag.pid||((S.tab&&S.tab!=='all'&&S.tab!=='braindump'&&S.tab!=='worknotes')?S.tab:null);
    if(calMoved && startDS!==endDS){
      suppressClickUntil=Date.now()+450;
      if(typeof window.openCalendarEventModal==='function') window.openCalendarEventModal(startDS,endDS,chosenPid);
    }
  };
  window.calCellClick=function(e,ds,pid){
    if(Date.now()<suppressClickUntil) return;
    if(isCalendarInnerTarget(e)) return;
    var chosenPid=pid||((S.tab&&S.tab!=='all'&&S.tab!=='braindump'&&S.tab!=='worknotes')?S.tab:null);
    suppressClickUntil=Date.now()+120;
    if(typeof window.openCalendarEventModal==='function') window.openCalendarEventModal(ds,ds,chosenPid);
  };
  document.addEventListener('mouseup',function(e){
    if(!calDrag) return;
    var cell=e.target && e.target.closest && e.target.closest('.cc[data-date]');
    window.calMU(e, cell ? cell.getAttribute('data-date') : calDrag.end, calDrag.pid||null);
  },true);

  window.saveCalendarEventModal=function(){
    if(window.__MBH_CAL_SAVE_LOCK__) return;
    window.__MBH_CAL_SAVE_LOCK__=true;
    try{
      var title=(document.getElementById('cem-title')&&document.getElementById('cem-title').value||'').trim();
      var startDS=document.getElementById('cem-start')&&document.getElementById('cem-start').value;
      var endDS=(document.getElementById('cem-end')&&document.getElementById('cem-end').value)||startDS;
      var startTime=(document.getElementById('cem-start-time')&&document.getElementById('cem-start-time').value)||'';
      var endTime=(document.getElementById('cem-end-time')&&document.getElementById('cem-end-time').value)||'';
      var pid=document.getElementById('cem-pid')&&document.getElementById('cem-pid').value;
      if(!title||!startDS||!pid){ window.__MBH_CAL_SAVE_LOCK__=false; return; }
      if(endDS<startDS){ var tmp=startDS; startDS=endDS; endDS=tmp; }
      if(!S.ev) S.ev={}; if(!S.ev[pid]) S.ev[pid]=[];
      if(!S._eid) S._eid={};
      var maxEv=(S.ev[pid]||[]).reduce(function(mx,x){return Math.max(mx,Number(x&&x.id)||0);},0);
      if(!Number.isFinite(Number(S._eid[pid])) || Number(S._eid[pid])<=maxEv) S._eid[pid]=maxEv+1;
      var sp=startDS.split('-').map(Number), ep=endDS.split('-').map(Number);
      var evObj={id:S._eid[pid]++,y:sp[0],m:sp[1]-1,d:sp[2],ey:ep[0],em:ep[1]-1,ed:ep[2],t:title};
      if(startTime){ var st=startTime.split(':').map(Number); evObj.startH=st[0]; evObj.startM=st[1]||0; }
      if(endTime){ var et=endTime.split(':').map(Number); evObj.endH=et[0]; evObj.endM=et[1]||0; }
      S.ev[pid].push(evObj);
      if(startTime){
        var sh=evObj.startH, sm=evObj.startM||0;
        var eh=Number.isFinite(Number(evObj.endH))?Number(evObj.endH):sh+1;
        var em=Number.isFinite(Number(evObj.endM))?Number(evObj.endM):sm;
        var dur=Math.max(15,(eh*60+em)-(sh*60+sm));
        if(!S.tt) S.tt={}; if(!S.tt[startDS]) S.tt[startDS]=[];
        if(!S._ttid) S._ttid=1;
        var maxT=Object.keys(S.tt).reduce(function(mx,ds){return Math.max(mx,(S.tt[ds]||[]).reduce(function(m,x){return Math.max(m,Number(x&&x.id)||0);},0));},0);
        if(Number(S._ttid)<=maxT) S._ttid=maxT+1;
        S.tt[startDS].push({id:S._ttid++,h:sh,m:sm,dur:dur,title:title,pid:pid,done:false,tags:[]});
      }
      save();
      if(typeof window.closeCalendarEventModal==='function') window.closeCalendarEventModal();
      if(typeof window.R==='function') window.R();
      toast(startTime?'캘린더와 타임블럭에 1개씩 저장됐어요 ✓':'캘린더 일정이 저장됐어요 ✓');
    }finally{
      setTimeout(function(){ window.__MBH_CAL_SAVE_LOCK__=false; },350);
    }
  };

  try{
    var changed=false;
    Object.keys(S.tt||{}).forEach(function(ds){
      (S.tt[ds]||[]).forEach(function(ev){
        if(ev && ev.h===undefined && ev.startH!==undefined){
          ev.h=Number(ev.startH)||0;
          ev.m=Number(ev.startM)||0;
          var eh=Number.isFinite(Number(ev.endH))?Number(ev.endH):ev.h+1;
          var em=Number.isFinite(Number(ev.endM))?Number(ev.endM):ev.m;
          ev.dur=Math.max(15,(eh*60+em)-(ev.h*60+ev.m));
          changed=true;
        }
      });
    });
    if(changed) save();
  }catch(e){}
})();
</script>

  function project(pid){try{return typeof gP==='function'?gP(pid):(S.projects||[]).find(p=>p.id===pid)}catch(e){return (S.projects||[]).find(p=>p.id===pid)}}
  function summarize(pid=null){const ym=curYM();const month=collectTime({pid,ym});const week=collectTime({pid,start:weekRange().s,end:weekRange().e});const monthMin=month.reduce((a,x)=>a+x.min,0),weekMin=week.reduce((a,x)=>a+x.min,0);const rev=pid?revMonth(pid,ym.y,ym.m):(S.projects||[]).reduce((a,p)=>a+revMonth(p.id,ym.y,ym.m),0);const rate=monthMin?Math.round(rev/(monthMin/60)):0;const typeMap={};month.forEach(x=>typeMap[x.type]=(typeMap[x.type]||0)+x.min);const types=Object.entries(typeMap).sort((a,b)=>b[1]-a[1]);const night=month.filter(x=>x.h>=22||x.h<6).reduce((a,x)=>a+x.min,0);const latePct=monthMin?Math.round(night/monthMin*100):0;const byProject={};month.forEach(x=>{if(x.pid)byProject[x.pid]=(byProject[x.pid]||0)+x.min;});const pRows=Object.entries(byProject).map(([pp,min])=>{const pr=project(pp),r=revMonth(pp,ym.y,ym.m);return {pid:pp,p:pr,min,rev:r,rate:min?Math.round(r/(min/60)):0};}).filter(x=>x.p).sort((a,b)=>b.min-a.min);return {ym,month,week,monthMin,weekMin,rev,rate,types,night,latePct,pRows};}

<script id="mbh-v7-connected-js">
(function(){
  const W=window;
  function pad(n){return String(n).padStart(2,'0')}
  function esc(x){return String(x??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));}

  function currentYM(){const d=new Date();return {y:d.getFullYear(),m:d.getMonth()+1};}
  function getPid(ev){return ev?.pid||ev?.projectId||ev?.project_id||ev?.pId||ev?.project||null;}
  function startMinute(ev){
    if(Number.isFinite(Number(ev?.h))) return Number(ev.h)*60 + (Number(ev.m)||0);
    if(Number.isFinite(Number(ev?.startH))) return Number(ev.startH)*60 + (Number(ev.startM)||0);
    if(typeof ev?.start==='string' && ev.start.includes(':')){const [h,m]=ev.start.split(':').map(Number);return (h||0)*60+(m||0)}

  }

    if(/기획|대본|구성|아이디어|콘티|콘텐츠|script|plan/.test(raw))return '기획';
    if(/디자인|썸네일|카드뉴스|피그마|로고|이미지|design|figma|thumbnail/.test(raw))return '디자인';
    if(/리서치|조사|자료|분석|시장|research|analysis/.test(raw))return '리서치';
    if(/미팅|회의|콜|상담|meeting|call/.test(raw))return '미팅';
    if(/업로드|예약|관리|운영|메일|정리|admin|upload/.test(raw))return '운영';

  }
  function monthRev(pid,ym){try{if(typeof W.monthRevP==='function')return W.monthRevP(pid,ym.y,ym.m)}catch(e){} return (((W.S||{}).rev||{})[pid]||[]).filter(r=>(Number(r.y)||ym.y)===ym.y&&(Number(r.m)||ym.m)===ym.m).reduce((a,r)=>a+(Number(r.a)||0),0)}
  function totalRev(pid){try{if(typeof W.rTot==='function')return W.rTot(pid)}catch(e){} return (((W.S||{}).rev||{})[pid]||[]).reduce((a,r)=>a+(Number(r.a)||0),0)}
  function collect(pid,ym=currentYM()){

    Object.keys(S.tt||{}).forEach(ds=>{ if(!sameYM(ds,ym))return; (S.tt[ds]||[]).forEach(ev=>{const ep=getPid(ev); if(pid&&ep!==pid)return; const st=startMinute(ev), min=durationMin(ev); rows.push({date:ds,pid:ep,min,h:Math.floor(st/60)%24,m:st%60,type:typeOf(ev),title:ev.title||'',source:'타임블럭'}); }); });

    return rows;
  }
  function analyze(pid){
    const ym=currentYM(); const rows=collect(pid,ym); const min=rows.reduce((a,x)=>a+x.min,0); const rev=pid?monthRev(pid,ym):(W.S?.projects||[]).reduce((a,p)=>a+monthRev(p.id,ym),0); const rate=min?Math.round(rev/(min/60)):0;
    const byType={}; rows.forEach(x=>byType[x.type]=(byType[x.type]||0)+x.min); const types=Object.entries(byType).sort((a,b)=>b[1]-a[1]); const night=rows.filter(x=>x.h>=22||x.h<6).reduce((a,x)=>a+x.min,0); const nightPct=min?Math.round(night/min*100):0;
    return {ym,rows,min,rev,rate,types,nightPct,total:pid?totalRev(pid):rev};
  }
  W.mbhV7Analyze=analyze;
  function panel(pid){
    const p=(typeof W.gP==='function'?W.gP(pid):(W.S?.projects||[]).find(x=>x.id===pid))||{n:'프로젝트',c:'#777'}; const a=analyze(pid); const top=a.types[0]||['아직 없음',0]; const max=Math.max(1,...a.types.map(x=>x[1]));
    let msg='아직 이 프로젝트에 연결된 이번 달 타임블럭이 없어요. 타임테이블에서 프로젝트를 선택해서 시간을 넣으면 실제 시급과 업무 패턴이 바로 계산돼요.';

    font-family:'Noto Sans KR',sans-serif!important;
    line-height:1.2!important;
    cursor:pointer!important;
    white-space:nowrap!important;
    box-sizing:border-box!important;
    transform:none!important;
    pointer-events:auto!important;
  }
  html body #plan-section button.add-plan.add-plan-bottom:hover,
  html body button.add-plan.add-plan-bottom:hover,
  html body #plan-section .mbh-bottom-add-plan:hover,
  html body .mbh-bottom-add-plan:hover{
    background:var(--bg)!important;
    color:var(--text)!important;
    border-color:var(--bmd)!important;
  }
  @media(max-width:768px){
    html body #plan-section button.add-plan.add-plan-bottom,
    html body button.add-plan.add-plan-bottom,
    html body #plan-section .mbh-bottom-add-plan,
    html body .mbh-bottom-add-plan{
      min-height:52px!important;
      margin-top:16px!important;
    }
  }
</style>
<script id="mbh-v6-plan-bottom-button-hardfix-js">
(function(){
  function pidFromOnclick(el){
    var oc=(el&&el.getAttribute&&el.getAttribute('onclick'))||'';
    var m=oc.match(/planAdd\('([^']+)'\)/);
    return m?m[1]:null;
  }
  function currentPlanPid(){
    var btn=document.querySelector('.kanban-toolbar button[onclick*="planAdd"], button.add-plan[onclick*="planAdd"]');
    var pid=pidFromOnclick(btn);
    if(pid) return pid;
    try{
      if(window.S && S.sel) return S.sel;
      if(window.S && S.currentProject) return S.currentProject;
    }catch(e){}
    return null;
  }
  function forceBottomPlanButton(){
    var toolbar=document.querySelector('#plan-section .kanban-toolbar, .kanban-toolbar');
    var board=document.querySelector('#plan-section .kanban-board, .kanban-board');
    if(!board) return;
    var topBtn=toolbar?toolbar.querySelector('button.add-plan[onclick*="planAdd"], button[onclick*="planAdd"]'):null;
    var pid=pidFromOnclick(topBtn) || currentPlanPid();
    if(topBtn){
      topBtn.style.setProperty('display','none','important');
      topBtn.style.setProperty('visibility','hidden','important');
      topBtn.style.setProperty('height','0','important');
      topBtn.style.setProperty('padding','0','important');
      topBtn.style.setProperty('margin','0','important');
    }
    if(!pid) return;
    var root=board.parentElement || document.getElementById('plan-section') || document.body;
    root.querySelectorAll('.add-plan-bottom, .mbh-bottom-add-plan').forEach(function(el,i){ if(i>0) el.remove(); });
    var bottom=root.querySelector('.add-plan-bottom, .mbh-bottom-add-plan');
    if(!bottom){
      bottom=document.createElement('button');
      bottom.type='button';
      bottom.className='add-plan add-plan-bottom mbh-bottom-add-plan';
      bottom.textContent='＋ 새 기획안 추가';
      board.insertAdjacentElement('afterend',bottom);
    }
    bottom.setAttribute('onclick',"planAdd('"+pid+"')");
    bottom.style.setProperty('display','flex','important');
    bottom.style.setProperty('visibility','visible','important');
    bottom.style.setProperty('opacity','1','important');
    bottom.style.setProperty('width','100%','important');
  }
  function patchMkPlans(){
    if(typeof window.mkPlans==='function' && !window.mkPlans.__mbhV6Bottom){
      var old=window.mkPlans;
      var wrapped=function(pid){
        var h=old.apply(this,arguments);
        // 상단 버튼은 렌더 문자열에서 제거. 하단 버튼은 무조건 하나만 남김.
        h=String(h).replace(/<button class="add-plan"[^>]*onclick="planAdd\('[^']+'\)"[^>]*>\s*＋\s*새 기획안\s*<\/button>/g,'');
        h=h.replace(/<button class="add-plan add-plan-bottom"[^>]*>\s*＋\s*새 기획안 추가\s*<\/button>/g,'');
        h+=`<button type="button" class="add-plan add-plan-bottom mbh-bottom-add-plan" onclick="planAdd('${pid}')">＋ 새 기획안 추가</button>`;
        return h;
      };
      wrapped.__mbhV6Bottom=true;
      window.mkPlans=wrapped;
    }
  }
  function apply(){ patchMkPlans(); forceBottomPlanButton(); }
  document.addEventListener('DOMContentLoaded',function(){ apply(); setTimeout(apply,50); setTimeout(apply,250); setTimeout(apply,900); });
  ['R','uPlan','planAdd','planDel','setTab','setPlanFilter','kbDrop'].forEach(function(name){
    var old=window[name];
    if(typeof old==='function' && !old.__mbhV6Bottom){
      var fn=function(){ var res=old.apply(this,arguments); setTimeout(apply,20); setTimeout(apply,150); return res; };
      fn.__mbhV6Bottom=true;
      window[name]=fn;
    }
  });
  try{
    var mo=new MutationObserver(function(){ clearTimeout(window.__mbhV6BottomTimer); window.__mbhV6BottomTimer=setTimeout(apply,40); });
    document.addEventListener('DOMContentLoaded',function(){ mo.observe(document.body,{childList:true,subtree:true}); });
  }catch(e){}
})();
</script>

</body>
</html>
